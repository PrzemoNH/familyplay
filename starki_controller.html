<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI PLAYER 2.0.0</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a1628;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
  gap:12px;
}

input,button{
  padding:12px;
  width:280px;
  font-size:16px;
  border-radius:10px;
}

button{
  background:#4fc3f7;
  border:none;
  font-weight:700;
  cursor:pointer;
}

#game{ display:none; }

#board{
  width:300px;
  height:300px;
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:2px;
  background:#0f2a44;
  padding:6px;
  border-radius:10px;
}

.cell{ background:#1b3b5c; }
</style>
</head>

<body>

<h2>⚓ STATKI 2.0.0</h2>

<div id="login">
  <input id="room" placeholder="ROOM CODE">
  <input id="nick" placeholder="NICK">
  <button id="joinBtn">DOŁĄCZ</button>
  <p id="msg"></p>
</div>

<div id="game">
  <h3 id="info"></h3>
  <div id="board"></div>
</div>

<script>

/* ===================== [01] CONFIG ===================== */
const SUPABASE_URL = "https://phwoggxmdmtycvyrcyba.supabase.co";
const SUPABASE_KEY = "sb_publishable_rY0--Wp81TkcuPbo_C-u1w_zEhkiuQ1";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ===================== [02] GLOBAL STATE ===================== */
let player = null;
let room = null;
let match = null;

/* ===================== [03] DEVICE SYSTEM ===================== */
function getDeviceId(){
  let id = localStorage.getItem("device_id");
  if(!id){
    id = crypto.randomUUID();
    localStorage.setItem("device_id", id);
  }
  return id;
}

/* ===================== [04] UI HELPERS ===================== */
function msg(t){
  document.getElementById("msg").innerText = t;
}

function roomInput(){
  return document.getElementById("room").value.trim().toUpperCase();
}

function nickInput(){
  return document.getElementById("nick").value.trim();
}

/* ===================== JOIN ROOM ===================== */
document.getElementById("joinBtn").onclick = async () => {

  const code = roomInput();
  const nick = nickInput();
  const device_id = getDeviceId();

  if(!code || !nick){
    msg("Brak danych");
    return;
  }

  const { data: r } = await db
    .from("rooms")
    .select("*")
    .eq("code", code)
    .maybeSingle();

  if(!r){
    msg("Brak pokoju");
    return;
  }

  room = r;

  /* reconnect device */
  const { data: existing } = await db
    .from("players")
    .select("*")
    .eq("room_id", room.id)
    .eq("device_id", device_id)
    .maybeSingle();

  if(existing){
    player = existing;
    startGame();
    return;
  }

  /* color assign */
  const { data: ps } = await db
    .from("players")
    .select("color")
    .eq("room_id", room.id);

  const used = (ps || []).map(p => p.color);
  const COLORS = ["red","blue","green","yellow","purple"];
  const color = COLORS.find(c => !used.includes(c)) || "gray";

  const { data: p } = await db
    .from("players")
    .insert({
      room_id: room.id,
      nick,
      device_id,
      color
    })
    .select()
    .single();

  player = p;
  startGame();
};

/* ===================== START GAME ===================== */
function startGame(){
  document.getElementById("login").style.display = "none";
  document.getElementById("game").style.display = "flex";

  document.getElementById("info").innerText =
    player.nick + " | " + room.code;

  buildBoard();
}

/* ===================== BOARD ===================== */
function buildBoard(){
  const board = document.getElementById("board");
  board.innerHTML = "";

  for(let i=0;i<100;i++){
    const c = document.createElement("div");
    c.className = "cell";
    board.appendChild(c);
  }
}

</script>
</body>
</html>
