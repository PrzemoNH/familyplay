<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI 2.0.1 AUTO FLEET</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a1628;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
  gap:12px;
}

input,button{
  padding:12px;
  width:280px;
  font-size:16px;
  border-radius:10px;
}

button{
  background:#4fc3f7;
  border:none;
  font-weight:700;
}

#game{ display:none; }

#board{
  width:300px;
  height:300px;
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:2px;
  background:#0f2a44;
  padding:6px;
  border-radius:10px;
}

.cell{ background:#1b3b5c; }
</style>
</head>

<body>

<h2>⚓ STATKI AUTO FLEET</h2>

<div id="login">
  <input id="room" placeholder="ROOM CODE">
  <input id="nick" placeholder="NICK">
  <button id="joinBtn">DOŁĄCZ</button>
  <p id="msg"></p>
</div>

<div id="game">
  <h3 id="info"></h3>
  <div id="board"></div>
</div>

<script>

/* ===================== SUPABASE ===================== */
const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "sb_publishable_rY0--Wp81TkcuPbo_C-u1w_zEhkiuQ1"
);

/* ===================== STATE ===================== */
let player=null;
let room=null;
let match=null;

/* ===================== DEVICE ===================== */
function deviceId(){
  let id = localStorage.getItem("device_id");
  if(!id){
    id = crypto.randomUUID();
    localStorage.setItem("device_id", id);
  }
  return id;
}

/* ===================== FLEET CONFIG ===================== */
const SIZE = 10;

const FLEET = [
  {size:5,count:1},
  {size:4,count:1},
  {size:3,count:2},
  {size:2,count:3},
  {size:1,count:4}
];

/* ===================== RNG ===================== */
function rng(seed){
  let x = 0;
  for(let i=0;i<seed.length;i++) x += seed.charCodeAt(i);

  return function(){
    x = (x * 9301 + 49297) % 233280;
    return x / 233280;
  }
}

/* ===================== VALIDATION ===================== */
function valid(board,x,y,size,dir){
  const dx = dir==="h"?1:0;
  const dy = dir==="v"?1:0;

  for(let i=0;i<size;i++){
    const nx=x+dx*i;
    const ny=y+dy*i;

    if(nx<0||ny<0||nx>=SIZE||ny>=SIZE) return false;
    if(board[ny][nx]!==0) return false;

    // NO TOUCH rule (except mines allowed later if needed)
    for(let yy=-1;yy<=1;yy++){
      for(let xx=-1;xx<=1;xx++){
        const ax=nx+xx;
        const ay=ny+yy;
        if(ax>=0&&ay>=0&&ax<SIZE&&ay<SIZE){
          if(board[ay][ax]!==0) return false;
        }
      }
    }
  }
  return true;
}

/* ===================== AUTO FLEET ===================== */
function generateFleet(seed){
  const rand=rng(seed);

  const board=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  const ships=[];

  function place(size){
    for(let t=0;t<2000;t++){
      const x=Math.floor(rand()*SIZE);
      const y=Math.floor(rand()*SIZE);
      const dir=rand()>0.5?"h":"v";

      if(valid(board,x,y,size,dir)){
        for(let i=0;i<size;i++){
          const nx=x+(dir==="h"?i:0);
          const ny=y+(dir==="v"?i:0);
          board[ny][nx]=size===1?"mine":"ship";
        }

        ships.push({x,y,size,dir});
        return;
      }
    }
  }

  for(const f of FLEET){
    for(let i=0;i<f.count;i++){
      place(f.size);
    }
  }

  return {board,ships};
}

/* ===================== RENDER ===================== */
function render(board){
  const cells=document.querySelectorAll(".cell");

  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      const i=y*SIZE+x;
      const v=board[y][x];

      if(v==="ship") cells[i].style.background="#4fc3f7";
      else if(v==="mine") cells[i].style.background="orange";
    }
  }
}

/* ===================== JOIN ===================== */
document.getElementById("joinBtn").onclick=async()=>{

  const code=document.getElementById("room").value.trim().toUpperCase();
  const nick=document.getElementById("nick").value.trim();
  const did=deviceId();

  if(!code||!nick){msg("Brak danych");return;}

  const {data:r}=await db.from("rooms").select("*").eq("code",code).maybeSingle();
  if(!r){msg("Brak pokoju");return;}
  room=r;

  const {data:ex}=await db.from("players")
    .select("*")
    .eq("room_id",room.id)
    .eq("device_id",did)
    .maybeSingle();

  if(ex){
    player=ex;
    start();
    return;
  }

  const COLORS=["red","blue","green","yellow","purple"];

  const {data:ps}=await db.from("players")
    .select("color")
    .eq("room_id",room.id);

  const used=(ps||[]).map(p=>p.color);
  const color=COLORS.find(c=>!used.includes(c))||"gray";

  const {data:p}=await db.from("players").insert({
    room_id:room.id,
    nick,
    device_id:did,
    color
  }).select().single();

  player=p;
  start();
};

/* ===================== MATCH ===================== */
async function start(){

  let {data:m}=await db.from("matches")
    .select("*")
    .eq("room_id",room.id)
    .maybeSingle();

  if(!m){
    const seed=Math.random().toString(36).slice(2);

    const {data:nm}=await db.from("matches")
      .insert({
        room_id:room.id,
        status:"active",
        seed
      })
      .select()
      .single();

    m=nm;
  }

  match=m;

  document.getElementById("login").style.display="none";
  document.getElementById("game").style.display="flex";

  document.getElementById("info").innerText=
    player.nick+" | "+room.code;

  build();

  const fleet=generateFleet(match.seed+player.id);
  render(fleet.board);
}

/* ===================== BOARD ===================== */
function build(){
  const b=document.getElementById("board");
  b.innerHTML="";
  for(let i=0;i<100;i++){
    const d=document.createElement("div");
    d.className="cell";
    b.appendChild(d);
  }
}

/* ===================== MSG ===================== */
function msg(t){
  document.getElementById("msg").innerText=t;
}

</script>
</body>
</html>
