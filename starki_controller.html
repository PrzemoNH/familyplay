<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI 2.1 MVP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a1628;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

input,button{
  padding:12px;
  width:280px;
  font-size:16px;
  margin:5px;
}

button{
  background:#4fc3f7;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

#game{ display:none; }

#board{
  display:grid;
  grid-template-columns:repeat(10,30px);
  gap:2px;
  margin-top:10px;
}

.cell{
  width:30px;
  height:30px;
  background:#1b3b5c;
  border-radius:4px;
  cursor:pointer;
}

.cell.hit{ background:red; }
.cell.miss{ background:#555; }
.cell.ship{ background:#4fc3f7; }
</style>
</head>

<body>

<h2>⚓ STATKI 2.1 MVP</h2>

<div id="login">
  <input id="room" placeholder="ROOM CODE">
  <input id="nick" placeholder="NICK">
  <button id="joinBtn">DOŁĄCZ</button>
  <p id="msg"></p>
</div>

<div id="game">
  <h3 id="info"></h3>
  <div id="board"></div>
</div>

<script>

const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9"
);

let room=null;
let player=null;
let match=null;

let isMyTurn=false;
let lock=false;

const SIZE=10;

/* ================= DEVICE ================= */
function deviceId(){
  let id=localStorage.getItem("device");
  if(!id){
    id=crypto.randomUUID();
    localStorage.setItem("device",id);
  }
  return id;
}

/* ================= MSG ================= */
function msg(t){
  document.getElementById("msg").innerText=t;
}

/* ================= JOIN ================= */
document.getElementById("joinBtn").onclick=async()=>{

  const code=document.getElementById("room").value.trim().toUpperCase();
  const nick=document.getElementById("nick").value.trim();

  if(!code||!nick) return msg("Brak danych");

  const {data:r}=await db.from("rooms").select("*").eq("code",code).maybeSingle();
  if(!r) return msg("Brak pokoju");

  room=r;

  const did=deviceId();

  const {data:ex}=await db.from("players")
    .select("*")
    .eq("room_id",room.id)
    .eq("device_id",did)
    .maybeSingle();

  if(ex){
    player=ex;
    start();
    return;
  }

  const {data:p}=await db.from("players").insert({
    room_id:room.id,
    nick,
    device_id:did
  }).select().single();

  player=p;
  start();
};

/* ================= START ================= */
async function start(){

  let {data:m}=await db.from("matches")
    .select("*")
    .eq("room_id",room.id)
    .maybeSingle();

  if(!m){
    const seed=Math.random().toString(36).slice(2);

    const {data:nm}=await db.from("matches")
      .insert({room_id:room.id,status:"active",seed})
      .select().single();

    m=nm;
  }

  match=m;

  document.getElementById("login").style.display="none";
  document.getElementById("game").style.display="block";

  document.getElementById("info").innerText=
    player.nick+" | "+room.code;

  buildBoard();
  attachClicks();
  initTurn();
}

/* ================= BOARD ================= */
function buildBoard(){
  const b=document.getElementById("board");
  b.innerHTML="";

  for(let i=0;i<SIZE*SIZE;i++){
    const c=document.createElement("div");
    c.className="cell";
    b.appendChild(c);
  }
}

/* ================= TURN ================= */
async function initTurn(){

  const {data:last}=await db.from("shots")
    .select("*")
    .eq("room_id",room.id)
    .order("created_at",{ascending:false})
    .limit(1)
    .maybeSingle();

  isMyTurn = !last || last.player_id !== player.id;
  updateMsg();
}

function updateMsg(){
  msg(isMyTurn ? "Twoja tura" : "Tura przeciwnika");
}

/* ================= SHOOT ================= */
async function shoot(x,y){

  if(lock || !isMyTurn) return;

  lock=true;

  const coord=`${x}:${y}`;

  const {data:exist}=await db.from("shots")
    .select("*")
    .eq("room_id",room.id)
    .eq("coord",coord)
    .maybeSingle();

  if(exist){
    msg("Już strzelane");
    lock=false;
    return;
  }

  // pseudo hit logic (MVP)
  const hit=Math.random()>0.6;

  await db.from("shots").insert({
    room_id:room.id,
    player_id:player.id,
    coord,
    result:hit?"hit":"miss"
  });

  await db.from("tv_events").insert({
    room_id:room.id,
    type:hit?"HIT":"MISS",
    coord
  });

  isMyTurn=false;
  updateMsg();

  setTimeout(()=>switchTurn(),300);

  lock=false;
}

/* ================= TURN SWITCH ================= */
async function switchTurn(){

  const {data:players}=await db.from("players")
    .select("*")
    .eq("room_id",room.id);

  const idx=players.findIndex(p=>p.id===player.id);
  const next=players[(idx+1)%players.length];

  isMyTurn = (next.id===player.id);
  updateMsg();
}

/* ================= CLICK ================= */
function attachClicks(){
  document.querySelectorAll(".cell").forEach((c,i)=>{

    const x=i%10;
    const y=Math.floor(i/10);

    c.onclick=()=>shoot(x,y);
  });
}

</script>

</body>
</html>
