<!DOCTYPE html>

<html lang="pl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>STATKI – Kontroler</title>

<style>

*{

  box-sizing:border-box;

  margin:0;

  padding:0;

}

body{

  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;

  background:#0a1628;

  color:white;

  min-height:100vh;

  display:flex;

  flex-direction:column;

  align-items:center;

  justify-content:center;

  padding:24px;

  gap:20px;

}

h1{

  font-size:1.6rem;

  font-weight:900;

  color:#4fc3f7;

  letter-spacing:1px;

}

.sub{

  font-size:0.85rem;

  color:#90a4ae;

}

.card{

  background:rgba(255,255,255,0.06);

  border:1px solid rgba(255,255,255,0.12);

  border-radius:16px;

  padding:24px;

  width:100%;

  max-width:360px;

  display:flex;

  flex-direction:column;

  gap:16px;

}

label{

  font-size:0.75rem;

  font-weight:700;

  color:#90a4ae;

  text-transform:uppercase;

  letter-spacing:0.5px;

}

input{

  width:100%;

  padding:13px 15px;

  border-radius:10px;

  border:1.5px solid rgba(255,255,255,0.15);

  background:rgba(255,255,255,0.08);

  color:white;

  font-size:1rem;

  outline:none;

}

.colors{

  display:flex;

  gap:12px;

  justify-content:center;

  padding:8px 0;

  flex-wrap:wrap;

}

.cb{

  width:56px;

  height:56px;

  border-radius:50%;

  border:4px solid transparent;

  cursor:pointer;

  transition:0.2s;

}

.cb.sel{

  border-color:#ffffff !important;

  box-shadow:0 0 0 4px rgba(255,255,255,0.4);

  transform:scale(1.12);

}

.c-red{ background:#ef4444; }

.c-yellow{ background:#f59e0b; }

.c-green{ background:#22c55e; }

.c-black{ background:#4b5563; }

.c-white{

  background:#e5e7eb;

  box-shadow:0 0 0 1px #000;

}

#joinBtn{

  width:100%;

  padding:16px;

  background:#4fc3f7;

  color:#0a1628;

  font-size:1.1rem;

  font-weight:900;

  border:none;

  border-radius:12px;

  cursor:pointer;

}

#joinBtn:disabled{

  background:rgba(79,195,247,0.3);

  color:rgba(255,255,255,0.4);

}

#msg{

  font-size:0.85rem;

  text-align:center;

  min-height:24px;

}

#msg.err{

  color:#ef4444;

}

#msg.ok{

  color:#22c55e;

}

/* ===================== */

/* EKRAN ROZSTAWIANIA */

/* ===================== */

#placementScreen{

  display:none;

  flex-direction:column;

  align-items:center;

  gap:16px;

  width:100%;

  max-width:520px;

}

.player-info{

  display:flex;

  align-items:center;

  gap:12px;

  background:rgba(255,255,255,0.08);

  padding:12px 20px;

  border-radius:12px;

  width:100%;

}

.color-dot{

  width:32px;

  height:32px;

  border-radius:50%;

  border:3px solid white;

}

#boardContainer{

  position:relative;

}

#board{

  display:grid;

  background:#0f253f;

  border:3px solid #4fc3f7;

  gap:2px;

  padding:6px;

  border-radius:12px;

}

.cell{

  width:26px;

  height:26px;

  background:#1e3a5f;

  border-radius:3px;

  display:flex;

  align-items:center;

  justify-content:center;

}

.cell.ship{

  font-weight:bold;

}

.axis-label{

  color:#4fc3f7;

  font-size:12px;

  text-align:center;

  user-select:none;

  display:flex;

  align-items:center;

  justify-content:center;

}

button{

  border:none;

  border-radius:12px;

  cursor:pointer;

  color:white;

}

</style>

</head>

<body>

<!-- ===================== -->

<!-- DOŁĄCZANIE -->

<!-- ===================== -->
<div id="joinScreen">

  <h1>⚓ STATKI</h1>

  <p class="sub">Dołącz do gry</p>

  <div class="card">

    <label for="nick">Twój nick</label>

    <input

      type="text"

      id="nick"

      placeholder="Wpisz nick..."

      maxlength="12"

      autocomplete="off"

    >

    <label>Wybierz kolor</label>

    <div class="colors">

      <div class="cb c-red" data-c="red"></div>

      <div class="cb c-yellow" data-c="yellow"></div>

      <div class="cb c-green" data-c="green"></div>

      <div class="cb c-black" data-c="black"></div>

      <div class="cb c-white" data-c="white"></div>

    </div>

    <label for="roomCode">Kod pokoju</label>

    <input

      type="text"

      id="roomCode"

      placeholder="np. A96"

      maxlength="5"

      autocomplete="off"

      style="

        text-transform:uppercase;

        text-align:center;

        letter-spacing:4px;

        font-size:1.2rem;

      "

    >

    <button id="joinBtn" disabled>

      Dołącz do gry

    </button>

  </div>

  <p id="msg"></p>

</div>

<!-- ===================== -->

<!-- ROZSTAWIANIE -->

<!-- ===================== -->

<div id="placementScreen">

  <div class="player-info">

    <div class="color-dot" id="playerColor"></div>

    <div>

      <strong id="playerNickDisplay"></strong><br>

      <span class="sub" id="roomCodeDisplay"></span>

    </div>

  </div>

  <h1>⚓ Twoja flota</h1>

  <p class="sub" id="placementInfo">

    Rozstawianie floty...

  </p>

  <div id="boardContainer">

    <div id="board"></div>

  </div>

  <div style="margin-top:20px; display:flex; gap:12px;">

    <button

      id="btnNewPlacement"

      style="

        padding:12px 24px;

        background:#334155;

      "

    >

      🎲 Nowe rozstawienie

    </button>

    <button

      id="btnReady"

      style="

        padding:12px 32px;

        background:#22c55e;

        color:#0a1628;

        font-weight:900;

      "

    >

      ✅ AKCEPTUJĘ – GOTOWY

    </button>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>

<script>

// =====================

// SUPABASE

// =====================

const SUPABASE_URL =

'https://phwoggxmdmtycvyrcyba.supabase.co';

const SUPABASE_KEY =

'sb_publishable_rY0--Wp81TkcuPbo_C-u1w_zEhkiuQ1';

let db = supabase.createClient(

  SUPABASE_URL,

  SUPABASE_KEY

);

// =====================

// ZMIENNE

// =====================

let roomId = null;

let roomCode = null;

let playerColor = null;

const SIZE = 15;

let boardData = [];

// =====================

// ELEMENTY

// =====================

const joinScreen =

document.getElementById('joinScreen');

const placementScreen =

document.getElementById('placementScreen');

const nickEl =

document.getElementById('nick');

const codeEl =

document.getElementById('roomCode');

const btnEl =

document.getElementById('joinBtn');

const msgEl =

document.getElementById('msg');

// =====================

// PARAMETRY URL

// =====================

const urlParams =

new URLSearchParams(window.location.search);

if(

  urlParams.get('room') ||

  urlParams.get('roomCode')

){

  codeEl.value =

  (

    urlParams.get('room') ||

    urlParams.get('roomCode')

  ).toUpperCase();

}

// =====================

// KOLORY

// =====================

const cbs =

document.querySelectorAll('.cb');

cbs.forEach(cb => {

  const colorAttr = cb.dataset.c;

  if(localStorage.getItem('fg_color') === colorAttr){

    cb.classList.add('sel');

    playerColor = colorAttr;

  }

  cb.addEventListener('click', () => {

    cbs.forEach(c => c.classList.remove('sel'));

    cb.classList.add('sel');

    playerColor = colorAttr;

    localStorage.setItem('fg_color', playerColor);

    check();

  });

});

nickEl.addEventListener('input', check);

codeEl.addEventListener('input', check);

// =====================

// WALIDACJA

// =====================

function check(){

  const nick = nickEl.value.trim();

  const code = codeEl.value.trim();

  if(

    nick.length >= 2 &&

    code.length >= 3 &&

    playerColor

  ){

    btnEl.disabled = false;

    msgEl.textContent =

    "Gotowy do dołączenia";

    msgEl.className = "ok";

  } else {

    btnEl.disabled = true;

    msgEl.textContent =

    "Wybierz nick, kolor i kod pokoju";

    msgEl.className = "";

  }

}

// =====================

// JOIN

// =====================

btnEl.addEventListener('click', async () => {

  const nick =

  nickEl.value.trim();

  const code =

  codeEl.value.trim().toUpperCase();

  if(!nick || !code || !playerColor){

    return;

  }

  try{

    const { data: room } =

    await db

      .from('rooms')

      .select('id,code')

      .eq('code', code)

      .maybeSingle();

    if(!room){

      throw new Error("Pokój nie istnieje!");

    }

    roomId = room.id;

    roomCode = room.code;

    const { data: existing } =

    await db

      .from('players')

      .select('nick,color')

      .eq('room_id', roomId);

     const isHost = !existing || existing.length === 0;

    if(

      existing?.some(

        p => p.nick.toLowerCase() === nick.toLowerCase()

      )

    ){

      throw new Error("Nick zajęty!");

    }

    if(

      existing?.some(

        p => p.color === playerColor

      )

    ){

      throw new Error("Kolor zajęty!");

    }

    await db.from('players').insert({
  room_id: roomId,
  nick: nick,
  color: playerColor,
  is_host: isHost,
  is_active: true
});

    document.getElementById(

      'playerNickDisplay'

    ).textContent = nick;

    document.getElementById(

      'roomCodeDisplay'

    ).textContent = `Pokój: ${roomCode}`;

    document.getElementById(

      'playerColor'

    ).style.backgroundColor =

    getColorHex(playerColor);

    joinScreen.style.display = 'none';

    placementScreen.style.display = 'flex';

    generateRandomPlacement();

  } catch(e){

    alert(e.message || "Błąd dołączenia");

  }

});

// =====================

// KOLOR

// =====================

function getColorHex(c){

  const map = {

    red:'#ef4444',

    yellow:'#f59e0b',

    green:'#22c55e',

    black:'#4b5563',

    white:'#e5e7eb'

  };

  return map[c] || '#4fc3f7';

}

// =====================

// LOSOWE ROZSTAWIANIE

// =====================

function generateRandomPlacement(){

  boardData =

  Array.from(

    {length:SIZE},

    () => Array(SIZE).fill(0)

  );

  // Flota

  const fleetList = [

    5,

    4,

    3,

    3,

    2,

    2,

    1,

    1,

    1,

    1

  ];

  let shipId = 1;

  for(const size of fleetList){

    let placed = false;

    let attempts = 0;

    while(!placed && attempts < 500){

      attempts++;

      const horizontal =

      Math.random() < 0.5;

      const x = Math.floor(

        Math.random() * (

          horizontal

            ? SIZE - size + 1

            : SIZE

        )

      );

      const y = Math.floor(

        Math.random() * (

          horizontal

            ? SIZE

            : SIZE - size + 1

        )

      );

      if(

        canPlaceShip(

          x,

          y,

          size,

          horizontal

        )

      ){

        placeShip(

          x,

          y,

          size,

          horizontal,

          shipId

        );

        placed = true;

        shipId++;

      }

    }

  }

  renderBoard();

}

// =====================

// SPRAWDZANIE POZYCJI

// =====================

function canPlaceShip(

  x,

  y,

  size,

  horizontal

){

  const cells =

  getShipCells(

    x,

    y,

    size,

    horizontal

  );

  // Czy pola wolne

  for(const [cx, cy] of cells){

    if(

      cx < 0 ||

      cx >= SIZE ||

      cy < 0 ||

      cy >= SIZE

    ){

      return false;

    }

    if(boardData[cy][cx] !== 0){

      return false;

    }

  }

  // =====================

  // DWUMASZTOWCE I WIĘKSZE

  // =====================

  if(size >= 2){

    for(const [cx, cy] of cells){

      for(let dy = -1; dy <= 1; dy++){

        for(let dx = -1; dx <= 1; dx++){

          const nx = cx + dx;

          const ny = cy + dy;

          if(

            nx < 0 ||

            nx >= SIZE ||

            ny < 0 ||

            ny >= SIZE

          ){

            continue;

          }

          if(boardData[ny][nx] !== 0){

            return false;

          }

        }

      }

    }

  }

  // =====================

  // JEDNOMASZTOWCE

  // =====================

  else {

    const [cx, cy] = cells[0];

    const sides = [

      [0,-1],

      [0,1],

      [-1,0],

      [1,0]

    ];

    for(const [dx, dy] of sides){

      const nx = cx + dx;

      const ny = cy + dy;

      if(

        nx < 0 ||

        nx >= SIZE ||

        ny < 0 ||

        ny >= SIZE

      ){

        continue;

      }

      if(boardData[ny][nx] !== 0){

        return false;

      }

    }

  }

  return true;

}

// =====================

// POLA STATKU

// =====================

function getShipCells(

  x,

  y,

  size,

  horizontal

){

  const cells = [];

  for(let i = 0; i < size; i++){

    if(horizontal){

      cells.push([x + i, y]);

    } else {

      cells.push([x, y + i]);

    }

  }

  return cells;

}

// =====================

// STAWIANIE STATKU

// =====================

function placeShip(

  x,

  y,

  size,

  horizontal,

  shipId

){

  const cells =

  getShipCells(

    x,

    y,

    size,

    horizontal

  );

  for(const [cx, cy] of cells){

    boardData[cy][cx] = shipId;

  }

}

// =====================

// RENDER PLANSZY

// =====================

function renderBoard(){

  const boardEl =

  document.getElementById('board');

  // 1 kolumna dla liczb

  boardEl.style.gridTemplateColumns =

  `28px repeat(${SIZE}, 26px)`;

  boardEl.innerHTML = '';

  // Lewy górny pusty róg

  const empty =

  document.createElement('div');

  empty.className = 'axis-label';

  boardEl.appendChild(empty);

  // Litery

  for(let x = 0; x < SIZE; x++){

    const letter =

    document.createElement('div');

    letter.className = 'axis-label';

    letter.textContent =

    String.fromCharCode(65 + x);

    boardEl.appendChild(letter);

  }

  // Plansza

  for(let y = 0; y < SIZE; y++){

    // Numery po lewej

    const num =

    document.createElement('div');

    num.className = 'axis-label';

    num.textContent = y + 1;

    boardEl.appendChild(num);

    // Komórki

    for(let x = 0; x < SIZE; x++){

      const cell =

      document.createElement('div');

      cell.className = 'cell';

      if(boardData[y][x] > 0){

        cell.classList.add('ship');

        cell.style.backgroundColor =

        getColorHex(playerColor);

      }

      boardEl.appendChild(cell);

    }

  }

}

// =====================

// BUTTONY

// =====================

document.getElementById(

  'btnNewPlacement'

).onclick = generateRandomPlacement;

document.getElementById(
  'btnReady'
).onclick = async () => {
  try{
    const nick =
    document.getElementById(
      'playerNickDisplay'
    ).textContent;
    // zapis planszy + gotowości
    await db
      .from('players')
      .update({
        board: boardData,
        ready: true
      })
      .eq('room_id', roomId)
      .eq('nick', nick);
    // sprawdzenie czy wszyscy gotowi
    const { data: players } =
    await db
      .from('players')
      .select('id,ready,nick')
      .eq('room_id', roomId);
    const allReady =
      players.length >= 2 &&
      players.every(p => p.ready);
    if(allReady){
      alert("🚀 Wszyscy gracze gotowi!");
      // TU później odpalisz ekran gry
    } else {
      alert("✅ Flota zapisana. Czekaj na drugiego gracza.");
    }
  } catch(e){
    console.error(e);
    alert("❌ Błąd zapisu planszy");
  }
};

// =====================

// START

// =====================

check();

</script>

</body>

</html>
