<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STATKI – Kontroler</title>
<style>
* { box-sizing: border-box; margin:0; padding:0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a1628;
  color: white;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  gap: 20px;
}
h1 { font-size: 1.8rem; font-weight: 900; color: #4fc3f7; letter-spacing: 1px; }
.sub { font-size: 0.9rem; color: #90a4ae; }

.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 24px;
  width: 100%;
  max-width: 380px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

label { font-size: 0.8rem; font-weight: 700; color: #90a4ae; text-transform: uppercase; letter-spacing: 0.5px; }
input {
  width: 100%;
  padding: 14px;
  font-size: 1.1rem;
  border-radius: 10px;
  border: 1.5px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.08);
  color: white;
}

.colors { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin: 10px 0; }
.cb {
  width: 62px; height: 62px; border-radius: 50%; border: 5px solid transparent;
  cursor: pointer; transition: all 0.2s;
}
.cb.sel { 
  border-color: white; 
  box-shadow: 0 0 0 6px rgba(255,255,255,0.4); 
  transform: scale(1.15); 
}

#joinBtn { 
  padding: 16px; 
  font-size: 1.2rem; 
  font-weight: 900; 
  background: #4fc3f7; 
  color: #0a1628; 
  border: none; 
  border-radius: 12px; 
  cursor: pointer; 
}
#joinBtn:disabled { background: #334155; color: #8899a6; }

#msg { min-height: 28px; text-align: center; font-size: 0.95rem; }

/* EKRAN ROZSTAWIANIA */
#placementScreen { display: none; flex-direction: column; align-items: center; gap: 16px; width: 100%; max-width: 520px; }
.player-info {
  background: rgba(255,255,255,0.08);
  padding: 12px 20px;
  border-radius: 12px;
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
}
#board {
  display: grid;
  background: #0f253f;
  border: 3px solid #4fc3f7;
  gap: 2px;
  padding: 8px;
  border-radius: 12px;
}
.cell {
  width: 28px; height: 28px;
  background: #1e3a5f;
  border-radius: 3px;
}
.cell.ship { font-weight: bold; }
</style>
</head>
<body>

<!-- EKRAN DOŁĄCZANIA -->
<div id="loginScreen">
  <h1>⚓ STATKI</h1>
  <p class="sub">Dołącz do gry</p>

  <div class="card">
    <label for="nick">Twój nick</label>
    <input type="text" id="nick" placeholder="Wpisz nick..." maxlength="12" autocomplete="off">

    <label>Wybierz kolor</label>
    <div class="colors">
      <div class="cb c-red" data-c="red"></div>
      <div class="cb c-yellow" data-c="yellow"></div>
      <div class="cb c-green" data-c="green"></div>
      <div class="cb c-black" data-c="black"></div>
    </div>

    <label for="roomCode">Kod pokoju</label>
    <input type="text" id="roomCode" placeholder="np. A96" maxlength="5" autocomplete="off"
           style="text-transform:uppercase; text-align:center; font-size:1.3rem;">

    <button id="joinBtn" disabled>Dołącz do gry</button>
  </div>
  <p id="msg"></p>
</div>

<!-- EKRAN ROZSTAWIANIA -->
<div id="placementScreen">
  <div class="player-info">
    <div id="playerColorDot" style="width:32px;height:32px;border-radius:50%;border:3px solid white;"></div>
    <div>
      <strong id="playerNickDisplay"></strong><br>
      <span class="sub" id="roomCodeDisplay"></span>
    </div>
  </div>

  <h1>⚓ Twoja flota</h1>
  <p class="sub" id="placementInfo">Rozstawianie floty...</p>
  
  <div id="board"></div>

  <div style="margin-top:20px; display:flex; gap:12px;">
    <button id="btnNewPlacement" style="padding:12px 24px; background:#334155;">🎲 Nowe rozstawienie</button>
    <button id="btnReady" style="padding:12px 32px; background:#22c55e; color:#0a1628; font-weight:900;">✅ AKCEPTUJĘ – GOTOWY</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script>
// ===================== SUPABASE =====================
const db = supabase.createClient(
  'https://phwoggxmdmtycvyrcyba.supabase.co',
  'sb_publishable_rY0--Wp81TkcuPbo_C-u1w_zEhkiuQ1'
);

let playerColor = null;

// ===================== KOLORY =====================
const cbs = document.querySelectorAll('.cb');
cbs.forEach(cb => {
  const color = cb.dataset.c;
  
  if (localStorage.getItem('fg_color') === color) {
    cb.classList.add('sel');
    playerColor = color;
  }

  cb.addEventListener('click', () => {
    cbs.forEach(el => el.classList.remove('sel'));
    cb.classList.add('sel');
    playerColor = color;
    localStorage.setItem('fg_color', color);
    checkForm();
  });
});

function checkForm() {
  const nick = document.getElementById('nick').value.trim();
  const code = document.getElementById('roomCode').value.trim();
  document.getElementById('joinBtn').disabled = !(nick.length >= 2 && code.length >= 3 && playerColor);
}

// ===================== DOŁĄCZANIE =====================
document.getElementById('joinBtn').addEventListener('click', async () => {
  const nick = document.getElementById('nick').value.trim();
  const code = document.getElementById('roomCode').value.trim().toUpperCase();

  if (!nick || !code || !playerColor) return;

  try {
    const { data: room } = await db.from('rooms').select('id,code').eq('code', code).maybeSingle();
    if (!room) throw new Error("Pokój nie istnieje!");

    const { data: existing } = await db.from('players').select('nick,color').eq('room_id', room.id);
    
    if (existing?.some(p => p.nick.toLowerCase() === nick.toLowerCase())) throw new Error("Nick zajęty!");
    if (existing?.some(p => p.color === playerColor)) throw new Error("Kolor zajęty!");

    await db.from('players').insert({
      room_id: room.id,
      nick: nick,
      color: playerColor
    });

    // Przejście do rozstawiania
    document.getElementById('playerNickDisplay').textContent = nick;
    document.getElementById('roomCodeDisplay').textContent = `Pokój: ${code}`;
    document.getElementById('playerColorDot').style.backgroundColor = getColorHex(playerColor);

    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('placementScreen').style.display = 'flex';

    generateRandomPlacement();

  } catch (e) {
    alert(e.message || "Błąd");
  }
});

function getColorHex(c) {
  const map = {red:'#ef4444', yellow:'#f59e0b', green:'#22c55e', black:'#4b5563'};
  return map[c] || '#4fc3f7';
}

// ===================== ROZSTAWIANIE =====================
function generateRandomPlacement() {
  const boardEl = document.getElementById('board');
  boardEl.style.gridTemplateColumns = `repeat(15, 1fr)`;
  boardEl.innerHTML = '';

  for (let i = 0; i < 225; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    if (Math.random() > 0.82) {
      cell.classList.add('ship');
      cell.style.backgroundColor = getColorHex(playerColor);
    }
    boardEl.appendChild(cell);
  }
  document.getElementById('placementInfo').textContent = 'Flota rozstawiona (tymczasowo)';
}

document.getElementById('btnNewPlacement').onclick = generateRandomPlacement;
document.getElementById('btnReady').onclick = () => alert("✅ Flota zaakceptowana!");

checkForm();
</script>
</body>
</html>
