<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI PLAYER ENGINE 4.0 FULL</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a1628;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

input,button{
  padding:12px;
  width:280px;
  font-size:16px;
  margin:5px;
}

button{
  background:#4fc3f7;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

#fleetScreen{display:none;flex-direction:column;align-items:center;}

#board{
  display:grid;
  grid-template-columns:repeat(10,30px);
  gap:2px;
  margin-top:10px;
}

.cell{
  width:30px;
  height:30px;
  background:#1b3b5c;
}

.cell.ship{background:#4fc3f7;}
.cell.mine{background:orange;}

#fleetMsg{
  font-size:12px;
  color:#ffcc80;
  min-height:18px;
}

#debug{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#000;
  color:#00ffcc;
  font-size:11px;
  padding:6px;
  font-family:monospace;
  max-height:180px;
  overflow:auto;
}
</style>
</head>

<body>

<h2>⚓ STATKI PLAYER 4.0</h2>

<div id="login">
  <input id="room" placeholder="ROOM CODE">
  <input id="nick" placeholder="NICK (opcjonalnie)">
  <button id="joinBtn">JOIN</button>
  <p id="msg"></p>
</div>

<div id="fleetScreen">
  <h3>FLEET SETUP</h3>
  <div id="board"></div>
  <p id="fleetMsg"></p>
  <button id="btnReroll">RE-RANDOM</button>
  <button id="btnReady">READY</button>
</div>

<div id="debug">INIT</div>

<script>

const SUPABASE_URL = "https://phwoggxmdmtycvyrcyba.supabase.co";
const SUPABASE_KEY = "PUT_API_KEY_HERE";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let room=null;
let player=null;
let board=[];
const SIZE=10;

const SHIP_CELLS = 19;
const MINES = 4;

const FLEET = [
  {size:5,type:"S"},
  {size:4,type:"S"},
  {size:3,type:"S"},
  {size:3,type:"S"},
  {size:2,type:"S"},
  {size:2,type:"S"},
  {size:1,type:"M"},
  {size:1,type:"M"},
  {size:1,type:"M"},
  {size:1,type:"M"}
];

function debug(m){
  console.log(m);
  document.getElementById("debug").innerText += "\n" + JSON.stringify(m);
}

function msg(t){
  document.getElementById("msg").innerText = t;
}

function fleetMsg(t){
  document.getElementById("fleetMsg").innerText = t;
}

function deviceId(){
  let id=localStorage.getItem("device");
  if(!id){
    id=crypto.randomUUID();
    localStorage.setItem("device",id);
  }
  return id;
}

function randomNick(){
  const a=["Czarny","Złoty","Morski","Czerwony","Szary"];
  const b=["Rekin","Wilk","Smok","Orzeł","Krab"];
  const c=["Kapitan","Bosman","Pirat"];
  return a[Math.floor(Math.random()*a.length)]+" "+b[Math.floor(Math.random()*b.length)]+" "+c[Math.floor(Math.random()*c.length)];
}

document.getElementById("joinBtn").onclick = join;

async function join(){

  const code = document.getElementById("room").value.trim().toUpperCase();
  let nick = document.getElementById("nick").value.trim();

  if(!code){ msg("Brak kodu"); return; }
  if(!nick) nick = randomNick();

  debug({step:"JOIN",code,nick});

  const {data:roomData} = await db.from("rooms").select("*").eq("code",code).maybeSingle();
  if(!roomData){ msg("Brak pokoju"); return; }

  room=roomData;

  const did=deviceId();

  const {data:existing} = await db
    .from("players")
    .select("*")
    .eq("room_id",room.id)
    .eq("device_id",did)
    .maybeSingle();

  if(existing){
    player=existing;
    start();
    return;
  }

  const payload={
    room_id:room.id,
    nick,
    device_id:did,
    color:"blue",
    ready:false,
    is_host:false,
    is_active:true
  };

  const {data:ins,error} = await db.from("players").insert(payload).select().single();

  if(error){
    debug(error);
    msg("JOIN ERROR");
    return;
  }

  player=ins;
  start();
}

function start(){
  document.getElementById("login").style.display="none";
  document.getElementById("fleetScreen").style.display="flex";
  generateBoard();
}

document.getElementById("btnReroll").onclick=generateBoard;

function generateBoard(){

  let ok=false;
  let tries=0;

  while(!ok && tries<200){

    tries++;
    board=Array.from({length:SIZE},()=>Array(SIZE).fill(0));

    let placedAll=true;

    for(const ship of FLEET){

      let placed=false;

      for(let t=0;t<500;t++){

        const h=Math.random()<0.5;
        const x=Math.floor(Math.random()*(h?SIZE-ship.size:SIZE));
        const y=Math.floor(Math.random()*(h?SIZE:SIZE-ship.size));

        if(canPlace(x,y,ship.size,h,ship.type)){
          place(x,y,ship.size,h,ship.type);
          placed=true;
          break;
        }
      }

      if(!placed){
        placedAll=false;
        break;
      }
    }

    if(placedAll && validate()){
      ok=true;
    }
  }

  if(!ok){
    fleetMsg("FAIL - retry");
    debug("FLEET FAIL");
    return;
  }

  fleetMsg("OK FLEET");
  render();
}

function canPlace(x,y,size,h,type){

  for(let i=0;i<size;i++){

    const cx=h?x+i:x;
    const cy=h?y:y+i;

    if(board[cy][cx]!==0) return false;

    // ships cannot touch ships (even diagonal)
    if(type==="S"){

      for(let dy=-1;dy<=1;dy++){
        for(let dx=-1;dx<=1;dx++){

          const nx=cx+dx;
          const ny=cy+dy;

          if(nx<0||ny<0||nx>=SIZE||ny>=SIZE) continue;

          if(board[ny][nx]==="S") return false;
        }
      }
    }
  }

  return true;
}

function place(x,y,size,h,type){
  for(let i=0;i<size;i++){
    const cx=h?x+i:x;
    const cy=h?y:y+i;
    board[cy][cx]=type;
  }
}

function validate(){

  let s=0,m=0;

  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      if(board[y][x]==="S") s++;
      if(board[y][x]==="M") m++;
    }
  }

  return s===SHIP_CELLS && m===MINES;
}

function render(){

  const el=document.getElementById("board");
  el.innerHTML="";

  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){

      const c=document.createElement("div");
      c.className="cell";

      if(board[y][x]==="S") c.classList.add("ship");
      if(board[y][x]==="M") c.classList.add("mine");

      el.appendChild(c);
    }
  }
}

document.getElementById("btnReady").onclick=async()=>{

  if(!validate()){
    fleetMsg("INVALID BOARD");
    return;
  }

  const {error}=await db.from("players")
    .update({ready:true,board})
    .eq("id",player.id);

  if(error){
    debug(error);
    fleetMsg("READY ERROR");
    return;
  }

  fleetMsg("READY OK");
  player.ready=true;
};

</script>

</body>
</html>
