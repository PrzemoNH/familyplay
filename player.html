<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Statki – Kontroler</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#0a1628;color:white;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px;gap:20px;
}
h1{font-size:1.6rem;font-weight:900;color:#4fc3f7;}
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:16px;padding:24px;
  width:100%;max-width:360px;
  display:flex;flex-direction:column;gap:14px;
}
label{font-size:0.75rem;font-weight:700;color:#90a4ae;text-transform:uppercase;}
input{
  width:100%;padding:13px 15px;
  border-radius:10px;
  border:1.5px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.08);
  color:white;font-size:1rem;outline:none;
  font-family:inherit;
}
input::placeholder{color:rgba(255,255,255,0.3);}
input:focus{border-color:#4fc3f7;}
.colors{display:flex;gap:10px;justify-content:center;padding:4px 0;}
.cb{
  width:50px;height:50px;border-radius:50%;
  border:4px solid transparent;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.cb.sel{border-color:white !important;transform:scale(1.15);}
.c-red{background:#ef4444;}
.c-yellow{background:#f59e0b;}
.c-green{background:#22c55e;}
.c-black{background:#4b5563;}
.c-white{background:#e5e7eb;}
button#joinBtn{
  width:100%;padding:15px;
  background:#4fc3f7;color:#0a1628;
  font-size:1.05rem;font-weight:900;
  border:none;border-radius:12px;cursor:pointer;
}
button#joinBtn:disabled{background:rgba(79,195,247,0.25);color:rgba(255,255,255,0.3);cursor:not-allowed;}
#msg{font-size:0.82rem;color:#90a4ae;text-align:center;}
#msg.err{color:#ef4444;}
</style>
</head>
<body>
<h1>⚓ STATKI</h1>

<div class="card">
  <label>Nick</label>
  <input type="text" id="nick" placeholder="Wpisz nick..." maxlength="12">

  <label>Kolor</label>
  <div class="colors">
    <div class="cb c-red"   data-c="red"></div>
    <div class="cb c-yellow" data-c="yellow"></div>
    <div class="cb c-green" data-c="green"></div>
    <div class="cb c-black" data-c="black"></div>
    <div class="cb c-white" data-c="white"></div>
  </div>

  <label>Kod pokoju</label>
  <input type="text" id="roomCode" placeholder="np. W66" maxlength="3" style="letter-spacing:3px;text-transform:uppercase;font-weight:800;font-size:1.2rem;">

  <button id="joinBtn" disabled>Dołącz do gry</button>
</div>

<p id="msg">Wypełnij wszystkie pola</p>

<script src="./supabase.min.js"></script>
<script>
var nick = document.getElementById('nick');
var roomCode = document.getElementById('roomCode');
var joinBtn = document.getElementById('joinBtn');
var msg = document.getElementById('msg');
var selColor = localStorage.getItem('fg_color') || null;

// Ustaw zapisany nick
if(localStorage.getItem('fg_nick')) nick.value = localStorage.getItem('fg_nick');
if(localStorage.getItem('fg_room_code')) roomCode.value = localStorage.getItem('fg_room_code').toUpperCase();

// Zaznacz zapisany kolor
if(selColor){
  var saved = document.querySelector('[data-c="'+selColor+'"]');
  if(saved) saved.classList.add('sel');
}

function checkReady(){
  var n = nick.value.trim();
  var r = roomCode.value.trim();
  joinBtn.disabled = !(n.length >= 2 && selColor && r.length >= 2);
}

// Kolory
var colorBtns = document.querySelectorAll('.cb');
for(var i=0; i<colorBtns.length; i++){
  colorBtns[i].addEventListener('click', function(){
    for(var j=0; j<colorBtns.length; j++) colorBtns[j].classList.remove('sel');
    this.classList.add('sel');
    selColor = this.getAttribute('data-c');
    localStorage.setItem('fg_color', selColor);
    checkReady();
  });
}

nick.addEventListener('input', function(){
  localStorage.setItem('fg_nick', this.value.trim());
  checkReady();
});

roomCode.addEventListener('input', function(){
  this.value = this.value.toUpperCase();
  checkReady();
});

joinBtn.addEventListener('click', function(){
  msg.textContent = 'Łączenie... (Supabase wkrótce)';
  msg.className = '';
});

checkReady();
</script>
</body>
</html>
