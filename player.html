<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI PLAYER</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background: radial-gradient(circle at top, #0d1b2a, #000814);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  flex-direction:column;
  gap:12px;
  padding:20px;
}

/* UI */
input, button{
  padding:12px;
  font-size:16px;
  width:280px;
  border-radius:10px;
}

button{
  background:#4fc3f7;
  border:none;
  font-weight:700;
  cursor:pointer;
  color:#001018;
}

/* TOP BAR */
#topBar{
  display:none;
  flex-direction:column;
  gap:6px;
  padding:10px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
}

/* GEAR MENU */
#menu{
  display:none;
  flex-direction:column;
  gap:8px;
  margin-top:6px;
}

.menuBtn{
  background:#ff4d4d;
  color:white;
}

/* LOGIN */
#loginScreen{
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* GAME */
#fleetScreen{
  display:none;
  flex-direction:column;
  align-items:center;
}

/* BOARD */
#board{
  width:260px;
  height:260px;
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:2px;
}

.cell{ background:#1b3b5c; }
</style>
</head>

<body>

<h2>⚓ STATKI PLAYER</h2>

<!-- TOP BAR -->
<div id="topBar">
  <div>👤 <span id="uiNick"></span></div>
  <div>🏠 <span id="uiRoom"></span></div>

  <button onclick="toggleMenu()">⚙️ Opcje</button>

  <div id="menu">
    <button class="menuBtn" onclick="leaveRoom()">🚪 Wyjdź z pokoju</button>
    <button class="menuBtn" onclick="newAccount()">🆕 Nowe konto</button>
  </div>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <input id="room" placeholder="ROOM CODE">
  <input id="nick" placeholder="NICK">
  <button id="joinBtn">JOIN</button>
  <p id="msg"></p>
</div>

<!-- GAME -->
<div id="fleetScreen">
  <h3>Rozstaw floty</h3>
  <div id="board"></div>
</div>

<script>

//////////////////////////////////////////////////////
// INIT
//////////////////////////////////////////////////////
const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBod29nZ3htZG10eWN2eXJjeWJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODEyMDgsImV4cCI6MjA5Njk1NzIwOH0.2XuaVqP0p21Nd07w1GCqwEkewJsJKucRYemys0B4wJ0"
);

const COLORS = ["blue","green","yellow","red"];

let player=null;
let room=null;

//////////////////////////////////////////////////////
// DEVICE ID (IMPORTANT FIX)
//////////////////////////////////////////////////////
function getPlayerId(){
  let id = localStorage.getItem("player_id");
  if(!id){
    id = crypto.randomUUID();
    localStorage.setItem("player_id", id);
  }
  return id;
}

/* NEW ACCOUNT RESET */
function newAccount(){
  localStorage.removeItem("player_id");
  location.reload();
}

//////////////////////////////////////////////////////
// MENU
//////////////////////////////////////////////////////
function toggleMenu(){
  const m = document.getElementById("menu");
  m.style.display = m.style.display==="flex" ? "none" : "flex";
}

//////////////////////////////////////////////////////
// JOIN FIXED LOGIC
//////////////////////////////////////////////////////
document.getElementById("joinBtn").onclick = async () => {

  const code = document.getElementById("room").value.trim().toUpperCase();
  const nick = document.getElementById("nick").value.trim();

  if(!code || !nick){
    msg("❌ Brak danych");
    return;
  }

  const device_id = getPlayerId();

  const { data: roomData } = await db
    .from("rooms")
    .select("*")
    .eq("code", code)
    .single();

  if(!roomData){
    msg("❌ Brak pokoju");
    return;
  }

  room = roomData;

  // 🔥 RECONNECT
  const { data: existing } = await db
    .from("players")
    .select("*")
    .eq("room_id", room.id)
    .eq("device_id", device_id)
    .maybeSingle();

  if(existing){
    player = existing;
    showGame();
    return;
  }

  // COLORS
  const { data: players } = await db
    .from("players")
    .select("color")
    .eq("room_id", room.id);

  const used = (players||[]).map(p=>p.color);
  const color = COLORS.find(c=>!used.includes(c));

  if(!color){
    msg("❌ Pokój pełny");
    return;
  }

  const { data, error } = await db
    .from("players")
    .insert({
      room_id: room.id,
      nick,
      color,
      device_id,
      ready:false
    })
    .select()
    .single();

  if(error){
    msg("❌ Błąd join");
    return;
  }

  player=data;
  showGame();
};

//////////////////////////////////////////////////////
// UI
//////////////////////////////////////////////////////
function showGame(){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("fleetScreen").style.display="flex";
  document.getElementById("topBar").style.display="flex";

  document.getElementById("uiNick").innerText=player.nick;
  document.getElementById("uiRoom").innerText=room.code;
}

function msg(t){
  document.getElementById("msg").innerText=t;
}

//////////////////////////////////////////////////////
// LEAVE ROOM
//////////////////////////////////////////////////////
async function leaveRoom(){
  if(player){
    await db.from("players")
      .delete()
      .eq("id", player.id);
  }
  location.reload();
}

</script>
</body>
</html>
