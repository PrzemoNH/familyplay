<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STATKI – Kontroler</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>

<style>
* { box-sizing: border-box; margin:0; padding:0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0d1b2a, #000814);
  color: white;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  gap: 12px;
}

h2 { color: #4fc3f7; margin-bottom: 10px; }

input, button {
  padding: 14px;
  font-size: 16px;
  width: 280px;
  max-width: 90vw;
  border-radius: 10px;
}

button {
  background: #4fc3f7;
  border: none;
  font-weight: 700;
  cursor: pointer;
  color: #001018;
}

#topBar {
  display: none;
  flex-direction: column;
  gap: 6px;
  padding: 12px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  width: 100%;
  max-width: 380px;
}

#loginScreen, #fleetScreen {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}

#board {
  width: 280px;
  height: 280px;
  background: #0f2a44;
  display: grid;
  grid-template-columns: repeat(15, 1fr);
  gap: 2px;
  border-radius: 12px;
  overflow: hidden;
}

.cell {
  background: #1b3b5c;
}
</style>
</head>

<body>

<h2>⚓ STATKI</h2>

<!-- TOP BAR -->
<div id="topBar">
  <div>👤 <span id="uiNick"></span></div>
  <div>🏠 <span id="uiRoom"></span></div>
</div>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <input id="room" placeholder="KOD POKOJU" style="text-transform:uppercase; text-align:center;">
  <input id="nick" placeholder="TWÓJ NICK">
  <button id="joinBtn">DOŁĄCZ DO GRY</button>
  <p id="msg"></p>
</div>

<!-- FLEET SCREEN -->
<div id="fleetScreen">
  <h3>Rozstaw flotę</h3>
  <div id="board"></div>
</div>

<script>
// ===================== SUPABASE =====================
const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "sb_publishable_rY0--Wp81TkcuPbo_C-u1w_zEhkiuQ1"
);

let player = null;
let room = null;

// ===================== DEVICE ID =====================
function getDeviceId() {
  let id = localStorage.getItem("device_id");
  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem("device_id", id);
  }
  return id;
}

// ===================== JOIN =====================
document.getElementById("joinBtn").onclick = async () => {
  const code = document.getElementById("room").value.trim().toUpperCase();
  const nick = document.getElementById("nick").value.trim();

  if (!code || !nick) {
    msg("❌ Podaj kod i nick");
    return;
  }

  const device_id = getDeviceId();

  try {
    // Pobierz pokój
    const { data: roomData } = await db
      .from("rooms")
      .select("*")
      .eq("code", code)
      .maybeSingle();

    if (!roomData) {
      msg("❌ Pokój nie istnieje");
      return;
    }

    room = roomData;

    // Sprawdź reconnect
    const { data: existing } = await db
      .from("players")
      .select("*")
      .eq("room_id", room.id)
      .eq("device_id", device_id)
      .maybeSingle();

    if (existing) {
      player = existing;
      showGame();
      return;
    }

    // Automatyczny kolor
    const { data: allPlayers } = await db
      .from("players")
      .select("color")
      .eq("room_id", room.id);

    const used = (allPlayers || []).map(p => p.color);
    const COLORS = ["red", "yellow", "green", "blue", "purple"];
    const color = COLORS.find(c => !used.includes(c)) || "gray";

    // Dodaj gracza
    const { data: newPlayer, error } = await db
      .from("players")
      .insert({
        room_id: room.id,
        nick: nick,
        color: color,
        device_id: device_id
      })
      .select()
      .single();

    if (error) throw error;

    player = newPlayer;
    showGame();

  } catch (e) {
    console.error(e);
    msg("❌ Błąd: " + (e.message || "Nieznany"));
  }
};

function msg(text) {
  document.getElementById("msg").innerText = text;
}

function showGame() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("fleetScreen").style.display = "flex";
  document.getElementById("topBar").style.display = "flex";

  document.getElementById("uiNick").innerText = player.nick;
  document.getElementById("uiRoom").innerText = room.code;

  buildBoard();
}

function buildBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";
  for (let i = 0; i < 225; i++) {
    const cell = document.createElement("div");
    cell.className = "cell";
    board.appendChild(cell);
  }
}
</script>
</body>
</html>
