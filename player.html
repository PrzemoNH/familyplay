<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI PLAYER</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a1628;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  gap:12px;
  padding:20px;
}

input, button{
  padding:12px;
  font-size:16px;
  width:280px;
  max-width:90vw;
}

button{
  background:#4fc3f7;
  border:none;
  font-weight:700;
  cursor:pointer;
}

#msg{
  text-align:center;
  min-height:20px;
}

/* ===== FLEET SCREEN ===== */
#fleetScreen{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

#board{
  width:260px;
  height:260px;
  background:#0f2a44;
  display:grid;
  grid-template-columns:repeat(10,1fr);
  grid-template-rows:repeat(10,1fr);
  gap:2px;
}

.cell{
  background:#1b3b5c;
}

/* ===== DEBUG ===== */
#debug{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  font-size:11px;
  padding:6px;
  background:#000000aa;
  color:#00ffcc;
  font-family:monospace;
  display:none;
}
</style>
</head>

<body>

<h2>⚓ STATKI PLAYER</h2>

<!-- LOGIN -->
<div id="loginScreen">
  <input id="room" placeholder="ROOM CODE">
  <input id="nick" placeholder="NICK">
  <button id="joinBtn">JOIN</button>
  <p id="msg"></p>
</div>

<!-- FLEET -->
<div id="fleetScreen">
  <h3>Rozstaw floty</h3>
  <div id="board"></div>
  <button onclick="toggleDebug()">DEBUG ON/OFF</button>
</div>

<!-- DEBUG -->
<div id="debug"></div>

<script>

const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBod29nZ3htZG10eWN2eXJjeWJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODEyMDgsImV4cCI6MjA5Njk1NzIwOH0.2XuaVqP0p21Nd07w1GCqwEkewJsJKucRYemys0B4wJ0"
);

const COLORS = ["blue", "green", "yellow", "red"];

let debugOn = false;
let playerData = null;
let roomData = null;

// ===== URL ROOM =====
const params = new URLSearchParams(window.location.search);
const roomFromUrl = params.get("room");

if(roomFromUrl){
  document.getElementById("room").value = roomFromUrl.toUpperCase();
}

// ===== DEBUG =====
function logDebug(text){
  if(!debugOn) return;
  document.getElementById("debug").innerText = text;
}

function toggleDebug(){
  debugOn = !debugOn;
  document.getElementById("debug").style.display = debugOn ? "block" : "none";
}

// ===== JOIN =====
document.getElementById("joinBtn").onclick = async () => {

  const code = document.getElementById("room").value.trim().toUpperCase();
  const nick = document.getElementById("nick").value.trim();

  if(!code || !nick){
    document.getElementById("msg").innerText = "❌ Podaj dane";
    return;
  }

  document.getElementById("msg").innerText = "🔍 Łączenie...";

  // ROOM
  const { data: room } = await db
    .from("rooms")
    .select("id, code")
    .eq("code", code)
    .single();

  if(!room){
    document.getElementById("msg").innerText = "❌ Brak pokoju";
    return;
  }

  roomData = room;

  // PLAYERS
  const { data: players } = await db
    .from("players")
    .select("id, color")
    .eq("room_id", room.id);

  const usedColors = (players || []).map(p => p.color);
  const color = COLORS.find(c => !usedColors.includes(c));

  if(!color){
    document.getElementById("msg").innerText = "❌ Pokój pełny";
    return;
  }

  const isHost = !players || players.length === 0;

  // INSERT PLAYER
  const { data: inserted, error } = await db
    .from("players")
    .insert({
      room_id: room.id,
      nick,
      color,
      is_host: isHost,
      ready: false
    })
    .select()
    .single();

  if(error){
    document.getElementById("msg").innerText = "❌ Błąd join";
    return;
  }

  playerData = inserted;

  document.getElementById("msg").innerText =
    `✔ OK | ${nick} | ${color} ${isHost ? "⚙️ HOST" : ""}`;

  logDebug(JSON.stringify({
    room,
    player: inserted,
    usedColors
  }, null, 2));

  // 👉 PRZEJŚCIE DO FLEET SCREEN
  goToFleetScreen();
};

// ===== FLEET SCREEN =====
function goToFleetScreen(){
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("fleetScreen").style.display = "flex";

  generateBoard();
}

function generateBoard(){
  const board = document.getElementById("board");
  board.innerHTML = "";

  for(let i=0;i<100;i++){
    const div = document.createElement("div");
    div.className = "cell";
    board.appendChild(div);
  }
}

</script>

</body>
</html>
