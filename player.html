<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI PLAYER</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background: radial-gradient(circle at top, #0d1b2a, #000814);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  flex-direction:column;
  gap:12px;
  padding:20px;
}

input, button{
  padding:12px;
  font-size:16px;
  width:280px;
  max-width:90vw;
  border-radius:10px;
}

button{
  background:#4fc3f7;
  border:none;
  font-weight:700;
  cursor:pointer;
  color:#001018;
}

button.secondary{
  background:#ff4d4d;
  color:white;
}

#topBar{
  display:none;
  flex-direction:column;
  gap:6px;
  align-items:center;
  padding:10px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(79,195,247,0.2);
}

#loginScreen{
  display:flex;
  flex-direction:column;
  gap:10px;
  align-items:center;
}

#fleetScreen{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

#board{
  width:260px;
  height:260px;
  background:#0f2a44;
  display:grid;
  grid-template-columns:repeat(10,1fr);
  grid-template-rows:repeat(10,1fr);
  gap:2px;
  border-radius:12px;
  overflow:hidden;
}

.cell{ background:#1b3b5c; }

#msg{
  min-height:20px;
  text-align:center;
  font-size:14px;
  opacity:0.9;
}
</style>
</head>

<body>

<h2>⚓ STATKI PLAYER</h2>

<!-- TOP BAR -->
<div id="topBar">
  <div>👤 <span id="uiNick"></span></div>
  <div>🏠 <span id="uiRoom"></span></div>
  <button class="secondary" id="leaveBtn">🚪 Wyjdź z pokoju</button>
  <button class="secondary" id="resetBtn">🧨 Usuń konto (reset)</button>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <input id="room" placeholder="ROOM CODE">
  <input id="nick" placeholder="NICK">
  <button id="joinBtn">JOIN</button>
  <p id="msg"></p>
</div>

<!-- GAME -->
<div id="fleetScreen">
  <h3>Rozstaw floty</h3>
  <div id="board"></div>
</div>

<script>

//////////////////////////////////////////////////////
// INIT
//////////////////////////////////////////////////////
const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBod29nZ3htZG10eWN2eXJjeWJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODEyMDgsImV4cCI6MjA5Njk1NzIwOH0.2XuaVqP0p21Nd07w1GCqwEkewJsJKucRYemys0B4wJ0"
);

const COLORS = ["blue","green","yellow","red"];

let player = null;
let room = null;

//////////////////////////////////////////////////////
// DEVICE ID (1 konto = 1 urządzenie)
//////////////////////////////////////////////////////
function getDeviceId(){
  let id = localStorage.getItem("device_id");

  if(!id){
    id = crypto.randomUUID();
    localStorage.setItem("device_id", id);
  }

  return id;
}

//////////////////////////////////////////////////////
// UI
//////////////////////////////////////////////////////
function showTopBar(){
  document.getElementById("topBar").style.display = "flex";
  document.getElementById("uiNick").innerText = player.nick;
  document.getElementById("uiRoom").innerText = room.code;
}

function showGame(){
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("fleetScreen").style.display = "flex";
  showTopBar();
}

function resetUI(){
  document.getElementById("topBar").style.display = "none";
  document.getElementById("fleetScreen").style.display = "none";
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("msg").innerText = "";
}

//////////////////////////////////////////////////////
// JOIN LOGIC
//////////////////////////////////////////////////////
document.getElementById("joinBtn").onclick = async () => {

  const code = document.getElementById("room").value.trim().toUpperCase();
  const nick = document.getElementById("nick").value.trim();

  if(!code || !nick){
    document.getElementById("msg").innerText = "❌ wpisz nick i kod";
    return;
  }

  const device_id = getDeviceId();
  document.getElementById("msg").innerText = "Łączenie...";

  // ROOM
  const { data: roomData } = await db
    .from("rooms")
    .select("id,code,host_id")
    .eq("code", code)
    .maybeSingle();

  if(!roomData){
    document.getElementById("msg").innerText = "❌ Nie ma takiego pokoju";
    return;
  }

  room = roomData;

  // RECONNECT
  const { data: existing } = await db
    .from("players")
    .select("*")
    .eq("room_id", room.id)
    .eq("device_id", device_id)
    .maybeSingle();

  if(existing){
    player = existing;

    document.getElementById("msg").innerText =
      `✔ wracasz jako: ${player.nick}`;

    showGame();
    return;
  }

  // COLORS
  const { data: players } = await db
    .from("players")
    .select("color")
    .eq("room_id", room.id);

  const used = (players || []).map(p => p.color);
  const color = COLORS.find(c => !used.includes(c));

  if(!color){
    document.getElementById("msg").innerText = "❌ Pokój pełny";
    return;
  }

  // HOST
  let isHost = false;

  if(!room.host_id){
    isHost = true;

    await db
      .from("rooms")
      .update({ host_id: device_id })
      .eq("id", room.id);
  }

  // CREATE PLAYER
  const { data: inserted, error } = await db
    .from("players")
    .insert({
      room_id: room.id,
      nick,
      color,
      device_id,
      is_host: isHost,
      ready: false
    })
    .select()
    .single();

  if(error){
    document.getElementById("msg").innerText = "❌ Błąd tworzenia gracza";
    console.log(error);
    return;
  }

  player = inserted;

  document.getElementById("msg").innerText =
    `✔ ${nick} (${color})` + (isHost ? " 👑 HOST" : "");

  showGame();
};

//////////////////////////////////////////////////////
// LEAVE ROOM
//////////////////////////////////////////////////////
document.getElementById("leaveBtn").onclick = async () => {

  if(player){
    await db
      .from("players")
      .delete()
      .eq("id", player.id);
  }

  player = null;
  room = null;

  resetUI();
};

//////////////////////////////////////////////////////
// RESET DEVICE (NOWE KONTO)
//////////////////////////////////////////////////////
document.getElementById("resetBtn").onclick = async () => {

  localStorage.removeItem("device_id");

  player = null;
  room = null;

  resetUI();

  document.getElementById("msg").innerText =
    "🧨 urządzenie zresetowane — możesz stworzyć nowe konto";
};

</script>

</body>
</html>
