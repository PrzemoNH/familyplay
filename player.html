<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI PLAYER</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a1628;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  gap:12px;
}

input, button{
  padding:12px;
  font-size:16px;
}
button{
  background:#4fc3f7;
  border:none;
  font-weight:700;
}
</style>
</head>

<body>

<h2>⚓ STATKI PLAYER</h2>

<input id="room" placeholder="ROOM CODE">
<input id="nick" placeholder="NICK">
<button id="joinBtn">JOIN</button>

<p id="msg"></p>

<script>

const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "YOUR_ANON_KEY"
);

const roomInput = document.getElementById("room");
const nickInput = document.getElementById("nick");
const msg = document.getElementById("msg");

let room = null;

// QR auto fill
const urlParams = new URLSearchParams(window.location.search);
const roomFromUrl = urlParams.get("room");

if(roomFromUrl){
  roomInput.value = roomFromUrl.toUpperCase().trim();
  msg.innerText = "📡 Room z QR: " + roomInput.value;
}

// JOIN
document.getElementById("joinBtn").onclick = async () => {

  const code = roomInput.value.trim().toUpperCase();
  const nick = nickInput.value.trim();

  if(!code || !nick){
    msg.innerText = "Brak danych";
    return;
  }

  const { data, error } = await db
    .from("rooms")
    .select("id,code")
    .eq("code", code)
    .maybeSingle();

  console.log("ROOM RESULT:", data);

  if(error){
    msg.innerText = "❌ Room error: " + error.message;
    return;
  }

  // ✅ FIX 1: poprawne sprawdzenie
  if(!data){
    msg.innerText = "❌ Pokój nie istnieje";
    return;
  }

  // ✅ FIX 2: zapisujemy room
  room = data;

  const { error: insertError } = await db
    .from("players")
    .insert({
      room_id: room.id,
      nick: nick,
      color: "blue",
      ready: false
    });

  if(insertError){
    msg.innerText = "❌ Player error: " + insertError.message;
    return;
  }

  msg.innerText = "✔ Dołączono do pokoju " + room.code;
};

</script>

</body>
</html>
