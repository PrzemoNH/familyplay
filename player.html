<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI PLAYER</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a1628;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  gap:12px;
}

input, button{
  padding:12px;
  font-size:16px;
}
button{
  background:#4fc3f7;
  border:none;
  font-weight:700;
}
</style>
</head>

<body>

<h2>⚓ STATKI PLAYER</h2>

<input id="room" placeholder="ROOM CODE">
<input id="nick" placeholder="NICK">
<button id="joinBtn">JOIN</button>

<p id="msg"></p>

<script>

const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "WSTAW_TU_POPRAWNY_ANON_KEY"
);

const roomInput = document.getElementById("room");
const nickInput = document.getElementById("nick");
const msg = document.getElementById("msg");

// ===================== URL AUTO FILL =====================
const urlParams = new URLSearchParams(window.location.search);
const roomFromUrl = urlParams.get("room");

if(roomFromUrl){
  roomInput.value = roomFromUrl.toUpperCase().trim();
  msg.innerText = "📡 Room z QR: " + roomInput.value;
}

// ===================== JOIN =====================
document.getElementById("joinBtn").onclick = async () => {

  const code = roomInput.value.trim().toUpperCase();
  const nick = nickInput.value.trim();

  console.log("JOIN DEBUG CODE:", code);

  if(!code || !nick){
    msg.innerText = "Brak danych";
    return;
  }

  const { data, error } = await db
    .from("rooms")
    .select("id,code")
    .eq("code", code)
    .maybeSingle();

  console.log("SUPABASE ROOM RESULT:", data);
  console.log("SUPABASE ERROR:", error);

  if(error){
    msg.innerText = "❌ Room error: " + error.message;
    return;
  }

  if(!data){
    msg.innerText = "❌ Pokój nie istnieje: " + code;
    return;
  }

  msg.innerText = "✔ Dołączono do pokoju " + data.code;
};

</script>

</body>
</html>
