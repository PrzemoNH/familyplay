<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI PLAYER</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background: radial-gradient(circle at top, #0d1b2a, #000814);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  width:420px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(79,195,247,0.25);
  border-radius:16px;
  padding:20px;
  text-align:center;
}

#code{
  font-size:48px;
  font-weight:900;
  color:#4fc3f7;
}

#status{
  margin-top:12px;
  padding:10px;
  background:rgba(0,0,0,0.6);
  border-radius:10px;
  font-size:13px;
  white-space:pre-line;
}
</style>
</head>

<body>

<div class="card">
  <h2>🎮 PLAYER</h2>
  <div id="code">---</div>
  <div id="status">INIT...</div>
</div>

<script>

const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBod29nZ3htZG10eWN2eXJjeWJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODEyMDgsImV4cCI6MjA5Njk1NzIwOH0.2XuaVqP0p21Nd07w1GCqwEkewJsJKucRYemys0B4wJ0"
);

function log(msg){
  console.log(msg);
  document.getElementById("status").innerText += "\n" + msg;
}

window.onload = async () => {

  log("INIT...");

  // 1. READ URL
  const roomCodeRaw = new URLSearchParams(window.location.search).get("room");

  log("ROOM RAW: " + roomCodeRaw);

  if(!roomCodeRaw){
    log("❌ BRAK ROOM W URL");
    return;
  }

  // 2. NORMALIZE
  const roomCode = roomCodeRaw.trim().toUpperCase();

  log("ROOM NORMALIZED: " + roomCode);

  // 3. QUERY SUPABASE
  log("STEP: SEARCH ROOM");

  const { data, error } = await db
    .from("rooms")
    .select("*")
    .eq("code", roomCode)
    .maybeSingle();

  log("RESULT: " + JSON.stringify(data));
  log("ERROR: " + JSON.stringify(error));

  // 4. HANDLE RESULT
  if(error){
    log("❌ SUPABASE ERROR");
    return;
  }

  if(!data){
    log("❌ BRAK POKOJU W BAZIE");
    document.getElementById("code").innerText = "NO ROOM";
    return;
  }

  // 5. SUCCESS
  log("✅ ROOM FOUND");
  document.getElementById("code").innerText = data.code;
  document.getElementById("status").innerText = "CONNECTED ✔";
};

</script>

</body>
</html>
