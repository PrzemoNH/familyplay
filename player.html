<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI PLAYER 3.1.1 FIX</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a1628;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

input,button{
  padding:12px;
  width:280px;
  font-size:16px;
  margin:5px;
}

button{
  background:#4fc3f7;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

#fleetScreen{ display:none; }

#board{
  display:grid;
  grid-template-columns:repeat(10,30px);
  gap:2px;
  margin-top:10px;
}

.cell{
  width:30px;
  height:30px;
  background:#1b3b5c;
}
</style>
</head>

<body>

<h2>⚓ STATKI PLAYER 3.1.1 FIX</h2>

<div id="login">
  <input id="room" placeholder="ROOM CODE">
  <input id="nick" placeholder="NICK (opcjonalnie)">
  <button id="joinBtn">DOŁĄCZ</button>
  <p id="msg"></p>
</div>

<div id="fleetScreen">
  <h3>Rozstaw floty</h3>
  <div id="board"></div>
  <button id="btnReady">✅ GOTOWY</button>
</div>

<script>

const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBod29nZ3htZG10eWN2eXJjeWJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODEyMDgsImV4cCI6MjA5Njk1NzIwOH0.2XuaVqP0p21Nd07w1GCqwEkewJsJKucRYemys0B4wJ0"
);

let room = null;
let player = null;
let board = [];

const SIZE = 10;

/* ================= NICK ================= */
function randomNick(){
  const a = ["Niebieski","Czerwony","Zielony","Złoty","Czarny"];
  const b = ["Rekin","Krab","Wilk","Smok","Foka"];
  const c = ["Pirat","Bosman","Kapitan","Wiking"];

  return `${a[Math.floor(Math.random()*a.length)]} ` +
         `${b[Math.floor(Math.random()*b.length)]} ` +
         `${c[Math.floor(Math.random()*c.length)]}`;
}

/* ================= DEVICE ================= */
function deviceId(){
  let id = localStorage.getItem("device");
  if(!id){
    id = crypto.randomUUID();
    localStorage.setItem("device", id);
  }
  return id;
}

/* ================= MSG ================= */
function msg(t){
  document.getElementById("msg").innerText = t;
}

/* ================= JOIN ================= */
document.getElementById("joinBtn").onclick = async () => {

  const code = document.getElementById("room").value.trim().toUpperCase();
  let nick = document.getElementById("nick").value.trim();

  if(!code){
    msg("❌ Brak kodu pokoju");
    return;
  }

  if(!nick) nick = randomNick();

  msg("Łączenie...");

  const { data: roomData, error: roomErr } = await db
    .from("rooms")
    .select("id, code")
    .eq("code", code)
    .maybeSingle();

  if(roomErr || !roomData){
    console.error(roomErr);
    msg("❌ Brak pokoju");
    return;
  }

  room = roomData;

  if(!room?.id){
    msg("❌ ROOM ID ERROR");
    return;
  }

  const did = deviceId();

  // sprawdź czy już istnieje
  const { data: existing } = await db
    .from("players")
    .select("*")
    .eq("room_id", room.id)
    .eq("device_id", did)
    .maybeSingle();

  if(existing){
    player = existing;
    goFleet();
    return;
  }

  // INSERT FIXED (IMPORTANT!)
  const { data: inserted, error: insErr } = await db
    .from("players")
    .insert({
      room_id: room.id,
      nick,
      device_id: did,
      ready: false,
      board: null
    })
    .select()
    .single();   // 🔥 FIX HERE

  if(insErr || !inserted){
    console.error(insErr);
    msg("❌ Błąd JOIN (insert)");
    return;
  }

  player = inserted;

  msg(`✔ ${player.nick}`);
  goFleet();
};

/* ================= FLEET ================= */
function goFleet(){
  document.getElementById("login").style.display = "none";
  document.getElementById("fleetScreen").style.display = "flex";

  generateBoard();
}

/* ================= BOARD ================= */
function generateBoard(){

  board = Array.from({length:SIZE}, () => Array(SIZE).fill(0));

  const fleet = [4,3,3,2,2,2,1,1,1];

  let id = 1;

  for(const size of fleet){
    let placed = false;

    for(let t=0;t<200 && !placed;t++){

      const h = Math.random() < 0.5;
      const x = Math.floor(Math.random() * (h ? SIZE - size : SIZE));
      const y = Math.floor(Math.random() * (h ? SIZE : SIZE - size));

      if(canPlace(x,y,size,h)){
        place(x,y,size,h,id++);
        placed = true;
      }
    }
  }

  render();
}

function canPlace(x,y,size,h){
  for(let i=0;i<size;i++){
    let cx = h ? x+i : x;
    let cy = h ? y : y+i;

    if(board[cy][cx] !== 0) return false;
  }
  return true;
}

function place(x,y,size,h,id){
  for(let i=0;i<size;i++){
    let cx = h ? x+i : x;
    let cy = h ? y : y+i;
    board[cy][cx] = id;
  }
}

function render(){
  const el = document.getElementById("board");
  el.innerHTML = "";

  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      const c = document.createElement("div");
      c.className = "cell";
      el.appendChild(c);
    }
  }
}

/* ================= READY ================= */
document.getElementById("btnReady").onclick = async () => {

  const { error } = await db
    .from("players")
    .update({
      ready: true,
      board: board
    })
    .eq("id", player.id);

  if(error){
    console.error(error);
    msg("❌ READY ERROR");
    return;
  }

  msg("✔ GOTOWY");
};

</script>

</body>
</html>
