<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI PLAYER 3.2.0 DEBUG</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a1628;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

input,button{
  padding:12px;
  width:280px;
  font-size:16px;
  margin:5px;
}

button{
  background:#4fc3f7;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

#fleetScreen{ display:none; }

#board{
  display:grid;
  grid-template-columns:repeat(10,30px);
  gap:2px;
  margin-top:10px;
}

.cell{
  width:30px;
  height:30px;
  background:#1b3b5c;
}

.cell.ship{ background:#4fc3f7; }

#debug{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#000;
  color:#00ffcc;
  font-size:11px;
  padding:6px;
  font-family:monospace;
  max-height:160px;
  overflow:auto;
}
</style>
</head>

<body>

<h2>⚓ PLAYER 3.2.0 DEBUG CORE</h2>

<div id="login">
  <input id="room" placeholder="ROOM CODE">
  <input id="nick" placeholder="NICK (opcjonalnie)">
  <button id="joinBtn">JOIN</button>
  <p id="msg"></p>
</div>

<div id="fleetScreen">
  <h3>Rozstaw floty</h3>
  <div id="board"></div>
  <button id="btnReady">READY</button>
</div>

<div id="debug">INIT...</div>

<script>

/* ================= CONFIG ================= */
const SUPABASE_URL = "https://phwoggxmdmtycvyrcyba.supabase.co";
const SUPABASE_KEY = "WSTAW_TUTAJ_API_KEY";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ================= DEBUG ENGINE ================= */
function debug(msg){
  console.log(msg);
  document.getElementById("debug").innerText += "\n" + JSON.stringify(msg);
}

/* ================= STATE ================= */
let room = null;
let player = null;
let board = [];

const SIZE = 10;

/* ================= NICK GENERATOR ================= */
function randomNick(){
  const a = ["Czarny","Złoty","Srebrny","Morski","Czerwony"];
  const b = ["Rekin","Krab","Wilk","Smok","Orzeł"];
  const c = ["Pirat","Kapitan","Bosman"];

  return `${a[Math.floor(Math.random()*a.length)]} ${b[Math.floor(Math.random()*b.length)]} ${c[Math.floor(Math.random()*c.length)]}`;
}

/* ================= DEVICE ================= */
function deviceId(){
  let id = localStorage.getItem("device");
  if(!id){
    id = crypto.randomUUID();
    localStorage.setItem("device", id);
  }
  return id;
}

/* ================= MSG ================= */
function msg(t){
  document.getElementById("msg").innerText = t;
}

/* ================= JOIN ================= */
document.getElementById("joinBtn").onclick = async () => {

  const code = document.getElementById("room").value.trim().toUpperCase();
  let nick = document.getElementById("nick").value.trim();

  debug({step:"JOIN_START", code, nick});

  if(!code){
    msg("Brak kodu");
    return;
  }

  if(!nick) nick = randomNick();

  const { data: roomData, error: roomErr } = await db
    .from("rooms")
    .select("id, code")
    .eq("code", code)
    .maybeSingle();

  debug({roomData, roomErr});

  if(roomErr || !roomData){
    msg("Brak pokoju");
    return;
  }

  room = roomData;

  if(!room?.id){
    msg("ROOM ERROR");
    debug(room);
    return;
  }

  const did = deviceId();

  const { data: existing } = await db
    .from("players")
    .select("*")
    .eq("room_id", room.id)
    .eq("device_id", did)
    .maybeSingle();

  debug({existing});

  if(existing){
    player = existing;
    goFleet();
    return;
  }

  const payload = {
    room_id: room.id,
    nick,
    device_id: did,
    color: "blue",
    ready: false,
    is_host: false,
    is_active: true
  };

  debug({insert_payload: payload});

  const { data: inserted, error: insErr } = await db
    .from("players")
    .insert(payload)
    .select()
    .single();

  debug({inserted, insErr});

  if(insErr || !inserted){
    msg("JOIN ERROR");
    debug(insErr);
    return;
  }

  player = inserted;

  msg("✔ JOIN OK");
  goFleet();
};

/* ================= FLEET ================= */
function goFleet(){
  document.getElementById("login").style.display = "none";
  document.getElementById("fleetScreen").style.display = "flex";

  generateBoard();
}

/* ================= BOARD ================= */
function generateBoard(){

  board = Array.from({length:SIZE}, ()=>Array(SIZE).fill(0));

  const fleet = [4,3,3,2,2,2,1,1,1];

  let id = 1;

  for(const size of fleet){
    let placed = false;

    for(let t=0;t<200 && !placed;t++){

      const h = Math.random() < 0.5;
      const x = Math.floor(Math.random() * (h ? SIZE-size : SIZE));
      const y = Math.floor(Math.random() * (h ? SIZE : SIZE-size));

      if(canPlace(x,y,size,h)){
        place(x,y,size,h,id++);
        placed = true;
      }
    }
  }

  render();
}

/* ================= VALID ================= */
function canPlace(x,y,size,h){
  for(let i=0;i<size;i++){
    let cx = h ? x+i : x;
    let cy = h ? y : y+i;
    if(board[cy][cx] !== 0) return false;
  }
  return true;
}

/* ================= PLACE ================= */
function place(x,y,size,h,id){
  for(let i=0;i<size;i++){
    let cx = h ? x+i : x;
    let cy = h ? y : y+i;
    board[cy][cx] = id;
  }
}

/* ================= RENDER ================= */
function render(){
  const el = document.getElementById("board");
  el.innerHTML = "";

  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      const c = document.createElement("div");
      c.className = "cell";
      if(board[y][x] !== 0) c.classList.add("ship");
      el.appendChild(c);
    }
  }
}

/* ================= READY ================= */
document.getElementById("btnReady").onclick = async () => {

  debug({step:"READY", player});

  const { error } = await db
    .from("players")
    .update({ ready: true, board })
    .eq("id", player.id);

  debug({ready_error: error});

  if(error){
    msg("READY ERROR");
    return;
  }

  msg("GOTOWY");
};

</script>

</body>
</html>
