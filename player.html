<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STATKI – Kontroler</title>
<style>
* { box-sizing: border-box; margin:0; padding:0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a1628;
  color: white;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  gap: 20px;
}
h1 { font-size: 1.6rem; font-weight: 900; color: #4fc3f7; letter-spacing: 1px; }
.sub { font-size: 0.85rem; color: #90a4ae; }
.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 24px;
  width: 100%;
  max-width: 360px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
label {
  font-size: 0.75rem;
  font-weight: 700;
  color: #90a4ae;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
input {
  width: 100%;
  padding: 13px 15px;
  border-radius: 10px;
  border: 1.5px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 1rem;
  outline: none;
}
.colors {
  display: flex;
  gap: 12px;
  justify-content: center;
  padding: 8px 0;
  flex-wrap: wrap;
}
.cb {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: 4px solid transparent;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: 0.2s;
}
.cb.sel {
  border-color: #ffffff !important;
  box-shadow: 0 0 0 4px rgba(255,255,255,0.4);
  transform: scale(1.12);
}
.c-red { background: #ef4444; }
.c-yellow { background: #f59e0b; }
.c-green { background: #22c55e; }
.c-black { background: #4b5563; }
.c-white { background: #e5e7eb; box-shadow: 0 0 0 1px #000; }

#joinBtn {
  width: 100%;
  padding: 16px;
  background: #4fc3f7;
  color: #0a1628;
  font-size: 1.1rem;
  font-weight: 900;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}
#joinBtn:disabled {
  background: rgba(79,195,247,0.3);
  color: rgba(255,255,255,0.4);
}
#msg {
  font-size: 0.85rem;
  text-align: center;
  min-height: 24px;
}
#msg.err { color: #ef4444; }
#msg.ok { color: #22c55e; }
</style>
</head>
<body>

<h1>⚓ STATKI</h1>
<p class="sub">Dołącz do gry</p>

<div class="card">
  <label for="nick">Twój nick</label>
  <input type="text" id="nick" placeholder="Wpisz nick..." maxlength="12" autocomplete="off">

  <label>Wybierz kolor</label>
  <div class="colors">
    <div class="cb c-red" data-c="red"></div>
    <div class="cb c-yellow" data-c="yellow"></div>
    <div class="cb c-green" data-c="green"></div>
    <div class="cb c-black" data-c="black"></div>
    <div class="cb c-white" data-c="white"></div>
  </div>

  <label for="roomCode">Kod pokoju</label>
  <input type="text" id="roomCode" placeholder="np. A96" maxlength="5" autocomplete="off"
         style="text-transform:uppercase; text-align:center; letter-spacing:4px; font-size:1.2rem;">

  <button id="joinBtn" disabled>Dołącz do gry</button>
</div>

<p id="msg">Wypełnij wszystkie pola</p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script>
// ===================== SUPABASE =====================
const SUPABASE_URL = 'https://phwoggxmdmtycvyrcyba.supabase.co';
const SUPABASE_KEY = 'sb_publishable_rY0--Wp81TkcuPbo_C-u1w_zEhkiuQ1';

let db = null;
if (typeof supabase !== 'undefined') {
  db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
}

// ===================== ELEMENTY =====================
const nickEl = document.getElementById('nick');
const codeEl = document.getElementById('roomCode');
const btnEl = document.getElementById('joinBtn');
const msgEl = document.getElementById('msg');
let selColor = null;
let isJoining = false;

// ===================== KOLORY =====================
const cbs = document.querySelectorAll('.cb');

cbs.forEach(cb => {
  function handleSelect() {
    cbs.forEach(c => c.classList.remove('sel'));
    this.classList.add('sel');
    selColor = this.getAttribute('data-c');
    localStorage.setItem('fg_color', selColor);
    check();
  }
  cb.addEventListener('click', handleSelect);
  cb.addEventListener('pointerdown', handleSelect);
});

// ===================== CHECK =====================
function check() {
  const nick = nickEl.value.trim();
  const code = codeEl.value.trim();
  btnEl.disabled = !(nick.length >= 2 && code.length >= 2 && selColor);
}

// ===================== JOIN (Twój oryginalny kod) =====================
btnEl.addEventListener('click', async function(){
  if (isJoining || !db) return;
  // ... Twój oryginalny kod join z r1, r2, r3, r4 ...
  // (pozostaje bez zmian, bo działa)
});

check();
</script>
</body>
</html>
