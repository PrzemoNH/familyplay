<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI PLAYER</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a1628;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  gap:12px;
  padding:20px;
}

input, button{
  padding:12px;
  font-size:16px;
  width:280px;
  max-width:90vw;
}

button{
  background:#4fc3f7;
  border:none;
  font-weight:700;
  cursor:pointer;
}

#msg{
  text-align:center;
  min-height:20px;
}

/* TOP BAR */
#topBar{
  display:none;
  flex-direction:column;
  gap:6px;
  align-items:center;
  margin-bottom:10px;
}

/* GAME */
#fleetScreen{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

#board{
  width:260px;
  height:260px;
  background:#0f2a44;
  display:grid;
  grid-template-columns:repeat(10,1fr);
  grid-template-rows:repeat(10,1fr);
  gap:2px;
}

.cell{
  background:#1b3b5c;
}

/* DEBUG */
#debug{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  font-size:11px;
  padding:6px;
  background:#000000cc;
  color:#00ffcc;
  font-family:monospace;
  display:none;
}
</style>
</head>

<body>

<h2>⚓ STATKI PLAYER</h2>

<!-- TOP BAR -->
<div id="topBar">
  <div>👤 <span id="uiNick"></span></div>
  <div>🏠 <span id="uiRoom"></span></div>
  <button id="leaveBtn">🚪 Wyjdź z pokoju</button>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <input id="room" placeholder="ROOM CODE">
  <input id="nick" placeholder="NICK">
  <button id="joinBtn">JOIN</button>
  <p id="msg"></p>
</div>

<!-- GAME -->
<div id="fleetScreen">
  <h3>Rozstaw floty</h3>
  <div id="board"></div>
</div>

<div id="debug">DEBUG</div>

<script>

//////////////////////////////////////////////////////
// INIT
//////////////////////////////////////////////////////
const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBod29nZ3htZG10eWN2eXJjeWJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODEyMDgsImV4cCI6MjA5Njk1NzIwOH0.2XuaVqP0p21Nd07w1GCqwEkewJsJKucRYemys0B4wJ0"
);

const COLORS = ["blue","green","yellow","red"];

let player = null;
let room = null;

//////////////////////////////////////////////////////
// UI
//////////////////////////////////////////////////////
function showTopBar(){
  document.getElementById("topBar").style.display = "flex";
  document.getElementById("uiNick").innerText = player.nick;
  document.getElementById("uiRoom").innerText = room.code;
}

function showFleet(){
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("fleetScreen").style.display = "flex";
  showTopBar();
}

function resetUI(){
  document.getElementById("topBar").style.display = "none";
  document.getElementById("fleetScreen").style.display = "none";
  document.getElementById("loginScreen").style.display = "flex";
}

//////////////////////////////////////////////////////
// PLAYER ID (LOCAL STORAGE)
//////////////////////////////////////////////////////
function getPlayerId(){
  let id = localStorage.getItem("player_id");

  if(!id){
    id = crypto.randomUUID();
    localStorage.setItem("player_id", id);
  }

  return id;
}

//////////////////////////////////////////////////////
// JOIN
//////////////////////////////////////////////////////
document.getElementById("joinBtn").onclick = async () => {

  const code = document.getElementById("room").value.trim().toUpperCase();
  const nick = document.getElementById("nick").value.trim();

  if(!code || !nick){
    document.getElementById("msg").innerText = "❌ Brak danych";
    return;
  }

  document.getElementById("msg").innerText = "Łączenie...";

  const player_id = getPlayerId();

  // ROOM
  const { data: roomData } = await db
    .from("rooms")
    .select("id,code,host_id")
    .eq("code", code)
    .single();

  if(!roomData){
    document.getElementById("msg").innerText = "❌ Brak pokoju";
    return;
  }

  room = roomData;

  // CHECK EXISTING PLAYER
  const { data: existing } = await db
    .from("players")
    .select("*")
    .eq("room_id", room.id)
    .eq("device_id", player_id)
    .maybeSingle();

  if(existing){
    player = existing;

    document.getElementById("msg").innerText =
      `✔ powrót: ${player.nick}`;

    showFleet();
    return;
  }

  // COLORS
  const { data: players } = await db
    .from("players")
    .select("color")
    .eq("room_id", room.id);

  const used = (players || []).map(p => p.color);
  const color = COLORS.find(c => !used.includes(c));

  if(!color){
    document.getElementById("msg").innerText = "❌ Pokój pełny";
    return;
  }

  // HOST
  let isHost = false;

  if(!room.host_id){
    isHost = true;

    await db
      .from("rooms")
      .update({ host_id: player_id })
      .eq("id", room.id);
  }

  // INSERT PLAYER
  const { data: inserted, error } = await db
    .from("players")
    .insert({
      room_id: room.id,
      nick,
      color,
      device_id: player_id,
      is_host: isHost,
      ready: false
    })
    .select()
    .single();

  if(error){
    document.getElementById("msg").innerText = "❌ Błąd join";
    console.log(error);
    return;
  }

  player = inserted;

  document.getElementById("msg").innerText =
    `✔ ${nick} (${color})` + (isHost ? " 👑 HOST" : "");

  showFleet();
};

//////////////////////////////////////////////////////
// LEAVE ROOM
//////////////////////////////////////////////////////
document.getElementById("leaveBtn").onclick = async () => {

  if(player){
    await db
      .from("players")
      .delete()
      .eq("id", player.id);
  }

  player = null;
  room = null;

  resetUI();
};

</script>

</body>
</html>
