<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Statki – Kontroler</title>
<style>
/* === RESET === */
*{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation;}

/* === BODY === */
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#0a1628;color:white;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px;gap:20px;
}

/* === NAGŁÓWEK === */
h1{font-size:1.6rem;font-weight:900;color:#4fc3f7;letter-spacing:1px;}
.subtitle{font-size:0.85rem;color:#90a4ae;}

/* === KARTA === */
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:16px;padding:24px;
  width:100%;max-width:360px;
  display:flex;flex-direction:column;gap:16px;
}

/* === ETYKIETY === */
label{font-size:0.75rem;font-weight:700;color:#90a4ae;text-transform:uppercase;letter-spacing:0.5px;}

/* === INPUTY === */
input{
  width:100%;padding:13px 15px;
  border-radius:10px;
  border:1.5px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.08);
  color:white;font-size:1rem;outline:none;
  font-family:inherit;
  -webkit-appearance:none;
}
input::placeholder{color:rgba(255,255,255,0.3);}
input:focus{border-color:#4fc3f7;}

/* === KOLORY === */
.colors{display:flex;gap:10px;justify-content:center;padding:4px 0;}
.cb{
  width:50px;height:50px;border-radius:50%;
  border:4px solid transparent;
  cursor:pointer;
  transition:transform 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.cb:active{transform:scale(0.9);}
.cb.sel{border-color:white !important;transform:scale(1.15);}
.c-red{background:#ef4444;}
.c-yellow{background:#f59e0b;}
.c-green{background:#22c55e;}
.c-black{background:#4b5563;}
.c-white{background:#e5e7eb;border:4px solid rgba(255,255,255,0.4);}

/* === PRZYCISK DOŁĄCZ === */
#joinBtn{
  width:100%;padding:15px;
  background:#4fc3f7;color:#0a1628;
  font-size:1.05rem;font-weight:900;
  border:none;border-radius:12px;cursor:pointer;
  transition:opacity 0.2s;
  -webkit-tap-highlight-color:transparent;
}
#joinBtn:disabled{
  background:rgba(79,195,247,0.25);
  color:rgba(255,255,255,0.3);
  cursor:not-allowed;
}
#joinBtn.loading{opacity:0.7;cursor:wait;}

/* === KOMUNIKAT === */
#msg{font-size:0.82rem;color:#90a4ae;text-align:center;min-height:20px;}
#msg.err{color:#ef4444;}
#msg.ok{color:#22c55e;}
</style>
</head>
<body>

<h1>⚓ STATKI</h1>
<p class="subtitle">Dołącz do gry</p>

<div class="card">
  <!-- Nick -->
  <label for="nick">Twój nick</label>
  <input type="text" id="nick" placeholder="Wpisz nick..." maxlength="12" autocomplete="off" autocorrect="off" spellcheck="false">

  <!-- Kolor -->
  <label>Wybierz kolor</label>
  <div class="colors">
    <div class="cb c-red"    data-c="red"    role="button" aria-label="Czerwony"></div>
    <div class="cb c-yellow" data-c="yellow" role="button" aria-label="Żółty"></div>
    <div class="cb c-green"  data-c="green"  role="button" aria-label="Zielony"></div>
    <div class="cb c-black"  data-c="black"  role="button" aria-label="Czarny"></div>
    <div class="cb c-white"  data-c="white"  role="button" aria-label="Biały"></div>
  </div>

  <!-- Kod pokoju -->
  <label for="roomCode">Kod pokoju</label>
  <input type="text" id="roomCode" placeholder="np. W66" maxlength="5"
    style="letter-spacing:4px;text-transform:uppercase;font-weight:800;font-size:1.2rem;text-align:center;"
    autocomplete="off" autocorrect="off" spellcheck="false">

  <!-- Przycisk -->
  <button id="joinBtn" disabled>Dołącz do gry</button>
</div>

<p id="msg">Wypełnij wszystkie pola</p>

<!-- Supabase lokalne (bez zewnętrznego CDN) -->
<script src="./supabase.min.js"></script>

<script>
// =============================================
// KONFIGURACJA SUPABASE
// =============================================
const SUPABASE_URL = 'https://phwoggxmdmtycvyrcyba.supabase.co';
const SUPABASE_KEY = 'sb_publishable_rY0--Wp81TkcuPbo_C-u1w_zEhkiuQ1';
const DEVICE_EXPIRY_DAYS = 30;

// Inicjalizacja klienta Supabase
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// =============================================
// WALIDACJA I SANITYZACJA
// =============================================

// Dozwolone kolory
var VALID_COLORS = ['red','yellow','green','black','white'];

// Sanityzacja nicku - tylko litery, cyfry, polskie znaki, _ i -
function sanitizeNick(val){
  return val.replace(/[^a-zA-Z0-9ąćęłńóśźżĄĆĘŁŃÓŚŹŻ_\-]/g,'').substring(0,12);
}

// Sanityzacja kodu pokoju - tylko A-Z i 0-9
function sanitizeCode(val){
  return val.replace(/[^A-Z0-9]/g,'').substring(0,5);
}

// =============================================
// DEVICE ID (identyfikator urządzenia)
// =============================================
function getDeviceId(){
  var id = localStorage.getItem('fg_device_id');
  if(!id){
    id = 'dev_' + Math.random().toString(36).substr(2,12) + Date.now();
    localStorage.setItem('fg_device_id', id);
  }
  localStorage.setItem('fg_device_expiry', Date.now() + DEVICE_EXPIRY_DAYS * 86400000);
  return id;
}
function checkExpiry(){
  var exp = parseInt(localStorage.getItem('fg_device_expiry')||'0');
  if(Date.now() > exp && exp > 0){
    ['fg_device_id','fg_device_expiry','fg_player_id','fg_room_id','fg_room_code','fg_nick','fg_color'].forEach(function(k){ localStorage.removeItem(k); });
  }
}
checkExpiry();
var deviceId = getDeviceId();

// =============================================
// WCZYTAJ ZAPISANE DANE (z walidacją)
// =============================================
var savedNick  = sanitizeNick(localStorage.getItem('fg_nick') || '');
var savedColor = localStorage.getItem('fg_color') || null;
var savedCode  = sanitizeCode((localStorage.getItem('fg_room_code') || '').toUpperCase());

// Walidacja koloru - jeśli niepoprawny, wyczyść
if(savedColor && VALID_COLORS.indexOf(savedColor) === -1){
  savedColor = null;
  localStorage.removeItem('fg_color');
}

// Wstaw do pól
var nickEl     = document.getElementById('nick');
var roomCodeEl = document.getElementById('roomCode');
var joinBtn    = document.getElementById('joinBtn');
var msgEl      = document.getElementById('msg');

if(savedNick)  nickEl.value     = savedNick;
if(savedCode)  roomCodeEl.value = savedCode;

// Aktualnie wybrany kolor
var selColor = savedColor;

// =============================================
// ZAZNACZ ZAPISANY KOLOR
// =============================================
if(selColor){
  var savedBtn = document.querySelector('[data-c="'+selColor+'"]');
  if(savedBtn) savedBtn.classList.add('sel');
}

// =============================================
// SPRAWDŹ CZY FORMULARZ GOTOWY
// =============================================
function checkReady(){
  var n = nickEl.value.trim();
  var r = roomCodeEl.value.trim();
  var ready = n.length >= 2 && selColor !== null && r.length >= 2;
  joinBtn.disabled = !ready;
  if(ready){
    msgEl.textContent = 'Gotowy do gry!';
    msgEl.className = 'ok';
  } else {
    msgEl.textContent = 'Wypełnij wszystkie pola';
    msgEl.className = '';
  }
}

// =============================================
// OBSŁUGA KOLORÓW
// =============================================
var colorBtns = document.querySelectorAll('.cb');
for(var i=0; i<colorBtns.length; i++){
  colorBtns[i].addEventListener('click', function(){
    for(var j=0; j<colorBtns.length; j++) colorBtns[j].classList.remove('sel');
    this.classList.add('sel');
    selColor = this.getAttribute('data-c');
    localStorage.setItem('fg_color', selColor);
    checkReady();
  });
}

// =============================================
// OBSŁUGA NICKU
// =============================================
nickEl.addEventListener('input', function(){
  this.value = sanitizeNick(this.value);
  localStorage.setItem('fg_nick', this.value.trim());
  checkReady();
});

// Enter w polu nick → przejdź do kodu pokoju
nickEl.addEventListener('keydown', function(e){
  if(e.key === 'Enter') roomCodeEl.focus();
});

// =============================================
// OBSŁUGA KODU POKOJU
// =============================================
roomCodeEl.addEventListener('input', function(){
  this.value = sanitizeCode(this.value.toUpperCase());
  localStorage.setItem('fg_room_code', this.value);
  checkReady();
});

// Enter w polu kodu → kliknij Dołącz
roomCodeEl.addEventListener('keydown', function(e){
  if(e.key === 'Enter' && !joinBtn.disabled) joinBtn.click();
});

// =============================================
// DOŁĄCZ DO GRY (z Supabase)
// =============================================
var isJoining = false;

joinBtn.addEventListener('click', async function(){
  // Blokada wielokrotnego kliknięcia
  if(isJoining) return;
  isJoining = true;
  joinBtn.classList.add('loading');
  joinBtn.disabled = true;
  msgEl.textContent = 'Łączenie z pokojem...';
  msgEl.className = '';

  // Dane gracza
  var playerData = {
    nick:  sanitizeNick(nickEl.value.trim()),
    color: selColor,
    room:  sanitizeCode(roomCodeEl.value.trim().toUpperCase()),
    deviceId: deviceId
  };

  try {
    // === Znajdź pokój po kodzie ===
    var roomRes = await db
      .from('rooms')
      .select('*')
      .eq('code', playerData.room)
      .in('status', ['waiting','playing'])
      .limit(1);

    if(!roomRes.data || roomRes.data.length === 0){
      throw new Error('Nie znaleziono pokoju: ' + playerData.room);
    }

    var room = roomRes.data[0];

    // === Sprawdź czy to urządzenie już jest w pokoju ===
    var existRes = await db
      .from('players')
      .select('*')
      .eq('room_id', room.id)
      .eq('device_id', playerData.deviceId)
      .eq('is_active', true)
      .maybeSingle();

    if(existRes.data){
      // Już jesteś w pokoju - wróć do ekranu oczekiwania
      localStorage.setItem('fg_player_id', existRes.data.id);
      localStorage.setItem('fg_room_id', room.id);
      msgEl.textContent = 'Witaj z powrotem, ' + existRes.data.nick + '!';
      msgEl.className = 'ok';
      // TODO: showWaitScreen(existRes.data)
      return;
    }

    // === Sprawdź limit graczy ===
    var countRes = await db
      .from('players')
      .select('id')
      .eq('room_id', room.id)
      .eq('is_active', true);

    if(countRes.data && countRes.data.length >= 4){
      throw new Error('Pokój pełny! Maksymalnie 4 graczy.');
    }

    var isHost = countRes.data.length === 0;

    // === Dodaj gracza do pokoju ===
    var joinRes = await db
      .from('players')
      .insert({
        room_id:   room.id,
        nick:      playerData.nick,
        color:     playerData.color,
        is_host:   isHost,
        is_active: true,
        device_id: playerData.deviceId
      })
      .select()
      .single();

    if(joinRes.error) throw new Error(joinRes.error.message);

    // Zapisz dane sesji
    localStorage.setItem('fg_player_id', joinRes.data.id);
    localStorage.setItem('fg_room_id', room.id);
    localStorage.setItem('fg_nick', playerData.nick);

    msgEl.textContent = 'Dołączono! Czekaj na start...';
    msgEl.className = 'ok';

    // TODO: showWaitScreen(joinRes.data, room.code)
    // TODO: subscribeToRoomChanges(room.id)  ← Supabase Realtime
    // TODO: reconnect logic

  } catch(err) {
    msgEl.textContent = '❌ ' + err.message;
    msgEl.className = 'err';
    joinBtn.disabled = false;
    joinBtn.classList.remove('loading');
    isJoining = false;
  }
});

// =============================================
// AUTO-FOCUS I INIT
// =============================================
checkReady();
// Focus na nick jeśli pusty, inaczej na kod pokoju
if(!savedNick){ nickEl.focus(); }
else if(!savedCode){ roomCodeEl.focus(); }
</script>
</body>
</html>
