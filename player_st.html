<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI PLAYER</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a1628;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  gap:12px;
  padding:20px;
}

input, button{
  padding:12px;
  font-size:16px;
  width:280px;
  max-width:90vw;
}

button{
  background:#4fc3f7;
  border:none;
  font-weight:700;
  cursor:pointer;
}

#msg{
  text-align:center;
  min-height:20px;
}

/* ===== FLEET SCREEN ===== */
#fleetScreen{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

#board{
  width:260px;
  height:260px;
  background:#0f2a44;
  display:grid;
  grid-template-columns:repeat(10,1fr);
  grid-template-rows:repeat(10,1fr);
  gap:2px;
}

.cell{
  background:#1b3b5c;
}

/* ===== DEBUG ===== */
#debug{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  font-size:11px;
  padding:6px;
  background:#000000cc;
  color:#00ffcc;
  font-family:monospace;
  z-index:9999;
}
</style>
</head>

<body>

<h2>⚓ STATKI PLAYER</h2>

<!-- LOGIN -->
<div id="loginScreen">
  <input id="room" placeholder="ROOM CODE">
  <input id="nick" placeholder="NICK">
  <button id="joinBtn">JOIN</button>
  <p id="msg"></p>
</div>

<!-- FLEET -->
<div id="fleetScreen">
  <h3>Rozstaw floty</h3>
  <div id="board"></div>
</div>

<!-- DEBUG -->
<div id="debug">DEBUG INIT</div>

<script>

const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBod29nZ3htZG10eWN2eXJjeWJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODEyMDgsImV4cCI6MjA5Njk1NzIwOH0.2XuaVqP0p21Nd07w1GCqwEkewJsJKucRYemys0B4wJ0"
);

const COLORS = ["blue", "green", "yellow", "red"];

let player = null;
let room = null;

// ================= ROOM FROM URL =================
const params = new URLSearchParams(window.location.search);
const roomFromUrl = params.get("room");

if(roomFromUrl){
  document.getElementById("room").value = roomFromUrl.toUpperCase();
}

// ================= DEBUG =================
function updateDebug(data){
  document.getElementById("debug").innerText =
    `ROOM: ${data.room || "-"} | ` +
    `PLAYERS: ${data.players || 0} | ` +
    `COLOR: ${data.color || "-"} | ` +
    `HOST: ${data.host ? "YES" : "NO"} | ` +
    `STATUS: ${data.status || "INIT"}`;
}

// ================= JOIN =================
document.getElementById("joinBtn").onclick = async () => {

  const code = document.getElementById("room").value.trim().toUpperCase();
  const nick = document.getElementById("nick").value.trim();

  if(!code || !nick){
    document.getElementById("msg").innerText = "❌ Brak danych";
    return;
  }

  document.getElementById("msg").innerText = "🔍 Łączenie...";

  // ROOM
  const { data: roomData } = await db
    .from("rooms")
    .select("id, code")
    .eq("code", code)
    .single();

  if(!roomData){
    document.getElementById("msg").innerText = "❌ Brak pokoju";
    return;
  }

  room = roomData;

  // PLAYERS
  const { data: players } = await db
    .from("players")
    .select("id, color")
    .eq("room_id", room.id);

  const used = (players || []).map(p => p.color);
  const color = COLORS.find(c => !used.includes(c));

  if(!color){
    document.getElementById("msg").innerText = "❌ Pokój pełny";
    return;
  }

  const isHost = !players || players.length === 0;

  // INSERT PLAYER (NO RACE LOGIC)
  const { data: inserted, error } = await db
    .from("players")
    .insert({
      room_id: room.id,
      nick,
      color,
      ready: false,
      is_host: isHost
    })
    .select()
    .single();

  if(error){
    document.getElementById("msg").innerText = "❌ Błąd join";
    return;
  }

  player = inserted;

  document.getElementById("msg").innerText =
    `✔ ${nick} (${color}) ${isHost ? "⚙️ HOST" : ""}`;

  updateDebug({
    room: room.code,
    players: players?.length || 0,
    color,
    host: isHost,
    status: "JOINED"
  });

  goToFleet();
};

// ================= FLEET SCREEN =================
function goToFleet(){
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("fleetScreen").style.display = "flex";

  const board = document.getElementById("board");
  board.innerHTML = "";

  for(let i=0;i<100;i++){
    const c = document.createElement("div");
    c.className = "cell";
    board.appendChild(c);
  }

  updateDebug({
    room: room?.code,
    players: "IN GAME",
    color: player?.color,
    host: player?.is_host,
    status: "FLEET"
  });
}

</script>

</body>
</html>
