<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI – TV</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100%;height:100%;
    background:#0a1628;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    overflow:hidden;
  }
  #screen{
    width:100%;height:100vh;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:20px;position:relative;
  }

  h1{font-size:3.5rem;font-weight:900;letter-spacing:3px;color:#4fc3f7;}
  .subtitle{font-size:1.1rem;color:#90a4ae;margin-top:-12px;}

  .room-code{
    display:flex;align-items:center;gap:12px;
    background:rgba(79,195,247,0.1);
    border:1px solid rgba(79,195,247,0.3);
    border-radius:14px;padding:10px 24px;
  }
  .room-code-label{font-size:0.85rem;color:#90a4ae;font-weight:700;}
  .room-code-value{
    font-size:2rem;font-weight:900;
    color:#4fc3f7;letter-spacing:4px;
  }

  #qrcode{background:white;padding:12px;border-radius:12px;}

  .status{
    font-size:1rem;color:#4fc3f7;
    background:rgba(79,195,247,0.1);
    padding:10px 24px;border-radius:12px;
    border:1px solid rgba(79,195,247,0.3);
  }

  .players-list{
    display:flex;gap:14px;flex-wrap:wrap;justify-content:center;
  }
  .player-slot{
    width:130px;height:85px;
    border:2px dashed rgba(255,255,255,0.12);
    border-radius:14px;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:5px;font-size:0.8rem;
    color:rgba(255,255,255,0.2);
  }
  .player-slot.filled{border-style:solid;border-width:3px;color:white;font-weight:700;}

  .btn{
    padding:14px 32px;font-size:1rem;font-weight:900;
    border:none;border-radius:12px;cursor:pointer;
  }
  .btn-new{background:#4fc3f7;color:#0a1628;}
  .start-error{color:#ef4444;font-weight:700;margin-top:10px;}
</style>
</head>
<body>
<div id="screen">

  <h1>⚓ STATKI</h1>
  <p class="subtitle">Rodzinna gra morska</p>

  <div id="startScreen">
    <div style="display:flex;gap:12px;">
      <button class="btn btn-new" id="btnNewRoom">+ Nowy pokój</button>
      <button class="btn" style="background:rgba(255,255,255,0.1);" id="btnExisting">Wróć do pokoju</button>
    </div>
    <p class="start-error" id="startError"></p>
  </div>

  <div id="lobbyScreen" style="display:none;flex-direction:column;align-items:center;gap:20px;">
    <div class="room-code">
      <span class="room-code-label">KOD POKOJU</span>
      <span class="room-code-value" id="roomCodeDisplay">---</span>
    </div>
    <div id="qrcode"></div>
    <p class="status" id="statusMsg">⏳ Czekanie na graczy...</p>
    <button class="btn" id="btnChangeRoom" style="background:rgba(255,255,255,0.1);">↺ Zmień pokój</button>
  </div>
</div>

<script src="./supabase.min.js"></script>
<script src="https://unpkg.com/qrcodejs@1.0.0/qrcode.js"></script>
<script>
// ===================== KONFIG =====================
const SUPABASE_URL = 'https://phwoggxmdmtycvyrcyba.supabase.co';
const SUPABASE_KEY = 'sb_publishable_rY0--Wp81TkcuPbo_C-u1w_zEhkiuQ1';

let db = null;
if (typeof supabase !== "undefined") {
  db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  console.log("Supabase załadowany");
} else {
  document.getElementById('startError').innerHTML = "❌ Supabase.min.js nie znaleziony!<br>Sprawdź czy plik istnieje w folderze.";
}

// ===================== TWORZENIE POKOJU =====================
async function createRoom() {
  if (!db) {
    document.getElementById('startError').textContent = "Supabase nie jest dostępny";
    return;
  }

  try {
    const code = 'A' + String(Math.floor(Math.random()*90)+10);
    
    const { data, error } = await db
      .from('rooms')
      .insert({ 
        status: 'waiting', 
        code: code, 
        host_tv_id: 'tv_' + Date.now()
      })
      .select()
      .single();

    if (error) throw error;

    document.getElementById('roomCodeDisplay').textContent = code;
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('lobbyScreen').style.display = 'flex';

  } catch (e) {
    document.getElementById('startError').textContent = "Błąd: " + e.message;
  }
}

document.getElementById('btnNewRoom').onclick = createRoom;
</script>
</body>
</html>
