<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI TV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/qrcodejs@1.0.0/qrcode.js"></script>

<style>
body{
margin:0;
background:#0a1628;
color:#fff;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.box{
display:flex;
flex-direction:column;
gap:15px;
align-items:center;
}

h1{color:#4fc3f7}

#code{
font-size:3rem;
font-weight:900;
letter-spacing:5px;
color:#4fc3f7;
}

#players{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.player{
background:rgba(255,255,255,0.1);
padding:8px 12px;
border-radius:10px;
}

#qrcode{
background:white;
padding:10px;
border-radius:10px;
}

#status{
opacity:0.8;
font-size:14px;
}
</style>
</head>

<body>

<div class="box">

<h1>⚓ STATKI TV</h1>

<div id="status">Start...</div>

<div id="code">---</div>

<div id="qrcode"></div>

<div id="players"></div>

</div>

<script>

const db = supabase.createClient(
"https://phwoggxmdmtycvyrcyba.supabase.co",
"sb_publishable_rY0--Wp81TkcuPbo_C-u1w_zEhkiuQ1"
);

let room = null;

// ===================== START =====================
window.onload = async () => {
  await createRoom();
};

// ===================== CREATE ROOM =====================
async function createRoom(){

const code =
  String.fromCharCode(65 + Math.floor(Math.random()*26)) +
  String(Math.floor(Math.random()*99)+1).padStart(2,"0");

document.getElementById("status").innerText =
"Tworzenie pokoju: " + code;

const { data, error } = await db
.from("rooms")
.insert({
  code,
  status: "waiting"
})
.select()
.single();

if(error){

console.error(error);

document.getElementById("status").innerText =
"❌ ERROR: " + error.message;

alert(JSON.stringify(error, null, 2));

return;
}

room = data;

document.getElementById("status").innerText =
"✔ Pokój utworzony";

document.getElementById("code").innerText = room.code;

new QRCode(document.getElementById("qrcode"), {
text: location.origin + "/player.html?room=" + room.code,
width: 160,
height: 160
});

listenPlayers();
}

// ===================== PLAYERS =====================
function listenPlayers(){

if(!room) return;

db.channel("players-"+room.id)
.on("postgres_changes",{
event:"*",
schema:"public",
table:"players",
filter:"room_id=eq."+room.id
},fetchPlayers)
.subscribe();

fetchPlayers();
}

async function fetchPlayers(){

if(!room) return;

const { data, error } = await db
.from("players")
.select("nick,color")
.eq("room_id", room.id);

if(error){
console.error(error);
return;
}

renderPlayers(data || []);
}

// ===================== RENDER =====================
function renderPlayers(players){

const box = document.getElementById("players");
box.innerHTML = "";

players.forEach(p => {
const div = document.createElement("div");
div.className = "player";
div.innerText = `${p.nick} (${p.color})`;
box.appendChild(div);
});

}

</script>

</body>
</html>
