<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI TV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background: radial-gradient(circle at top, #0d1b2a, #000814);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  width:460px;
  max-width:95vw;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(79,195,247,0.25);
  border-radius: 20px;
  padding: 22px;
  text-align:center;
  backdrop-filter: blur(8px);
}

#code{
  font-size:64px;
  font-weight:900;
  color:#4fc3f7;
}

.player{
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin:6px 0;
  background:rgba(255,255,255,0.06);
  border-radius:10px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
}

.left{
  display:flex;
  align-items:center;
  gap:8px;
}

.host{
  color:#4fc3f7;
  font-weight:bold;
  font-size:12px;
}

#statusBar{
  margin-top:12px;
  padding:10px;
  background:rgba(0,0,0,0.5);
  border-radius:10px;
  font-size:13px;
  color:#ccc;
}
</style>
</head>

<body>

<div class="card">

  <h2>⚓ STATKI TV</h2>

  <div id="code">---</div>
  <div id="qrcode"></div>

  <h3>Gracze</h3>
  <div id="players"></div>

  <div id="statusBar">INIT...</div>

</div>

<script>

const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "PUBLIC_KEY_HERE"
);

let room = null;
let channel = null;

/* ================= STATUS ================= */
function status(msg){
  console.log(msg);
  document.getElementById("statusBar").innerText = msg;
}

/* ================= INIT ================= */
window.onload = async () => {

  let id = localStorage.getItem("room_id");
  let code = (localStorage.getItem("room_code") || "").trim().toUpperCase();

  if(id && code){
    room = { id, code };
    status("ROOM RESTORED: " + code);
  } else {
    status("CREATING ROOM...");
    room = await createRoom();

    if(room){
      localStorage.setItem("room_id", room.id);
      localStorage.setItem("room_code", room.code);
    }
  }

  if(!room){
    status("❌ ROOM NULL");
    return;
  }

  renderRoom();
  subscribe();
};

/* ================= CREATE ROOM (SAFE) ================= */
async function createRoom(){

  let code = "";
  let exists = true;

  while(exists){

    code =
      String.fromCharCode(65 + Math.floor(Math.random()*26)) +
      String(Math.floor(Math.random()*99)+1).padStart(2,"0");

    code = code.trim().toUpperCase();

    const { data, error } = await db
      .from("rooms")
      .select("id")
      .eq("code", code);

    if(error){
      status("SELECT ERROR: " + error.message);
      return null;
    }

    exists = data && data.length > 0;
  }

  const { data, error } = await db
    .from("rooms")
    .insert([{ code, status:"waiting" }])
    .select();

  if(error){
    status("INSERT ERROR: " + error.message);
    return null;
  }

  if(!data || data.length === 0){
    status("NO ROOM DATA RETURNED");
    return null;
  }

  return data[0];
}

/* ================= RENDER ================= */
function renderRoom(){

  if(!room || !room.code){
    status("ROOM MISSING DATA");
    return;
  }

  document.getElementById("code").innerText = room.code;

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: window.location.origin + "/player.html?room=" + room.code,
    width: 160,
    height: 160
  });
}

/* ================= REALTIME ================= */
function subscribe(){

  channel = db.channel("room-"+room.id);

  channel.on("postgres_changes", {
    event:"*",
    schema:"public",
    table:"players",
    filter:"room_id=eq."+room.id
  }, () => fetchPlayers());

  channel.subscribe();

  fetchPlayers();
}

/* ================= PLAYERS ================= */
async function fetchPlayers(){

  const { data, error } = await db
    .from("players")
    .select("*")
    .eq("room_id", room.id)
    .order("created_at", { ascending:true });

  if(error){
    status("PLAYERS ERROR: " + error.message);
    return;
  }

  renderPlayers(data || []);
  status("PLAYERS: " + (data?.length || 0));
}

/* ================= UI ================= */
function renderPlayers(players){

  const box = document.getElementById("players");
  box.innerHTML = "";

  players.forEach(p => {

    const div = document.createElement("div");
    div.className = "player";

    div.innerHTML = `
      <div class="left">
        <span class="dot" style="background:${p.color || '#4fc3f7'}"></span>
        <span>${p.nick || 'UNKNOWN'}</span>
      </div>
      ${p.is_host ? '<span class="host">⚙ HOST</span>' : ''}
    `;

    box.appendChild(div);
  });
}

</script>

</body>
</html>
