<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI – TV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/qrcodejs@1.0.0/qrcode.js"></script>

<style>
body{
margin:0;
background:#0a1628;
color:#fff;
font-family:sans-serif;
overflow:hidden;
}

.center{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
gap:18px;
text-align:center;
}

h1{
color:#4fc3f7;
letter-spacing:3px;
}

.card{
background:rgba(255,255,255,0.08);
padding:16px 24px;
border-radius:14px;
}

#code{
font-size:2.5rem;
font-weight:900;
color:#4fc3f7;
letter-spacing:6px;
}

#players{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
max-width:900px;
}

.player{
background:rgba(255,255,255,0.12);
padding:10px 16px;
border-radius:10px;
font-weight:700;
display:flex;
align-items:center;
gap:8px;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
}

#status{
color:#4fc3f7;
font-weight:700;
}

#qrcode{
background:#fff;
padding:10px;
border-radius:12px;
}
</style>
</head>

<body>

<div class="center">

<h1>⚓ STATKI</h1>

<div class="card">
<div>KOD POKOJU</div>
<div id="code">---</div>
</div>

<div id="qrcode"></div>

<div id="players"></div>

<div id="status">Tworzenie pokoju...</div>

</div>

<script>

const db = supabase.createClient(
"https://phwoggxmdmtycvyrcyba.supabase.co",
"sb_publishable_rY0--Wp81TkcuPbo-C-u1w_zEhkiuQ1"
);

let roomId = null;
let roomCode = null;

let playersSub = null;
let roomSub = null;

// ===================== AUTO START =====================
window.onload = () => {
  createRoom();
};

// ===================== CREATE ROOM =====================
async function createRoom(){

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

let code = "";
let ok = false;

while(!ok){

code =
letters[Math.floor(Math.random()*26)] +
String(Math.floor(Math.random()*99)+1).padStart(2,"0");

let { data } = await db
.from("rooms")
.select("id")
.eq("code", code)
.maybeSingle();

if(!data) ok = true;

}

let { data:room } = await db
.from("rooms")
.insert({
code,
status:"waiting"
})
.select()
.single();

roomId = room.id;
roomCode = code;

// UI
document.getElementById("code").innerText = code;

// QR (COMPATIBLE z player.html)
document.getElementById("qrcode").innerHTML = "";

new QRCode(document.getElementById("qrcode"), {
text: location.origin + "/player.html?room=" + code,
width: 160,
height: 160
});

listenPlayers();
listenRoom();

}

// ===================== ROOM LISTENER =====================
function listenRoom(){

if(roomSub) db.removeChannel(roomSub);

roomSub = db
.channel("room-"+roomId)
.on("postgres_changes",{
event:"UPDATE",
schema:"public",
table:"rooms",
filter:"id=eq."+roomId
},payload=>{

if(payload.new.status === "playing"){
document.getElementById("status").innerText = "Gra rozpoczęta!";
}

})
.subscribe();

}

// ===================== PLAYERS =====================
function listenPlayers(){

if(playersSub) db.removeChannel(playersSub);

playersSub = db
.channel("players-"+roomId)
.on("postgres_changes",{
event:"*",
schema:"public",
table:"players",
filter:"room_id=eq."+roomId
},()=>{
fetchPlayers();
})
.subscribe();

fetchPlayers();

}

async function fetchPlayers(){

let { data } = await db
.from("players")
.select("nick,color")
.eq("room_id",roomId);

renderPlayers(data || []);

}

// ===================== RENDER =====================
function renderPlayers(players){

const box = document.getElementById("players");
box.innerHTML = "";

const colors = {
red:"#ef4444",
yellow:"#f59e0b",
green:"#22c55e",
blue:"#3b82f6"
};

players.forEach(p=>{

const div = document.createElement("div");
div.className = "player";

div.innerHTML = `
<span class="dot" style="background:${colors[p.color] || "#fff"}"></span>
${p.nick}
`;

box.appendChild(div);

});

document.getElementById("status").innerText =
players.length < 2
? `Oczekiwanie na graczy (${players.length}/2)`
: `Gotowi (${players.length} graczy)`;

}

</script>

</body>
</html>
