<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FamilyGame – TV</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100%;height:100%;
    background:#0a1628;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    overflow:hidden;
  }
  #screen{
    width:100%;height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:20px;
  }
  h1{
    font-size:3rem;
    font-weight:900;
    letter-spacing:2px;
    color:#4fc3f7;
  }
  .subtitle{
    font-size:1.2rem;
    color:#90a4ae;
  }
  .status{
    margin-top:20px;
    font-size:1rem;
    color:#4fc3f7;
    background:rgba(79,195,247,0.1);
    padding:12px 24px;
    border-radius:12px;
    border:1px solid rgba(79,195,247,0.3);
  }
  .qr-placeholder{
    width:180px;height:180px;
    background:white;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#0a1628;
    font-size:0.8rem;
    font-weight:700;
    text-align:center;
    padding:10px;
  }
  .players-list{
    display:flex;
    gap:16px;
    margin-top:10px;
  }
  .player-slot{
    width:120px;
    height:80px;
    border:2px dashed rgba(255,255,255,0.2);
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:0.85rem;
    color:rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
<div id="screen">
  <h1>⚓ STATKI</h1>
  <p class="subtitle">Rodzinna gra morska</p>

  <div class="qr-placeholder">
    QR KOD<br>pojawi się<br>tutaj
  </div>

  <p class="status">⏳ Czekanie na graczy...</p>

  <div class="players-list">
    <div class="player-slot">Gracz 1</div>
    <div class="player-slot">Gracz 2</div>
    <div class="player-slot">Gracz 3</div>
    <div class="player-slot">Gracz 4</div>
  </div>
</div>
</body>
</html>
