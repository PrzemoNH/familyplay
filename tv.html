<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI TV ENGINE 4.0 FIX</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background: radial-gradient(circle at top, #0d1b2a, #000814);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  width:480px;
  max-width:95vw;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(79,195,247,0.25);
  border-radius: 20px;
  padding: 22px;
  text-align:center;
  backdrop-filter: blur(8px);
  position:relative;
  overflow:hidden;
}

/* mały “statek animowany” */
.ship{
  position:absolute;
  bottom:8px;
  left:-120px;
  font-size:22px;
  animation: sail 6s linear infinite;
  opacity:0.7;
}

@keyframes sail{
  0%{left:-120px;}
  100%{left:110%;}
}

#code{
  font-size:64px;
  font-weight:900;
  color:#4fc3f7;
}

#qrcode{
  margin:12px 0;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  margin:5px;
}

button:disabled{opacity:0.5;}

#newRoomBtn{ background:#4fc3f7; }
#resetBtn{ background:#ff4d4d; color:white; }

#modeBar{
  margin-top:10px;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
}

.modeBtn{
  background:#1b3b5c;
  color:white;
}

.modeBtn.active{
  background:#4fc3f7;
  color:black;
}

#statusBar{
  margin-top:12px;
  padding:10px;
  background:rgba(0,0,0,0.5);
  border-radius:10px;
  font-size:12px;
  color:#ccc;
  text-align:left;
  max-height:160px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="card">

  <div class="ship">🚢</div>

  <h2>⚓ STATKI TV ENGINE 4.0</h2>

  <div id="code">---</div>
  <div id="qrcode"></div>

  <div id="modeBar">
    <button class="modeBtn" data-mode="2">2 GRACZY</button>
    <button class="modeBtn" data-mode="3">3 GRACZY</button>
    <button class="modeBtn" data-mode="4">4 GRACZY</button>
  </div>

  <button id="newRoomBtn">🆕 Nowy pokój</button>
  <button id="resetBtn">♻ Reset cache</button>

  <div id="statusBar">INIT...</div>

</div>

<script>

const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBod29nZ3htZG10eWN2eXJjeWJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODEyMDgsImV4cCI6MjA5Njk1NzIwOH0.2XuaVqP0p21Nd07w1GCqwEkewJsJKucRYemys0B4wJ0"
);

let room = null;
let mode = 2;

/* ================= LOG ================= */
function log(m){
  console.log(m);
  document.getElementById("statusBar").innerText += "\n" + (typeof m === "string" ? m : JSON.stringify(m));
}

/* ================= MODE ================= */
document.querySelectorAll(".modeBtn").forEach(btn=>{
  btn.onclick = () => {
    mode = Number(btn.dataset.mode);

    document.querySelectorAll(".modeBtn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    log("MODE SET: " + mode);
  };
});

/* ================= INIT ================= */
window.onload = async () => {

  log("INIT...");

  const savedId = localStorage.getItem("room_id");
  const savedCode = localStorage.getItem("room_code");

  if(savedId && savedCode){
    const { data } = await db
      .from("rooms")
      .select("*")
      .eq("id", savedId)
      .maybeSingle();

    if(data){
      room = data;
      log("CACHE ROOM LOADED: " + room.code);
      render();
      return;
    }
  }

  await createRoom();
  render();
};

/* ================= CREATE ROOM ================= */
async function createRoom(){

  const code =
    "T" +
    String(Math.floor(Math.random()*90)+10) +
    "-" +
    mode;

  log("CREATE ROOM: " + code);

  const { data, error } = await db
    .from("rooms")
    .insert([{
      code,
      mode,
      status:"waiting"
    }])
    .select()
    .single();

  if(error){
    log("ROOM ERROR: " + error.message);
    return;
  }

  room = data;

  localStorage.setItem("room_id", room.id);
  localStorage.setItem("room_code", room.code);

  log("ROOM CREATED: " + room.code);
}

/* ================= RENDER ================= */
function render(){

  if(!room) return;

  document.getElementById("code").innerText = room.code;

  const box = document.getElementById("qrcode");
  box.innerHTML = "";

  const link =
    window.location.origin +
    "/player.html?room=" +
    room.code +
    "&mode=" +
    room.mode;

  try{
    new QRCode(box, {
      text: link,
      width: 160,
      height: 160
    });
  }catch(e){
    box.innerText = link;
  }
}

/* ================= BUTTONS ================= */
document.getElementById("newRoomBtn").onclick = async () => {
  await createRoom();
  render();
};

document.getElementById("resetBtn").onclick = () => {
  localStorage.clear();
  location.reload();
};

</script>

</body>
</html>
