<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI – TV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/qrcodejs@1.0.0/qrcode.js"></script>

<style>
body{
margin:0;
background:#0a1628;
color:#fff;
font-family:sans-serif;
overflow:hidden;
}

.center{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
gap:20px;
}

h1{color:#4fc3f7}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:14px;
text-align:center;
}

#players{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.player{
padding:10px 16px;
border-radius:10px;
background:rgba(255,255,255,0.1);
font-weight:700;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
display:inline-block;
margin-right:8px;
}

#board{
display:none;
grid-template-columns:repeat(15,1fr);
gap:3px;
width:min(90vw,600px);
margin:auto;
}

.cell{
aspect-ratio:1/1;
background:#1b2b46;
border-radius:4px;
}
</style>
</head>

<body>

<div id="lobby" class="center">

<h1>⚓ STATKI</h1>

<div class="card">
<div>KOD POKOJU</div>
<h2 id="code">---</h2>
</div>

<div id="players"></div>

<div class="card" id="status">
Oczekiwanie na graczy...
</div>

<div id="qrcode"></div>

</div>

<div id="game" class="center" style="display:none">
<h1>🎯 GRA W TOKU</h1>
<div id="board"></div>
</div>

<script>

const db = supabase.createClient(
"https://phwoggxmdmtycvyrcyba.supabase.co",
"sb_publishable_rY0--Wp81TkcuPbo-C-u1w_zEhkiuQ1"
);

let roomId=null;
let roomCode=null;

let roomSub=null;
let playerSub=null;

const SIZE=15;

// ===================== CREATE ROOM =====================

async function createRoom(){

const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ";

let code="";
let ok=false;

while(!ok){

code =
letters[Math.floor(Math.random()*26)] +
String(Math.floor(Math.random()*99)+1).padStart(2,"0");

let {data}=await db
.from("rooms")
.select("id")
.eq("code",code)
.maybeSingle();

if(!data)ok=true;

}

let {data}=await db
.from("rooms")
.insert({
code,
status:"waiting"
})
.select()
.single();

roomId=data.id;
roomCode=code;

document.getElementById("code").innerText=code;

listenRoom();
listenPlayers();

generateQR(code);

}

// ===================== QR =====================

function generateQR(code){

document.getElementById("qrcode").innerHTML="";

new QRCode(document.getElementById("qrcode"),{
text:location.origin+"/player.html?room="+code,
width:160,
height:160
});

}

// ===================== ROOM =====================

function listenRoom(){

if(roomSub)db.removeChannel(roomSub);

roomSub=db
.channel("room-"+roomId)
.on("postgres_changes",{
event:"UPDATE",
schema:"public",
table:"rooms",
filter:"id=eq."+roomId
},payload=>{

let r=payload.new;

if(r.status==="playing"){
startGame();
}

})
.subscribe();

}

// ===================== PLAYERS =====================

function listenPlayers(){

if(playerSub)db.removeChannel(playerSub);

playerSub=db
.channel("players-"+roomId)
.on("postgres_changes",{
event:"*",
schema:"public",
table:"players",
filter:"room_id=eq."+roomId
},()=>fetchPlayers())
.subscribe();

fetchPlayers();

}

async function fetchPlayers(){

let {data}=await db
.from("players")
.select("nick,color,ready")
.eq("room_id",roomId);

renderPlayers(data);

if(data.length>=2){

await db
.from("rooms")
.update({
status:"playing"
})
.eq("id",roomId);

}

}

// ===================== RENDER =====================

function renderPlayers(players){

let box=document.getElementById("players");
box.innerHTML="";

players.forEach(p=>{

let div=document.createElement("div");

div.className="player";

div.innerHTML=`
<span class="dot" style="background:${color(p.color)}"></span>
${p.nick}
`;

box.appendChild(div);

});

document.getElementById("status").innerText=
players.length<2
? "Czekanie na graczy "+players.length+"/2"
: "Start!";

}

// ===================== COLORS =====================

function color(c){
return{
red:"#ef4444",
yellow:"#f59e0b",
green:"#22c55e",
blue:"#3b82f6"
}[c]||"#fff";
}

// ===================== GAME =====================

function startGame(){

document.getElementById("lobby").style.display="none";
document.getElementById("game").style.display="flex";

let b=document.getElementById("board");
b.innerHTML="";

for(let i=0;i<SIZE*SIZE;i++){
let d=document.createElement("div");
d.className="cell";
b.appendChild(d);
}

}

// ===================== START =====================

createRoom();

</script>

</body>
</html>
