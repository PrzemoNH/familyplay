<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI TV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background: radial-gradient(circle at top, #0d1b2a, #000814);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  width:460px;
  max-width:95vw;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(79,195,247,0.25);
  border-radius: 20px;
  padding: 22px;
  text-align:center;
  backdrop-filter: blur(8px);
}

h2{ color:#4fc3f7; }

#code{
  font-size:64px;
  font-weight:900;
  color:#4fc3f7;
}

#qrcode{
  display:flex;
  justify-content:center;
  margin:14px 0;
}

.player{
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin:6px 0;
  background:rgba(255,255,255,0.06);
  border-radius:10px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
}

.left{
  display:flex;
  align-items:center;
  gap:8px;
}

.host{
  color:#4fc3f7;
  font-weight:bold;
  font-size:12px;
}

#statusBar{
  margin-top:12px;
  padding:10px;
  background:rgba(0,0,0,0.5);
  border-radius:10px;
  font-size:13px;
  color:#ccc;
  border:1px solid rgba(255,255,255,0.1);
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  background:#4fc3f7;
}
</style>
</head>

<body>

<div class="card">

  <h2>⚓ STATKI TV</h2>

  <div id="code">---</div>
  <div id="qrcode"></div>

  <button id="newRoomBtn">🆕 Nowy pokój</button>

  <h3>Gracze</h3>
  <div id="players"></div>

  <div id="statusBar">INIT...</div>

</div>

<script>

const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "PUBLIC_KEY_HERE"
);

let room = null;
let channel = null;

/* ================= STATUS ================= */
function status(msg){
  document.getElementById("statusBar").innerText = msg;
  console.log(msg);
}

/* ================= INIT ================= */
window.onload = async () => {

  try {

    let id = localStorage.getItem("room_id");
    let code = (localStorage.getItem("room_code") || "").trim().toUpperCase();

    if(id && code){
      room = { id, code };
      status("ROOM FROM STORAGE: " + code);
    } else {
      status("CREATING ROOM...");
      room = await createRoom();

      if(room){
        localStorage.setItem("room_id", room.id);
        localStorage.setItem("room_code", room.code);
      }
    }

    if(!room){
      status("❌ ROOM NULL (CREATE FAILED)");
      return;
    }

    renderRoom();
    subscribe();

  } catch(e){
    status("FATAL INIT ERROR: " + e.message);
    console.log(e);
  }
};

/* ================= CREATE ROOM (FIXED) ================= */
async function createRoom(){

  try {

    let code = "";
    let exists = true;

    while(exists){

      code =
        String.fromCharCode(65 + Math.floor(Math.random()*26)) +
        String(Math.floor(Math.random()*99)+1).padStart(2,"0");

      code = code.trim().toUpperCase();

      status("CHECK: " + code);

      const { data, error } = await db
        .from("rooms")
        .select("id")
        .eq("code", code);

      if(error){
        status("SELECT ERROR: " + error.message);
        return null;
      }

      exists = data && data.length > 0;
    }

    status("INSERTING ROOM...");

    const { data, error } = await db
      .from("rooms")
      .insert([{ code, status:"waiting" }])
      .select();

    if(error){
      status("INSERT ERROR: " + error.message);
      console.log(error);
      return null;
    }

    if(!data || data.length === 0){
      status("NO DATA RETURNED");
      return null;
    }

    status("ROOM CREATED: " + code);

    return data[0];

  } catch(e){
    status("FATAL CREATE ERROR: " + e.message);
    console.log(e);
    return null;
  }
}

/* ================= RENDER ================= */
function renderRoom(){

  document.getElementById("code").innerText = room.code;

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: window.location.origin + "/player.html?room=" + room.code,
    width: 160,
    height: 160
  });
}

/* ================= REALTIME ================= */
function subscribe(){

  try {

    channel = db.channel("room-"+room.id);

    channel.on("postgres_changes", {
      event:"*",
      schema:"public",
      table:"players",
      filter:"room_id=eq."+room.id
    }, () => fetchPlayers());

    channel.subscribe();

    fetchPlayers();

    status("LIVE SYNC ON");

  } catch(e){
    status("SUBSCRIBE ERROR: " + e.message);
  }
}

/* ================= PLAYERS ================= */
async function fetchPlayers(){

  try {

    const { data, error } = await db
      .from("players")
      .select("*")
      .eq("room_id", room.id)
      .order("created_at", { ascending:true });

    if(error){
      status("PLAYERS ERROR: " + error.message);
      return;
    }

    renderPlayers(data || []);
    status("PLAYERS: " + (data?.length || 0));

  } catch(e){
    status("FETCH ERROR: " + e.message);
  }
}

/* ================= RENDER ================= */
function renderPlayers(players){

  const box = document.getElementById("players");
  box.innerHTML = "";

  players.forEach(p => {

    const div = document.createElement("div");
    div.className = "player";

    div.innerHTML = `
      <div class="left">
        <span class="dot" style="background:${p.color || '#4fc3f7'}"></span>
        <span>${p.nick || 'UNKNOWN'}</span>
      </div>
      ${p.is_host ? '<span class="host">⚙ HOST</span>' : ''}
    `;

    box.appendChild(div);
  });
}

/* ================= RESET ================= */
document.getElementById("newRoomBtn").onclick = () => {
  localStorage.clear();
  location.reload();
};

</script>

</body>
</html>
