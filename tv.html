<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI TV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a1628;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  gap:10px;
}

#code{
  font-size:48px;
  font-weight:bold;
  color:#4fc3f7;
}

.player{
  padding:6px 10px;
  background:rgba(255,255,255,0.1);
  border-radius:8px;
  margin:3px;
}

#statusBar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  padding:10px;
  background:rgba(0,0,0,0.5);
  font-size:14px;
}
</style>
</head>

<body>

<h1>STATKI TV</h1>

<div id="code">...</div>
<div id="qrcode"></div>

<!-- 🆕 PRZYCISKI -->
<div style="display:flex; gap:10px;">
  <button id="newRoomBtn">🆕 Nowy pokój</button>
  <button id="closeRoomBtn">❌ Zamknij pokój</button>
</div>

<h3>Gracze</h3>
<div id="players"></div>

<div id="statusBar">🟡 INIT...</div>

<script>

const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBod29nZ3htZG10eWN2eXJjeWJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODEyMDgsImV4cCI6MjA5Njk1NzIwOH0.2XuaVqP0p21Nd07w1GCqwEkewJsJKucRYemys0B4wJ0"
);

const COLORS = ["blue", "green", "yellow", "red"];

let room = null;

// =====================
// BUTTONS
// =====================
document.getElementById("newRoomBtn").onclick = async () => {
  localStorage.removeItem("room_id");
  localStorage.removeItem("room_code");
  location.reload();
};

document.getElementById("closeRoomBtn").onclick = async () => {
  localStorage.removeItem("room_id");
  localStorage.removeItem("room_code");

  document.getElementById("players").innerHTML = "";
  document.getElementById("code").innerText = "...";
  document.getElementById("statusBar").innerText = "❌ ROOM CLOSED";

  room = null;
};

// =====================
// START (RECONNECT FIX)
// =====================
window.onload = async () => {

  const savedRoomId = localStorage.getItem("room_id");
  const savedRoomCode = localStorage.getItem("room_code");

  if(savedRoomId && savedRoomCode){
    room = {
      id: savedRoomId,
      code: savedRoomCode
    };
  } else {
    room = await createRoom();
    localStorage.setItem("room_id", room.id);
    localStorage.setItem("room_code", room.code);
  }

  if(!room){
    document.getElementById("statusBar").innerText = "❌ ERROR ROOM";
    return;
  }

  render();
  listenPlayers();
};

// =====================
// ROOM CREATE
// =====================
async function createRoom(){

  let code = "";
  let ok = false;

  while(!ok){
    code =
      String.fromCharCode(65 + Math.floor(Math.random()*26)) +
      String(Math.floor(Math.random()*99)+1).padStart(2,"0");

    const { data } = await db
      .from("rooms")
      .select("id")
      .eq("code", code)
      .maybeSingle();

    if(!data) ok = true;
  }

  const { data, error } = await db
    .from("rooms")
    .insert([{ code, status: "waiting" }])
    .select()
    .single();

  if(error){
    document.getElementById("statusBar").innerText =
      "❌ ERROR: " + error.message;
    return null;
  }

  return data;
}

// =====================
// RENDER
// =====================
function render(){
  document.getElementById("code").innerText = room.code;

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: window.location.origin + "/player.html?room=" + room.code,
    width: 180,
    height: 180
  });
}

// =====================
// HOST FIX
// =====================
async function ensureHost(roomId){

  const { data: players } = await db
    .from("players")
    .select("id,is_host,created_at")
    .eq("room_id", roomId)
    .order("created_at", { ascending: true });

  if(!players || players.length === 0) return;

  const hasHost = players.some(p => p.is_host === true);
  if(hasHost) return;

  await db
    .from("players")
    .update({ is_host: true })
    .eq("id", players[0].id);
}

// =====================
// REALTIME
// =====================
function listenPlayers(){

  db.channel("room-"+room.id)
    .on("postgres_changes", {
      event: "*",
      schema: "public",
      table: "players",
      filter: "room_id=eq."+room.id
    }, () => fetchPlayers())
    .subscribe();

  fetchPlayers();
}

// =====================
// FETCH
// =====================
async function fetchPlayers(){

  const { data, error } = await db
    .from("players")
    .select("id, nick, color, ready, created_at, is_host")
    .eq("room_id", room.id)
    .order("created_at", { ascending: true });

  if(error){
    console.log(error);
    return;
  }

  const players = data || [];

  await ensureHost(room.id);

  const { data: updated } = await db
    .from("players")
    .select("id, nick, color, ready, created_at, is_host")
    .eq("room_id", room.id)
    .order("created_at", { ascending: true });

  renderPlayers(updated || []);
  updateStatusBar(updated || []);
}

// =====================
// RENDER PLAYERS
// =====================
function renderPlayers(players){

  const box = document.getElementById("players");
  box.innerHTML = "";

  players.forEach(p => {

    const div = document.createElement("div");
    div.className = "player";

    const hostIcon = p.is_host ? "⚙️ " : "";

    div.innerText = `${hostIcon}${p.nick} | ${p.color}`;

    box.appendChild(div);
  });
}

// =====================
// STATUS BAR
// =====================
function updateStatusBar(players){

  const host = players.find(p => p.is_host === true);

  const hostText = host ? "⚙️ HOST OK" : "⚠️ NO HOST";

  document.getElementById("statusBar").innerText =
    `🟢 ROOM OK | 👥 ${players.length}/4 | ${hostText} | 🔄 LIVE`;
}

</script>

</body>
</html>
