<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI TV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a1628;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  gap:10px;
}

#code{
  font-size:48px;
  font-weight:bold;
  color:#4fc3f7;
}

.player{
  padding:6px 10px;
  background:rgba(255,255,255,0.1);
  border-radius:8px;
  margin:3px;
}
</style>
</head>

<body>

<h1>STATKI TV</h1>

<div id="code">...</div>
<div id="qrcode"></div>

<h3>Gracze</h3>
<div id="players"></div>

<div id="status"></div>

<script>

const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "sb_publishable_rY0--Wp81TkcuPbo-C-u1w_zEhkiuQ1"
);

// GLOBALNE STAŁE
const COLORS = ["blue", "green", "yellow", "red"];

let room = null;

// START
window.onload = async () => {
  room = await createRoom();
  if(!room){
    document.getElementById("status").innerText = "❌ ERROR ROOM";
    return;
  }

  render();
  listenPlayers();
};

// ROOM CREATE
async function createRoom(){

  let code = "";
  let ok = false;

  while(!ok){
    code =
      String.fromCharCode(65 + Math.floor(Math.random()*26)) +
      String(Math.floor(Math.random()*99)+1).padStart(2,"0");

    let { data } = await db
      .from("rooms")
      .select("id")
      .eq("code", code)
      .maybeSingle();

    if(!data) ok = true;
  }

  const { data, error } = await db
    .from("rooms")
    .insert({
      code,
      status: "waiting"
    })
    .select()
    .single();

  if(error){
    document.getElementById("status").innerText =
      "❌ ERROR: " + error.message;
    return null;
  }

  return data;
}

// RENDER TV
function render(){

  document.getElementById("code").innerText = room.code;

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: window.location.origin + "/player.html?room=" + room.code,
    width: 180,
    height: 180
  });

  document.getElementById("status").innerText = "Lobby OK";
}

// REALTIME
function listenPlayers(){

  db.channel("room-"+room.id)
    .on("postgres_changes", {
      event: "*",
      schema: "public",
      table: "players",
      filter: "room_id=eq."+room.id
    }, () => fetchPlayers())
    .subscribe();

  fetchPlayers();
}

// FETCH
async function fetchPlayers(){

  const { data, error } = await db
    .from("players")
    .select("nick,color,ready,is_host")
    .eq("room_id", room.id);

  if(error){
    console.log("PLAYER FETCH ERROR:", error);
    return;
  }

  renderPlayers(data || []);
}

// RENDER PLAYERS (NAPRAWIONE)
function renderPlayers(players){

  const box = document.getElementById("players");
  box.innerHTML = "";

  players.forEach((p, index) => {

    const div = document.createElement("div");
    div.className = "player";

    const hostIcon = p.is_host ? "👑 " : "";

    const color = p.color || COLORS[index];

    div.innerText = `${hostIcon}${p.nick} | ${color}`;

    box.appendChild(div);
  });
}

</script>

</body>
</html>
