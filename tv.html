<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI TV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background: radial-gradient(circle at top, #0d1b2a, #000814);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* GLOW CARD */
.card{
  width:460px;
  max-width:95vw;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(79,195,247,0.25);
  border-radius: 20px;
  padding: 22px;
  box-shadow: 0 0 40px rgba(0,0,0,0.7);
  text-align:center;
  backdrop-filter: blur(8px);
}

/* TITLE */
h2{
  margin:0 0 10px 0;
  color:#4fc3f7;
  letter-spacing:2px;
}

/* ROOM CODE BIG */
#code{
  font-size:64px;
  font-weight:900;
  color:#4fc3f7;
  letter-spacing:10px;
  text-shadow:0 0 20px rgba(79,195,247,0.5);
  margin:10px 0;
}

/* QR */
#qrcode{
  display:flex;
  justify-content:center;
  margin:14px 0;
  filter: drop-shadow(0 0 10px rgba(79,195,247,0.3));
}

/* PLAYERS */
#players{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:10px;
}

.player{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 12px;
  border-radius:12px;
  background: rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  font-size:14px;
}

/* COLOR DOT */
.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  margin-right:8px;
  display:inline-block;
}

/* LEFT SIDE */
.left{
  display:flex;
  align-items:center;
  gap:8px;
}

/* HOST */
.host{
  font-size:12px;
  color:#4fc3f7;
  font-weight:700;
}

/* BUTTONS */
.buttons{
  display:flex;
  gap:10px;
  justify-content:center;
  margin:14px 0;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  background:#4fc3f7;
  color:#001018;
}

button:last-child{
  background:#ff4d4d;
  color:white;
}

/* STATUS */
#statusBar{
  margin-top:14px;
  padding:10px;
  border-radius:12px;
  background: rgba(0,0,0,0.5);
  font-size:13px;
  color:#ccc;
  border:1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="card">

  <h2>⚓ STATKI TV</h2>

  <div id="code">---</div>

  <div id="qrcode"></div>

  <div class="buttons">
    <button id="newRoomBtn">🆕 Nowy pokój</button>
    <button id="closeRoomBtn">❌ Zamknij</button>
  </div>

  <h3>Gracze</h3>
  <div id="players"></div>

  <div id="statusBar">INIT...</div>

</div>

<script>

const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBod29nZ3htZG10eWN2eXJjeWJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODEyMDgsImV4cCI6MjA5Njk1NzIwOH0.2XuaVqP0p21Nd07w1GCqwEkewJsJKucRYemys0B4wJ0"
);

let room = null;
let channel = null;

/* ================= INIT ================= */

window.onload = async () => {

  const id = localStorage.getItem("room_id");
  const code = localStorage.getItem("room_code");

  if(id && code){
    room = { id, code };
  } else {
    room = await createRoom();
    if(room){
      localStorage.setItem("room_id", room.id);
      localStorage.setItem("room_code", room.code);
    }
  }

  if(!room){
    document.getElementById("statusBar").innerText = "❌ ROOM ERROR";
    return;
  }

  renderRoom();
  subscribe();
};

/* ================= ROOM ================= */

async function createRoom(){

  let code = "";
  let ok = false;

  while(!ok){
    code =
      String.fromCharCode(65 + Math.floor(Math.random()*26)) +
      String(Math.floor(Math.random()*99)+1).padStart(2,"0");

    const { data } = await db
      .from("rooms")
      .select("id")
      .eq("code", code)
      .maybeSingle();

    if(!data) ok = true;
  }

  const { data, error } = await db
    .from("rooms")
    .insert([{ code, status:"waiting" }])
    .select()
    .single();

  if(error){
    document.getElementById("statusBar").innerText = error.message;
    return null;
  }

  return data;
}

/* ================= UI ================= */

function renderRoom(){
  document.getElementById("code").innerText = room.code;

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: window.location.origin + "/player.html?room=" + room.code,
    width: 160,
    height: 160
  });
}

/* ================= REALTIME ================= */

function subscribe(){

  channel = db.channel("room-"+room.id);

  channel.on("postgres_changes", {
    event:"*",
    schema:"public",
    table:"players",
    filter:"room_id=eq."+room.id
  }, () => fetchPlayers());

  channel.subscribe();

  fetchPlayers();
}

/* ================= FETCH ================= */

async function fetchPlayers(){

  const { data } = await db
    .from("players")
    .select("*")
    .eq("room_id", room.id)
    .order("created_at", { ascending:true });

  if(!data) return;

  ensureHost(data);
  renderPlayers(data);
  updateStatus(data);
}

/* ================= HOST ================= */

async function ensureHost(players){

  const hasHost = players.some(p => p.is_host);
  if(hasHost) return;

  const first = players[0];
  if(!first) return;

  await db
    .from("players")
    .update({ is_host:true })
    .eq("id", first.id);
}

/* ================= RENDER ================= */

function renderPlayers(players){

  const box = document.getElementById("players");
  box.innerHTML = "";

  players.forEach(p => {

    const div = document.createElement("div");
    div.className = "player";

    const colorDot = `<span class="dot" style="background:${p.color}"></span>`;

    const hostTag = p.is_host
      ? `<span class="host">⚙ HOST</span>`
      : "";

    div.innerHTML = `
      <div class="left">
        ${colorDot}
        <span>${p.nick}</span>
      </div>
      ${hostTag}
    `;

    box.appendChild(div);
  });
}

/* ================= STATUS ================= */

function updateStatus(players){

  const host = players.find(p => p.is_host);

  document.getElementById("statusBar").innerText =
    `🟢 LIVE | 👥 ${players.length}/4 | ` +
    (host ? "⚙ HOST OK" : "⚠ NO HOST");
}

/* ================= BUTTONS ================= */

document.getElementById("newRoomBtn").onclick = () => {
  localStorage.clear();
  location.reload();
};

document.getElementById("closeRoomBtn").onclick = () => {
  room = null;
  localStorage.clear();

  document.getElementById("players").innerHTML = "";
  document.getElementById("code").innerText = "---";
  document.getElementById("statusBar").innerText = "CLOSED";
};

</script>

</body>
</html>
