<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI TV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background: radial-gradient(circle at top, #0d1b2a, #000814);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  width:460px;
  max-width:95vw;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(79,195,247,0.25);
  border-radius: 20px;
  padding: 22px;
  text-align:center;
  backdrop-filter: blur(8px);
}

h2{
  margin:0 0 10px 0;
  color:#4fc3f7;
}

#code{
  font-size:64px;
  font-weight:900;
  color:#4fc3f7;
  letter-spacing:10px;
}

#qrcode{
  display:flex;
  justify-content:center;
  margin:14px 0;
}

.player{
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin:6px 0;
  background:rgba(255,255,255,0.06);
  border-radius:10px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  margin-right:8px;
}

.left{
  display:flex;
  align-items:center;
  gap:8px;
}

.host{
  color:#4fc3f7;
  font-weight:bold;
  font-size:12px;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  background:#4fc3f7;
}

#statusBar{
  margin-top:12px;
  padding:10px;
  background:rgba(0,0,0,0.4);
  border-radius:10px;
  font-size:13px;
}
</style>
</head>

<body>

<div class="card">

  <h2>⚓ STATKI TV</h2>

  <div id="code">---</div>
  <div id="qrcode"></div>

  <button id="newRoomBtn">🆕 Nowy pokój</button>

  <h3>Gracze</h3>
  <div id="players"></div>

  <div id="statusBar">INIT...</div>

</div>

<script>

const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9"
);

let room = null;
let channel = null;

/* ================= UTIL ================= */
function normalizeCode(c){
  return (c || "").trim().toUpperCase();
}

/* ================= INIT ================= */
window.onload = async () => {

  let id = localStorage.getItem("room_id");
  let code = normalizeCode(localStorage.getItem("room_code"));

  if(id && code){
    room = { id, code };
  } else {
    room = await createRoom();
    if(room){
      localStorage.setItem("room_id", room.id);
      localStorage.setItem("room_code", room.code);
    }
  }

  if(!room){
    document.getElementById("statusBar").innerText = "❌ ROOM ERROR";
    return;
  }

  renderRoom();
  subscribe();
};

/* ================= CREATE ROOM ================= */
async function createRoom(){

  let code = "";
  let exists = true;

  while(exists){
    code =
      String.fromCharCode(65 + Math.floor(Math.random()*26)) +
      String(Math.floor(Math.random()*99)+1).padStart(2,"0");

    code = normalizeCode(code);

    const { data } = await db
      .from("rooms")
      .select("id")
      .eq("code", code)
      .maybeSingle();

    exists = !!data;
  }

  const { data, error } = await db
    .from("rooms")
    .insert([{ code, status:"waiting" }])
    .select()
    .single();

  if(error){
    console.log(error);
    return null;
  }

  return data;
}

/* ================= RENDER ROOM ================= */
function renderRoom(){

  document.getElementById("code").innerText = room.code;

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: window.location.origin + "/player.html?room=" + room.code,
    width: 160,
    height: 160
  });
}

/* ================= REALTIME ================= */
function subscribe(){

  channel = db.channel("room-"+room.id);

  channel.on("postgres_changes", {
    event:"*",
    schema:"public",
    table:"players",
    filter:"room_id=eq."+room.id
  }, () => fetchPlayers());

  channel.subscribe();

  fetchPlayers();
}

/* ================= FETCH PLAYERS ================= */
async function fetchPlayers(){

  const { data } = await db
    .from("players")
    .select("*")
    .eq("room_id", room.id)
    .order("created_at", { ascending:true });

  if(!data) return;

  renderPlayers(data);
  updateStatus(data);
}

/* ================= RENDER ================= */
function renderPlayers(players){

  const box = document.getElementById("players");
  box.innerHTML = "";

  players.forEach(p => {

    const div = document.createElement("div");
    div.className = "player";

    div.innerHTML = `
      <div class="left">
        <span class="dot" style="background:${p.color || "#4fc3f7"}"></span>
        <span>${p.nick}</span>
      </div>
      ${p.is_host ? `<span class="host">⚙ HOST</span>` : ""}
    `;

    box.appendChild(div);
  });
}

/* ================= STATUS ================= */
function updateStatus(players){

  document.getElementById("statusBar").innerText =
    `🟢 LIVE | 👥 ${players.length} graczy | ROOM: ${room.code}`;
}

/* ================= NEW ROOM ================= */
document.getElementById("newRoomBtn").onclick = async () => {
  localStorage.clear();
  location.reload();
};

</script>

</body>
</html>
