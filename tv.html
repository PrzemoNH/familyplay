<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FamilyGame – TV</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100%;height:100%;
    background:#0a1628;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    overflow:hidden;
  }
  #screen{
    width:100%;height:100vh;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:20px;position:relative;
  }

  h1{font-size:3.5rem;font-weight:900;letter-spacing:3px;color:#4fc3f7;}
  .subtitle{font-size:1.1rem;color:#90a4ae;margin-top:-12px;}

  .room-code{
    display:flex;align-items:center;gap:12px;
    background:rgba(79,195,247,0.1);
    border:1px solid rgba(79,195,247,0.3);
    border-radius:14px;padding:10px 24px;
  }
  .room-code-label{font-size:0.85rem;color:#90a4ae;font-weight:700;}
  .room-code-value{
    font-size:2rem;font-weight:900;
    color:#4fc3f7;letter-spacing:4px;
  }

  #qrcode{background:white;padding:12px;border-radius:12px;}

  .status{
    font-size:1rem;color:#4fc3f7;
    background:rgba(79,195,247,0.1);
    padding:10px 24px;border-radius:12px;
    border:1px solid rgba(79,195,247,0.3);
  }

  .players-list{
    display:flex;gap:14px;flex-wrap:wrap;justify-content:center;
  }
  .player-slot{
    width:130px;height:85px;
    border:2px dashed rgba(255,255,255,0.12);
    border-radius:14px;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:5px;font-size:0.8rem;
    color:rgba(255,255,255,0.2);
    transition:all 0.3s;
  }
  .player-slot.filled{border-style:solid;border-width:3px;color:white;font-weight:700;}
  .player-dot{width:18px;height:18px;border-radius:50%;}
  .color-red{background:#ef4444;}
  .color-yellow{background:#f59e0b;}
  .color-green{background:#22c55e;}
  .color-black{background:#374151;}
  .color-white{background:#f8fafc;}
  .border-red{border-color:#ef4444;}
  .border-yellow{border-color:#f59e0b;}
  .border-green{border-color:#22c55e;}
  .border-black{border-color:#6b7280;}
  .border-white{border-color:#f8fafc;}
  .player-host{font-size:0.65rem;color:#f59e0b;font-weight:700;}

  .btn-row{display:flex;gap:12px;justify-content:center;}
  .btn{
    padding:14px 32px;font-size:1rem;font-weight:900;
    border:none;border-radius:12px;cursor:pointer;
    transition:transform 0.1s;letter-spacing:0.5px;
  }
  .btn:active{transform:scale(0.97);}
  .btn-start{background:#22c55e;color:white;display:none;}
  .btn-start.visible{display:block;}
  .btn-newroom{background:rgba(255,255,255,0.08);color:#90a4ae;font-size:0.85rem;padding:10px 20px;}

  #countdown{
    display:none;
    font-size:8rem;font-weight:900;
    color:#4fc3f7;
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    text-shadow:0 0 40px rgba(79,195,247,0.5);
    z-index:10;
  }

  #chatBox{
    position:absolute;
    bottom:20px;right:20px;
    width:280px;
    display:flex;flex-direction:column;gap:6px;
  }
  .chat-msg{
    background:rgba(255,255,255,0.08);
    border-radius:10px;padding:8px 12px;
    font-size:0.8rem;line-height:1.4;
    border-left:3px solid #4fc3f7;
    animation:fadeIn 0.3s;
  }
  .chat-nick{font-weight:700;font-size:0.7rem;opacity:0.7;margin-bottom:2px;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  .mirror-badge{
    position:absolute;top:16px;right:16px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:10px;padding:6px 12px;
    font-size:0.75rem;color:#90a4ae;
  }
</style>
</head>
<body>
<div id="screen">

  <!-- EKRAN STARTOWY -->
  <div id="startScreen">
    <h1>⚓ STATKI</h1>
    <p class="subtitle">Rodzinna gra morska</p>
    <div class="start-btn-row">
      <button class="btn-new" id="btnNewRoom">+ Nowy pokój</button>
      <button class="btn-existing" id="btnExisting">Wróć do pokoju</button>
    </div>
    <div class="code-input-wrap" id="codeInputWrap" style="display:none;">
      <input class="code-input" id="codeInput" maxlength="4" placeholder="A01">
      <button class="btn-join-code" id="btnJoinCode">Wejdź</button>
    </div>
    <p class="start-error" id="startError"></p>
  </div>

  <!-- LOBBY -->
  <div id="lobbyScreen" class="hidden">
    <h1>⚓ STATKI</h1>
    <p class="subtitle">Rodzinna gra morska</p>

    <div class="room-code">
      <span class="room-code-icon" id="tvRoleIcon">👑</span>
      <span class="room-code-label">KOD POKOJU</span>
      <span class="room-code-value" id="roomCodeDisplay">---</span>
    </div>

    <div id="qrcode"></div>

    <p class="status" id="statusMsg">⏳ Czekanie na graczy... (min. 2)</p>

    <div class="players-list" id="playersList"></div>

    <div class="btn-row">
      <button class="btn btn-start" id="btnStart">▶ START GRY</button>
      <button class="btn btn-newroom" id="btnChangeRoom">↺ Zmień pokój</button>
    </div>
  </div>

  <div id="countdown"></div>
  <div id="chatBox"></div>
  <div class="mirror-badge" id="mirrorBadge" style="display:none;">📡 Lustro</div>
</div>

<script src="./supabase.min.js"></script>
<script src="https://unpkg.com/qrcodejs@1.0.0/qrcode.js"></script>
<script>
// ===================== KONFIGURACJA =====================
const SUPABASE_URL = 'https://phwoggxmdmtycvyrcyba.supabase.co';
const SUPABASE_KEY = 'sb_publishable_rY0--Wp81TkcuPbo_C-u1w_zEhkiuQ1';
const PLAYER_URL = 'https://familyplay-alpha.vercel.app/player.html';
const COUNTDOWN_SEC = 5;

let db = null;
if (typeof supabase !== 'undefined') {
  db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} else {
  console.error("Supabase nie został załadowany!");
}

const tvId = localStorage.getItem('fg_tv_id') || 'tv_' + Date.now();
localStorage.setItem('fg_tv_id', tvId);

let roomId = null;
let roomCode = null;
let isHost = false;
let players = [];
let qrGenerated = false;
let playersSubscription = null;
let messagesSubscription = null;

// ===================== POMOCNICZE =====================
function showError(msg) {
  const el = document.getElementById('startError');
  el.textContent = msg;
  setTimeout(() => el.textContent = '', 4000);
}

function generateCode() {
  const letters = 'ABCDEFGHJKLMNPRSTUWZ';
  const l = letters[Math.floor(Math.random() * letters.length)];
  const n = String(Math.floor(Math.random() * 99) + 1).padStart(2, '0');
  return l + n;
}

// ===================== EKRANY =====================
function showLobby() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('lobbyScreen').classList.remove('hidden');

  document.getElementById('roomCodeDisplay').textContent = roomCode;
  document.getElementById('tvRoleIcon').textContent = isHost ? '👑' : '📡';
  document.getElementById('mirrorBadge').style.display = isHost ? 'none' : 'block';

  if (!qrGenerated) {
    const playerUrl = PLAYER_URL + '?room=' + roomCode;
    document.getElementById('qrcode').innerHTML = '';
    new QRCode(document.getElementById('qrcode'), {
      text: playerUrl,
      width: 160,
      height: 160,
      colorDark: "#0a1628",
      colorLight: "#ffffff"
    });
    qrGenerated = true;
  }

  loadPlayers();
  subscribeToPlayers();
  subscribeToMessages();
}

// ===================== POKOJE =====================
async function createRoom() {
  try {
    // Zamknij stare pokoje
    await db.from('rooms').update({ status: 'closed' })
      .eq('host_tv_id', tvId).eq('status', 'waiting');

    const code = generateCode();
    const { data, error } = await db.from('rooms')
      .insert({ 
        status: 'waiting', 
        code: code, 
        host_tv_id: tvId,
        expires_at: new Date(Date.now() + 24*60*60*1000).toISOString()
      })
      .select().single();

    if (error) throw error;

    roomId = data.id;
    roomCode = code;
    isHost = true;

    localStorage.setItem('fg_room_id', roomId);
    localStorage.setItem('fg_room_code', roomCode);
    localStorage.setItem('fg_tv_host', '1');

    showLobby();
  } catch (e) {
    console.error(e);
    showError('Nie udało się stworzyć pokoju: ' + e.message);
  }
}

async function joinRoomByCode(code) {
  try {
    const { data: rooms, error } = await db.from('rooms')
      .select('*')
      .eq('code', code.toUpperCase())
      .in('status', ['waiting','playing'])
      .limit(1);

    if (error) throw error;
    if (!rooms || rooms.length === 0) {
      showError('Nie znaleziono pokoju');
      return;
    }

    const room = rooms[0];
    roomId = room.id;
    roomCode = room.code;
    isHost = room.host_tv_id === tvId;

    localStorage.setItem('fg_room_id', roomId);
    localStorage.setItem('fg_room_code', roomCode);
    localStorage.setItem('fg_tv_host', isHost ? '1' : '0');

    showLobby();
  } catch (e) {
    console.error(e);
    showError('Błąd dołączania: ' + e.message);
  }
}

// ===================== GRACZE =====================
async function loadPlayers() {
  if (!roomId || !db) return;
  try {
    const { data, error } = await db
      .from('players')
      .select('*')
      .eq('room_id', roomId)
      .eq('is_active', true)
      .order('created_at', { ascending: true });

    if (error) throw error;
    players = data || [];
    renderPlayers();
  } catch (e) {
    console.error("Błąd ładowania graczy:", e);
  }
}

function subscribeToPlayers() {
  if (playersSubscription) playersSubscription.unsubscribe();

  playersSubscription = db.channel('tv-players-' + roomId)
    .on('postgres_changes',
      { event: '*', schema: 'public', table: 'players', filter: `room_id=eq.${roomId}` },
      () => loadPlayers()
    ).subscribe();
}

function renderPlayers() {
  const list = document.getElementById('playersList');
  const status = document.getElementById('statusMsg');
  const btnStart = document.getElementById('btnStart');
  const count = players.length;

  list.innerHTML = '';

  players.forEach(p => {
    const slot = document.createElement('div');
    const color = p.color || 'gray';
    slot.className = `player-slot filled border-${color}`;
    slot.innerHTML = `
      <div class="player-dot color-${color}"></div>
      <span>${p.nick || 'Anonim'}</span>
      ${p.is_host ? '<span class="player-host">★ HOST</span>' : ''}
    `;
    list.appendChild(slot);
  });

  // Puste sloty
  for (let i = count; i < 4; i++) {
    const slot = document.createElement('div');
    slot.className = 'player-slot';
    slot.textContent = `Gracz ${i+1}`;
    list.appendChild(slot);
  }

  if (count < 2) {
    status.textContent = `⏳ Czekanie na graczy... (min. 2, masz ${count})`;
    btnStart.classList.remove('visible');
  } else {
    status.textContent = `✅ ${count} graczy gotowych!`;
    if (isHost) btnStart.classList.add('visible');
  }
}

// ===================== START =====================
document.getElementById('btnStart').onclick = () => {
  if (!isHost) return;
  document.getElementById('btnStart').style.display = 'none';
  startCountdown();
};

function startCountdown() {
  const el = document.getElementById('countdown');
  el.style.display = 'block';
  let sec = COUNTDOWN_SEC;
  el.textContent = sec;

  const interval = setInterval(async () => {
    sec--;
    if (sec <= 0) {
      clearInterval(interval);
      el.style.display = 'none';
      await db.from('rooms').update({ status: 'playing' }).eq('id', roomId);
      // TODO: Przejście do ekranu gry
    } else {
      el.textContent = sec;
    }
  }, 1000);
}

// ===================== INNE =====================
document.getElementById('btnNewRoom').onclick = createRoom;

document.getElementById('btnExisting').onclick = () => {
  const wrap = document.getElementById('codeInputWrap');
  wrap.style.display = wrap.style.display === 'none' ? 'flex' : 'none';
};

document.getElementById('btnJoinCode').onclick = () => {
  const code = document.getElementById('codeInput').value.trim();
  if (code) joinRoomByCode(code);
};

document.getElementById('btnChangeRoom').onclick = () => {
  // Czyszczenie
  if (playersSubscription) playersSubscription.unsubscribe();
  if (messagesSubscription) messagesSubscription.unsubscribe();

  localStorage.removeItem('fg_room_id');
  localStorage.removeItem('fg_room_code');
  localStorage.removeItem('fg_tv_host');

  roomId = null; roomCode = null; isHost = false; qrGenerated = false;
  players = [];

  document.getElementById('qrcode').innerHTML = '';
  document.getElementById('lobbyScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
};

// ===================== INIT =====================
(async () => {
  const savedRoomId = localStorage.getItem('fg_room_id');
  if (savedRoomId) {
    const found = await checkSavedRoom(); // możesz zostawić lub dodać funkcję checkSavedRoom
    if (!found) document.getElementById('startScreen').classList.remove('hidden');
  }
})();
</script>
</body>
</html>
