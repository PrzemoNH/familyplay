<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI TV DEBUG</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background: radial-gradient(circle at top, #0d1b2a, #000814);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  width:460px;
  max-width:95vw;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(79,195,247,0.25);
  border-radius: 20px;
  padding: 22px;
  text-align:center;
  backdrop-filter: blur(8px);
}

#code{
  font-size:64px;
  font-weight:900;
  color:#4fc3f7;
}

.player{
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin:6px 0;
  background:rgba(255,255,255,0.06);
  border-radius:10px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
}

.left{
  display:flex;
  align-items:center;
  gap:8px;
}

.host{
  color:#4fc3f7;
  font-weight:bold;
  font-size:12px;
}

#statusBar{
  margin-top:12px;
  padding:10px;
  background:rgba(0,0,0,0.6);
  border-radius:10px;
  font-size:13px;
  color:#ccc;
  border:1px solid rgba(255,255,255,0.1);
  white-space:pre-line;
}
</style>
</head>

<body>

<div class="card">

  <h2>⚓ STATKI TV (DEBUG)</h2>

  <div id="code">---</div>
  <div id="qrcode"></div>

  <h3>Gracze</h3>
  <div id="players"></div>

  <div id="statusBar">INIT...</div>

</div>

<script>

const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "PUBLIC_KEY_HERE"
);

let room = null;

/* ================= STATUS ================= */
function status(msg){
  console.log(msg);
  document.getElementById("statusBar").innerText += "\n" + msg;
}

/* ================= INIT ================= */
window.onload = async () => {

  status("STEP 1: START");

  let id = localStorage.getItem("room_id");
  let code = (localStorage.getItem("room_code") || "").trim().toUpperCase();

  status("STEP 2: STORAGE CHECK");

  if(id && code){
    room = { id, code };
    status("ROOM FROM STORAGE: " + code);
  } else {
    status("STEP 3: CREATE ROOM");
    room = await createRoom();

    if(room){
      localStorage.setItem("room_id", room.id);
      localStorage.setItem("room_code", room.code);
      status("SAVED TO STORAGE");
    }
  }

  if(!room){
    status("❌ ROOM IS NULL → CREATE FAILED");
    return;
  }

  status("ROOM OK: " + room.code);

  renderRoom();
  fetchPlayers();
};

/* ================= CREATE ROOM DEBUG ================= */
async function createRoom(){

  try {

    let code = "T" + Math.floor(Math.random()*999);

    status("CHECK CODE: " + code);

    const check = await db
      .from("rooms")
      .select("id")
      .eq("code", code);

    status("CHECK RESULT: " + JSON.stringify(check));

    if(check.error){
      status("SELECT ERROR: " + check.error.message);
      return null;
    }

    status("STEP INSERT");

    const insert = await db
      .from("rooms")
      .insert([{ code, status:"waiting" }])
      .select();

    status("INSERT RAW: " + JSON.stringify(insert));

    if(insert.error){
      status("INSERT ERROR: " + insert.error.message);
      return null;
    }

    if(!insert.data || insert.data.length === 0){
      status("NO DATA RETURNED");
      return null;
    }

    status("SUCCESS CREATE ROOM");

    return insert.data[0];

  } catch(e){
    status("FATAL ERROR: " + e.message);
    return null;
  }
}

/* ================= ROOM UI ================= */
function renderRoom(){

  document.getElementById("code").innerText = room.code;

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: window.location.origin + "/player.html?room=" + room.code,
    width: 160,
    height: 160
  });
}

/* ================= PLAYERS ================= */
async function fetchPlayers(){

  const { data, error } = await db
    .from("players")
    .select("*")
    .eq("room_id", room.id);

  if(error){
    status("PLAYERS ERROR: " + error.message);
    return;
  }

  renderPlayers(data || []);
}

/* ================= RENDER ================= */
function renderPlayers(players){

  const box = document.getElementById("players");
  box.innerHTML = "";

  players.forEach(p => {

    const div = document.createElement("div");
    div.className = "player";

    div.innerHTML = `
      <div class="left">
        <span class="dot" style="background:${p.color || '#4fc3f7'}"></span>
        <span>${p.nick || 'UNKNOWN'}</span>
      </div>
      ${p.is_host ? '<span class="host">⚙ HOST</span>' : ''}
    `;

    box.appendChild(div);
  });
}

</script>

</body>
</html>
