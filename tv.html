<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FamilyGame – TV</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100%;height:100%;
    background:#0a1628;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    overflow:hidden;
  }
  #screen{
    width:100%;height:100vh;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:20px;position:relative;
  }

  h1{font-size:3.5rem;font-weight:900;letter-spacing:3px;color:#4fc3f7;}
  .subtitle{font-size:1.1rem;color:#90a4ae;margin-top:-12px;}

  .room-code{
    display:flex;align-items:center;gap:12px;
    background:rgba(79,195,247,0.1);
    border:1px solid rgba(79,195,247,0.3);
    border-radius:14px;padding:10px 24px;
  }
  .room-code-label{font-size:0.85rem;color:#90a4ae;font-weight:700;}
  .room-code-value{
    font-size:2rem;font-weight:900;
    color:#4fc3f7;letter-spacing:4px;
  }

  #qrcode{background:white;padding:12px;border-radius:12px;}

  .status{
    font-size:1rem;color:#4fc3f7;
    background:rgba(79,195,247,0.1);
    padding:10px 24px;border-radius:12px;
    border:1px solid rgba(79,195,247,0.3);
  }

  .players-list{
    display:flex;gap:14px;flex-wrap:wrap;justify-content:center;
  }
  .player-slot{
    width:130px;height:85px;
    border:2px dashed rgba(255,255,255,0.12);
    border-radius:14px;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:5px;font-size:0.8rem;
    color:rgba(255,255,255,0.2);
    transition:all 0.3s;
  }
  .player-slot.filled{border-style:solid;border-width:3px;color:white;font-weight:700;}
  .player-dot{width:18px;height:18px;border-radius:50%;}
  .color-red{background:#ef4444;}
  .color-yellow{background:#f59e0b;}
  .color-green{background:#22c55e;}
  .color-black{background:#374151;}
  .color-white{background:#f8fafc;}
  .border-red{border-color:#ef4444;}
  .border-yellow{border-color:#f59e0b;}
  .border-green{border-color:#22c55e;}
  .border-black{border-color:#6b7280;}
  .border-white{border-color:#f8fafc;}
  .player-host{font-size:0.65rem;color:#f59e0b;font-weight:700;}

  .btn-row{display:flex;gap:12px;justify-content:center;}
  .btn{
    padding:14px 32px;font-size:1rem;font-weight:900;
    border:none;border-radius:12px;cursor:pointer;
    transition:transform 0.1s;letter-spacing:0.5px;
  }
  .btn:active{transform:scale(0.97);}
  .btn-start{background:#22c55e;color:white;display:none;}
  .btn-start.visible{display:block;}
  .btn-newroom{background:rgba(255,255,255,0.08);color:#90a4ae;font-size:0.85rem;padding:10px 20px;}

  #countdown{
    display:none;
    font-size:8rem;font-weight:900;
    color:#4fc3f7;
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    text-shadow:0 0 40px rgba(79,195,247,0.5);
    z-index:10;
  }

  #chatBox{
    position:absolute;
    bottom:20px;right:20px;
    width:280px;
    display:flex;flex-direction:column;gap:6px;
  }
  .chat-msg{
    background:rgba(255,255,255,0.08);
    border-radius:10px;padding:8px 12px;
    font-size:0.8rem;line-height:1.4;
    border-left:3px solid #4fc3f7;
    animation:fadeIn 0.3s;
  }
  .chat-nick{font-weight:700;font-size:0.7rem;opacity:0.7;margin-bottom:2px;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  .mirror-badge{
    position:absolute;top:16px;right:16px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:10px;padding:6px 12px;
    font-size:0.75rem;color:#90a4ae;
  }
</style>
</head>
<body>
<div id="screen">

  <!-- EKRAN STARTOWY -->
  <div id="startScreen">
    <h1>⚓ STATKI</h1>
    <p class="subtitle">Rodzinna gra morska</p>
    <div class="start-btn-row">
      <button class="btn-new" id="btnNewRoom">+ Nowy pokój</button>
      <button class="btn-existing" id="btnExisting">Wróć do pokoju</button>
    </div>
    <div class="code-input-wrap" id="codeInputWrap" style="display:none;">
      <input class="code-input" id="codeInput" maxlength="4" placeholder="A01">
      <button class="btn-join-code" id="btnJoinCode">Wejdź</button>
