<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI TV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background: radial-gradient(circle at top, #132a4a, #050b14);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* KARTA */
.card{
  width:420px;
  max-width:95vw;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
  padding:20px;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
  text-align:center;
}

/* CODE */
#code{
  font-size:52px;
  font-weight:900;
  color:#4fc3f7;
  letter-spacing:4px;
  margin-bottom:10px;
}

/* QR */
#qrcode{
  display:flex;
  justify-content:center;
  margin:10px 0;
}

/* PLAYERS */
.player{
  padding:8px 10px;
  background:rgba(255,255,255,0.08);
  border-radius:10px;
  margin:6px 0;
  font-size:14px;
}

/* BUTTONS */
.buttons{
  display:flex;
  gap:10px;
  justify-content:center;
  margin:10px 0;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  background:#4fc3f7;
  color:#001018;
}

button:nth-child(2){
  background:#ff4d4d;
  color:white;
}

/* STATUS BAR */
#statusBar{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  background:rgba(0,0,0,0.4);
  font-size:13px;
  color:#ccc;
}
</style>
</head>

<body>

<div class="card">

  <h2>⚓ STATKI TV</h2>

  <div id="code">...</div>

  <div id="qrcode"></div>

  <div class="buttons">
    <button id="newRoomBtn">🆕 Nowy pokój</button>
    <button id="closeRoomBtn">❌ Zamknij</button>
  </div>

  <h3>Gracze</h3>
  <div id="players"></div>

  <div id="statusBar">🟡 INIT...</div>

</div>

<script>

const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBod29nZ3htZG10eWN2eXJjeWJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODEyMDgsImV4cCI6MjA5Njk1NzIwOH0.2XuaVqP0p21Nd07w1GCqwEkewJsJKucRYemys0B4wJ0"
);

const COLORS = ["blue","green","yellow","red"];

let room = null;

/* ================= BUTTONY ================= */

document.getElementById("newRoomBtn").onclick = async () => {
  localStorage.removeItem("room_id");
  localStorage.removeItem("room_code");
  location.reload();
};

document.getElementById("closeRoomBtn").onclick = async () => {
  localStorage.removeItem("room_id");
  localStorage.removeItem("room_code");

  document.getElementById("players").innerHTML = "";
  document.getElementById("code").innerText = "...";
  document.getElementById("statusBar").innerText = "❌ ROOM CLOSED";

  room = null;
};

/* ================= START ================= */

window.onload = async () => {

  const savedRoomId = localStorage.getItem("room_id");
  const savedRoomCode = localStorage.getItem("room_code");

  if(savedRoomId && savedRoomCode){
    room = { id: savedRoomId, code: savedRoomCode };
  } else {
    room = await createRoom();
    localStorage.setItem("room_id", room.id);
    localStorage.setItem("room_code", room.code);
  }

  if(!room){
    document.getElementById("statusBar").innerText = "❌ ERROR ROOM";
    return;
  }

  render();
  listenPlayers();
};

/* ================= ROOM ================= */

async function createRoom(){

  let code = "";
  let ok = false;

  while(!ok){
    code =
      String.fromCharCode(65 + Math.floor(Math.random()*26)) +
      String(Math.floor(Math.random()*99)+1).padStart(2,"0");

    const { data } = await db
      .from("rooms")
      .select("id")
      .eq("code", code)
      .maybeSingle();

    if(!data) ok = true;
  }

  const { data, error } = await db
    .from("rooms")
    .insert([{ code, status:"waiting" }])
    .select()
    .single();

  if(error){
    document.getElementById("statusBar").innerText = "❌ " + error.message;
    return null;
  }

  return data;
}

/* ================= RENDER ================= */

function render(){
  document.getElementById("code").innerText = room.code;

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: window.location.origin + "/player.html?room=" + room.code,
    width: 160,
    height: 160
  });
}

/* ================= HOST ================= */

async function ensureHost(roomId){

  const { data: players } = await db
    .from("players")
    .select("id,is_host,created_at")
    .eq("room_id", roomId)
    .order("created_at", { ascending:true });

  if(!players || players.length === 0) return;

  const hasHost = players.some(p => p.is_host);

  if(hasHost) return;

  await db
    .from("players")
    .update({ is_host:true })
    .eq("id", players[0].id);
}

/* ================= REALTIME ================= */

function listenPlayers(){

  db.channel("room-"+room.id)
    .on("postgres_changes", {
      event:"*",
      schema:"public",
      table:"players",
      filter:"room_id=eq."+room.id
    }, () => fetchPlayers())
    .subscribe();

  fetchPlayers();
}

/* ================= FETCH ================= */

async function fetchPlayers(){

  const { data, error } = await db
    .from("players")
    .select("*")
    .eq("room_id", room.id)
    .order("created_at", { ascending:true });

  if(error) return;

  await ensureHost(room.id);

  const { data: updated } = await db
    .from("players")
    .select("*")
    .eq("room_id", room.id)
    .order("created_at", { ascending:true });

  renderPlayers(updated || []);
  updateStatusBar(updated || []);
}

/* ================= UI ================= */

function renderPlayers(players){

  const box = document.getElementById("players");
  box.innerHTML = "";

  players.forEach(p => {

    const div = document.createElement("div");
    div.className = "player";

    const hostIcon = p.is_host ? "⚙️ " : "";

    div.innerText = `${hostIcon}${p.nick} | ${p.color}`;

    box.appendChild(div);
  });
}

function updateStatusBar(players){

  const host = players.find(p => p.is_host);

  document.getElementById("statusBar").innerText =
    `🟢 ROOM OK | 👥 ${players.length}/4 | ` +
    (host ? "⚙️ HOST OK" : "⚠️ NO HOST") +
    " | 🔄 LIVE";
}

</script>

</body>
</html>
