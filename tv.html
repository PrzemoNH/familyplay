<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI TV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background: radial-gradient(circle at top, #132a4a, #050b14);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  width:420px;
  max-width:95vw;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
  padding:20px;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
  text-align:center;
}

#code{
  font-size:56px;
  font-weight:900;
  color:#4fc3f7;
  letter-spacing:6px;
  margin-bottom:10px;
}

#qrcode{
  display:flex;
  justify-content:center;
  margin:10px 0;
}

.player{
  padding:10px;
  background:rgba(255,255,255,0.08);
  border-radius:10px;
  margin:6px 0;
  font-size:14px;
}

.buttons{
  display:flex;
  gap:10px;
  justify-content:center;
  margin:12px 0;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  background:#4fc3f7;
  color:#001018;
}

button:last-child{
  background:#ff4d4d;
  color:#fff;
}

#statusBar{
  margin-top:12px;
  padding:10px;
  border-radius:10px;
  background:rgba(0,0,0,0.4);
  font-size:13px;
  color:#ccc;
}
</style>
</head>

<body>

<div class="card">

  <h2>⚓ STATKI TV</h2>

  <div id="code">...</div>

  <div id="qrcode"></div>

  <div class="buttons">
    <button id="newRoomBtn">🆕 Nowy pokój</button>
    <button id="closeRoomBtn">❌ Zamknij</button>
  </div>

  <h3>Gracze</h3>
  <div id="players"></div>

  <div id="statusBar">🟡 INIT...</div>

</div>

<script>

const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBod29nZ3htZG10eWN2eXJjeWJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODEyMDgsImV4cCI6MjA5Njk1NzIwOH0.2XuaVqP0p21Nd07w1GCqwEkewJsJKucRYemys0B4wJ0"
);

let room = null;
let channel = null;

/* ================= INIT ================= */

window.onload = async () => {

  const savedRoomId = localStorage.getItem("room_id");
  const savedRoomCode = localStorage.getItem("room_code");

  if(!savedRoomId || !savedRoomCode){
    room = await createRoom();
    if(room){
      localStorage.setItem("room_id", room.id);
      localStorage.setItem("room_code", room.code);
    }
  } else {
    room = { id: savedRoomId, code: savedRoomCode };
  }

  if(!room){
    document.getElementById("statusBar").innerText = "❌ ERROR ROOM";
    return;
  }

  renderRoom();
  subscribe();
};

/* ================= ROOM ================= */

async function createRoom(){

  let code = "";
  let ok = false;

  while(!ok){
    code =
      String.fromCharCode(65 + Math.floor(Math.random()*26)) +
      String(Math.floor(Math.random()*99)+1).padStart(2,"0");

    const { data } = await db
      .from("rooms")
      .select("id")
      .eq("code", code)
      .maybeSingle();

    if(!data) ok = true;
  }

  const { data, error } = await db
    .from("rooms")
    .insert([{ code, status:"waiting" }])
    .select()
    .single();

  if(error){
    document.getElementById("statusBar").innerText = "❌ " + error.message;
    return null;
  }

  return data;
}

/* ================= UI ================= */

function renderRoom(){
  document.getElementById("code").innerText = room.code;

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: window.location.origin + "/player.html?room=" + room.code,
    width: 160,
    height: 160
  });
}

/* ================= REALTIME ================= */

function subscribe(){

  channel = db.channel("room-"+room.id);

  channel.on("postgres_changes", {
    event: "*",
    schema: "public",
    table: "players",
    filter: "room_id=eq."+room.id
  }, () => fetchPlayers());

  channel.subscribe();

  fetchPlayers();
}

/* ================= FETCH ================= */

async function fetchPlayers(){

  const { data: players } = await db
    .from("players")
    .select("*")
    .eq("room_id", room.id)
    .order("created_at", { ascending:true });

  if(!players) return;

  updateHost(players);
  renderPlayers(players);
  updateStatus(players);
}

/* ================= HOST FIX ================= */

async function updateHost(players){

  if(players.some(p => p.is_host)) return;

  const first = players[0];
  if(!first) return;

  await db
    .from("players")
    .update({ is_host: true })
    .eq("id", first.id);
}

/* ================= RENDER ================= */

function renderPlayers(players){

  const box = document.getElementById("players");
  box.innerHTML = "";

  players.forEach(p => {

    const div = document.createElement("div");
    div.className = "player";

    const icon = p.is_host ? "⚙️ " : "";

    div.innerText = `${icon}${p.nick} | ${p.color}`;

    box.appendChild(div);
  });
}

/* ================= STATUS ================= */

function updateStatus(players){

  const host = players.find(p => p.is_host);

  document.getElementById("statusBar").innerText =
    `🟢 ROOM ACTIVE | 👥 ${players.length}/4 | ` +
    (host ? "⚙️ HOST OK" : "⚠️ NO HOST") +
    " | LIVE";
}

/* ================= RESET ================= */

document.getElementById("newRoomBtn").onclick = () => {
  localStorage.clear();
  location.reload();
};

document.getElementById("closeRoomBtn").onclick = () => {
  room = null;
  localStorage.clear();

  document.getElementById("players").innerHTML = "";
  document.getElementById("code").innerText = "...";
  document.getElementById("statusBar").innerText = "❌ CLOSED";
};

</script>

</body>
</html>
