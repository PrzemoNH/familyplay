<!DOCTYPE html>

<html lang="pl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STATKI – TV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>

<script src="https://unpkg.com/qrcodejs@1.0.0/qrcode.js"></script>

<style>

body{

margin:0;

background:#0a1628;

color:#fff;

font-family:sans-serif;

overflow:hidden;

}

.center{

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

height:100vh;

gap:18px;

text-align:center;

}

h1{color:#4fc3f7;letter-spacing:3px;}

#code{

font-size:2.5rem;

font-weight:900;

color:#4fc3f7;

letter-spacing:6px;

}

.card{

background:rgba(255,255,255,0.08);

padding:14px 20px;

border-radius:14px;

}

#players{

display:flex;

flex-wrap:wrap;

gap:10px;

justify-content:center;

}

.player{

background:rgba(255,255,255,0.12);

padding:10px 14px;

border-radius:10px;

font-weight:700;

display:flex;

gap:8px;

align-items:center;

}

.dot{width:10px;height:10px;border-radius:50%;}

#status{color:#4fc3f7;font-weight:700;}

#qrcode{background:#fff;padding:10px;border-radius:12px;}

</style>

</head>

<body>

<div class="center">

<h1>⚓ STATKI</h1>

<div class="card">

<div>KOD POKOJU</div>

<div id="code">---</div>

</div>

<div id="qrcode"></div>

<div id="players"></div>

<div id="status">Ładowanie...</div>

</div>

<script>

const db = supabase.createClient(

"https://phwoggxmdmtycvyrcyba.supabase.co",

"sb_publishable_rY0--Wp81TkcuPbo-C-u1w_zEhkiuQ1"

);

// ===================== TV ID (KLUCZ FIXA) =====================

const TV_ID = localStorage.getItem("tv_id") || crypto.randomUUID();

localStorage.setItem("tv_id", TV_ID);

let room = null;

let playersSub = null;

let roomSub = null;

// ===================== START =====================

window.onload = async () => {

  room = await getOrCreateRoom();

  renderRoom();

  listenPlayers();

  listenRoom();

};

// ===================== GET OR CREATE ROOM =====================

async function getOrCreateRoom(){

// 1. szukaj swojego roomu

let { data: existing } = await db

.from("rooms")

.select("*")

.eq("tv_id", TV_ID)

.eq("status", "waiting")

.maybeSingle();

// 2. jeśli istnieje → użyj

if(existing) return existing;

// 3. inaczej twórz nowy kod

let code = "";

let ok = false;

while(!ok){

code =

String.fromCharCode(65 + Math.floor(Math.random()*26)) +

String(Math.floor(Math.random()*99)+1).padStart(2,"0");

let { data } = await db

.from("rooms")

.select("id")

.eq("code", code)

.maybeSingle();

if(!data) ok = true;

}

// 4. insert room

let { data:newRoom } = await db

.from("rooms")

.insert({

code,

status:"waiting",

tv_id: TV_ID

})

.select()

.single();

return newRoom;

}

// ===================== RENDER ROOM =====================

function renderRoom(){

document.getElementById("code").innerText = room.code;

document.getElementById("qrcode").innerHTML = "";

new QRCode(document.getElementById("qrcode"), {

text: location.origin + "/player.html?room=" + room.code,

width: 160,

height: 160

});

}

// ===================== PLAYERS =====================

function listenPlayers(){

if(playersSub) db.removeChannel(playersSub);

playersSub = db

.channel("players-"+room.id)

.on("postgres_changes",{

event:"*",

schema:"public",

table:"players",

filter:"room_id=eq."+room.id

},fetchPlayers)

.subscribe();

fetchPlayers();

}

async function fetchPlayers(){

let { data } = await db

.from("players")

.select("nick,color")

.eq("room_id", room.id);

renderPlayers(data || []);

// tylko UI

if(data.length >= 2){

document.getElementById("status").innerText = "Lobby pełne (2/2)";

}else{

document.getElementById("status").innerText = `Oczekiwanie (${data.length}/2)`;

}

}

// ===================== RENDER PLAYERS =====================

function renderPlayers(players){

const box = document.getElementById("players");

box.innerHTML = "";

const colors = {

red:"#ef4444",

yellow:"#f59e0b",

green:"#22c55e",

blue:"#3b82f6"

};

players.forEach(p=>{

let div = document.createElement("div");

div.className = "player";

div.innerHTML = `

<span class="dot" style="background:${colors[p.color]||"#fff"}"></span>

${p.nick}

`;

box.appendChild(div);

});

}

// ===================== ROOM LISTENER =====================

function listenRoom(){

if(roomSub) db.removeChannel(roomSub);

roomSub = db

.channel("room-"+room.id)

.on("postgres_changes",{

event:"UPDATE",

schema:"public",

table:"rooms",

filter:"id=eq."+room.id

},payload=>{

room = payload.new;

if(room.status === "countdown"){

document.getElementById("status").innerText = "START...";

}

if(room.status === "playing"){

document.getElementById("status").innerText = "GRA W TOKU";

}

})

.subscribe();

}

</script>

</body>

</html>
