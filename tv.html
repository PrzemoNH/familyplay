<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI TV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a1628;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  gap:10px;
}

#code{
  font-size:40px;
  font-weight:bold;
  color:#4fc3f7;
}

#players{
  margin-top:10px;
  display:flex;
  flex-direction:column;
  gap:5px;
}

.player{
  padding:6px 10px;
  background:rgba(255,255,255,0.1);
  border-radius:8px;
}
</style>
</head>

<body>

<h1>STATKI TV</h1>

<div id="code">...</div>
<div id="qrcode"></div>

<h3>Gracze:</h3>
<div id="players"></div>

<div id="status"></div>

<script>

const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "TWOJ_ANON_PUBLIC_KEY_TUTAJ"
);

let room = null;

// ================= START =================

window.onload = async () => {
  room = await createRoom();
  if(!room) return;

  renderRoom();
  listenPlayers();
};

// ================= CREATE ROOM =================

async function createRoom() {

  try {

    let code = "";
    let ok = false;

    while(!ok){
      code =
        String.fromCharCode(65 + Math.floor(Math.random()*26)) +
        String(Math.floor(Math.random()*99)+1).padStart(2,"0");

      let { data } = await db
        .from("rooms")
        .select("id")
        .eq("code", code)
        .maybeSingle();

      if(!data) ok = true;
    }

    const { data, error } = await db
      .from("rooms")
      .insert({
        code: code,
        status: "waiting"
      })
      .select()
      .single();

    if(error){
      console.error("ROOM ERROR:", error);
      document.getElementById("status").innerText =
        "❌ Room error: " + error.message;
      return null;
    }

    return data;

  } catch (e) {
    console.error(e);
    document.getElementById("status").innerText =
      "❌ Fatal error creating room";
    return null;
  }
}

// ================= RENDER ROOM =================

function renderRoom(){

  document.getElementById("code").innerText = room.code;

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: window.location.origin + "/player.html?room=" + room.code,
    width: 180,
    height: 180
  });

  document.getElementById("status").innerText = "Lobby aktywny";
}

// ================= PLAYERS =================

function listenPlayers(){

  db.channel("room-"+room.id)
    .on("postgres_changes", {
      event: "*",
      schema: "public",
      table: "players",
      filter: "room_id=eq."+room.id
    }, fetchPlayers)
    .subscribe();

  fetchPlayers();
}

async function fetchPlayers(){

  let { data } = await db
    .from("players")
    .select("nick,color,ready")
    .eq("room_id", room.id);

  renderPlayers(data || []);
}

// ================= UI =================

function renderPlayers(players){

  const box = document.getElementById("players");
  box.innerHTML = "";

  players.forEach(p => {
    let div = document.createElement("div");
    div.className = "player";
    div.innerText =
      p.nick +
      " | " +
      p.color +
      (p.ready ? " ✔" : "");

    box.appendChild(div);
  });
}

</script>

</body>
</html>
