<!DOCTYPE html>

<html lang="pl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STATKI TV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>

<script src="https://unpkg.com/qrcodejs@1.0.0/qrcode.js"></script>

<style>

body{

margin:0;

background:#0a1628;

color:#fff;

font-family:sans-serif;

}

.center{

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

height:100vh;

gap:20px;

text-align:center;

}

h1{color:#4fc3f7}

#code{

font-size:3rem;

font-weight:900;

color:#4fc3f7;

letter-spacing:6px;

}

#players{

display:flex;

gap:10px;

flex-wrap:wrap;

justify-content:center;

}

.player{

background:rgba(255,255,255,0.1);

padding:10px 14px;

border-radius:10px;

}

#qrcode{

background:#fff;

padding:10px;

border-radius:12px;

}

</style>

</head>

<body>

<div class="center">

<h1>⚓ STATKI TV</h1>

<div>KOD POKOJU</div>

<div id="code">...</div>

<div id="qrcode"></div>

<div id="players"></div>

<div id="status">Tworzenie pokoju...</div>

</div>

<script>

const db = supabase.createClient(

"https://phwoggxmdmtycvyrcyba.supabase.co",

"sb_publishable_rY0--Wp81TkcuPbo-C-u1w_zEhkiuQ1"

);

let room = null;

// ===================== START =====================

window.onload = async () => {

  room = await createRoom();

  renderRoom();

  listenPlayers();

};

// ===================== CREATE ROOM (ALWAYS) =====================

async function createRoom(){

let code = "";

let ok = false;

// generate unique code

while(!ok){

code =

String.fromCharCode(65 + Math.floor(Math.random()*26)) +

String(Math.floor(Math.random()*99)+1).padStart(2,"0");

let { data } = await db

.from("rooms")

.select("id")

.eq("code", code)

.maybeSingle();

if(!data) ok = true;

}

// insert room

let { data:newRoom, error } = await db

.from("rooms")

.insert({

code,

status:"waiting"

})

.select()

.single();

if(error){

console.error(error);

document.getElementById("status").innerText = "Błąd tworzenia pokoju";

return null;

}

return newRoom;

}

// ===================== RENDER =====================

function renderRoom(){

if(!room) return;

document.getElementById("code").innerText = room.code;

document.getElementById("qrcode").innerHTML = "";

new QRCode(document.getElementById("qrcode"), {

text: location.origin + "/player.html?room=" + room.code,

width: 160,

height: 160

});

document.getElementById("status").innerText = "Pokój aktywny";

}

// ===================== PLAYERS =====================

function listenPlayers(){

db.channel("players-"+room.id)

.on("postgres_changes",{

event:"*",

schema:"public",

table:"players",

filter:"room_id=eq."+room.id

},fetchPlayers)

.subscribe();

fetchPlayers();

}

async function fetchPlayers(){

let { data } = await db

.from("players")

.select("nick,color")

.eq("room_id", room.id);

renderPlayers(data || []);

}

// ===================== RENDER PLAYERS =====================

function renderPlayers(players){

const box = document.getElementById("players");

box.innerHTML = "";

players.forEach(p=>{

let div = document.createElement("div");

div.className = "player";

div.innerText = p.nick + " (" + p.color + ")";

box.appendChild(div);

});

}

</script>

</body>

</html>
