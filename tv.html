<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI – TV</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100%;height:100%;
    background:#0a1628;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    overflow:hidden;
  }
  #screen{
    width:100%;height:100vh;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:20px;position:relative;
  }

  h1{font-size:3.5rem;font-weight:900;letter-spacing:3px;color:#4fc3f7;}
  .subtitle{font-size:1.1rem;color:#90a4ae;margin-top:-12px;}

  .room-code{
    display:flex;align-items:center;gap:12px;
    background:rgba(79,195,247,0.1);
    border:1px solid rgba(79,195,247,0.3);
    border-radius:14px;padding:10px 24px;
  }
  .room-code-label{font-size:0.85rem;color:#90a4ae;font-weight:700;}
  .room-code-value{
    font-size:2rem;font-weight:900;
    color:#4fc3f7;letter-spacing:4px;
  }

  #qrcode{background:white;padding:12px;border-radius:12px;}

  .status{
    font-size:1rem;color:#4fc3f7;
    background:rgba(79,195,247,0.1);
    padding:10px 24px;border-radius:12px;
    border:1px solid rgba(79,195,247,0.3);
  }

  .start-error{color:#ef4444;font-weight:700;margin:15px 0;}
</style>
</head>
<body>
<div id="screen">

  <h1>⚓ STATKI</h1>
  <p class="subtitle">Rodzinna gra morska</p>

  <div id="startScreen">
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
      <button class="btn" style="background:#4fc3f7;color:#0a1628;padding:16px 32px;font-size:1.1rem;" id="btnNewRoom">+ Nowy pokój</button>
      <button class="btn" style="background:rgba(255,255,255,0.1);padding:16px 32px;" id="btnExisting">Wróć do pokoju</button>
    </div>
    <p class="start-error" id="startError"></p>
  </div>

  <div id="lobbyScreen" style="display:none;flex-direction:column;align-items:center;gap:20px;">
    <div class="room-code">
      <span class="room-code-label">KOD POKOJU</span>
      <span class="room-code-value" id="roomCodeDisplay">---</span>
    </div>
    <div id="qrcode"></div>
    <p class="status" id="statusMsg">⏳ Czekanie na graczy... (min. 2)</p>
    <button class="btn" id="btnChangeRoom" style="background:rgba(255,255,255,0.1);">↺ Zmień pokój</button>
  </div>
</div>

<!-- SUPABASE Z CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/qrcodejs@1.0.0/qrcode.js"></script>
<script>
// ===================== KONFIG =====================
const SUPABASE_URL = 'https://phwoggxmdmtycvyrcyba.supabase.co';
const SUPABASE_KEY = 'sb_publishable_rY0--Wp81TkcuPbo_C-u1w_zEhkiuQ1';

let db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let roomId = null;
let roomCode = null;
let playersSubscription = null; // Miejsce na podsłuchiwanie bazy danych

// ===================== TWORZENIE POKOJU =====================
async function createRoom() {
  try {
    document.getElementById('startError').textContent = "Tworzę pokój...";

    // Losowanie kodu np. A42
    const code = 'A' + String(Math.floor(Math.random()*90) + 10);

    const { data, error } = await db
      .from('rooms')
      .insert({ 
        status: 'waiting', 
        code: code, 
        host_tv_id: 'tv_' + Date.now()
      })
      .select()
      .single();

    if (error) throw error;

    roomId = data.id;
    roomCode = code;

    document.getElementById('roomCodeDisplay').textContent = code;
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('lobbyScreen').style.display = 'flex';

    // Czyszczenie starego QR kodu (jeśli był) i generowanie nowego
    const qrContainer = document.getElementById('qrcode');
    qrContainer.innerHTML = '';
    new QRCode(qrContainer, {
      text: "https://familyplay-alpha.vercel.app/player.html?room=" + code,
      width: 180,
      height: 180
    });

    // URUCHOMIENIE NASŁUCHIWANIA GRACZY W CZASIE RZECZYWISTYM
    listenForPlayers(code);

  } catch (e) {
    console.error(e);
    document.getElementById('startError').textContent = "Błąd: " + (e.message || e);
  }
}

// ===================== REALTIME: NASŁUCHIWANIE GRACZY =====================
function listenForPlayers(code) {
  // Jeśli istniała stara subskrypcja, wyłączamy ją
  if (playersSubscription) {
    db.removeChannel(playersSubscription);
  }

  // Tworzymy kontener na listę graczy w HTML, jeśli jeszcze go nie ma
  let playersListDiv = document.getElementById('playersList');
  if (!playersListDiv) {
    playersListDiv = document.createElement('div');
    playersListDiv.id = 'playersList';
    playersListDiv.style.cssText = "display:flex; gap:15px; margin: 20px 0; flex-wrap:wrap; justify-content:center;";
    // Wstawiamy listę nad komunikatem o statusie
    const statusMsg = document.getElementById('statusMsg');
    statusMsg.parentNode.insertBefore(playersListDiv, statusMsg);
  }

  // Subskrypcja na zmiany w tabeli 'players' dla tego konkretnego pokoju
  playersSubscription = db
    .channel('public:players:' + code)
    .on('postgres_changes', { 
        event: '*', 
        schema: 'public', 
        table: 'players', 
        filter: 'room_code=eq.' + code 
    }, () => {
      // Przy jakiejkolwiek zmianie (dołączenie, wyjście) – pobierz aktualną listę
      fetchPlayers(code);
    })
    .subscribe();

  // Pobierz graczy na start (w razie gdyby ktoś już był)
  fetchPlayers(code);
}

// Pobieranie graczy z bazy i renderowanie ich na ekranie TV
async function fetchPlayers(code) {
  const { data: players, error } = await db
    .from('players')
    .select('nick, color')
    .eq('room_code', code);

  if (error) {
    console.error("Błąd pobierania graczy:", error);
    return;
  }

  const playersListDiv = document.getElementById('playersList');
  playersListDiv.innerHTML = ''; // Czyścimy listę przed ponownym narysowaniem

  // Mapowanie angielskich nazw kolorów na kody HEX do wyświetlenia obwódki/tła
  const colorMap = {
    red: '#ef4444',
    yellow: '#f59e0b',
    green: '#22c55e',
    black: '#4b5563',
    white: '#e5e7eb'
  };

  players.forEach(p => {
    const pEl = document.createElement('div');
    const dotColor = colorMap[p.color] || '#ffffff';
    
    // Styl kafelka gracza na ekranie TV
    pEl.style.cssText = `
      background: rgba(255,255,255,0.08);
      border: 2px solid ${dotColor};
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 1.2rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    `;
    pEl.innerHTML = `<span style="width:12px; height:12px; background:${dotColor}; border-radius:50%; display:inline-block;"></span> ${p.nick}`;
    playersListDiv.appendChild(pEl);
  });

  // Aktualizacja komunikatu o stanie lobby
  const statusMsg = document.getElementById('statusMsg');
  if (players.length < 2) {
    statusMsg.textContent = `⏳ Czekanie na graczy... (${players.length}/2)`;
  } else {
    statusMsg.textContent = `✅ Gotowi do gry! Graczy: ${players.length} (Host może zaczynać)`;
    // TODO: Tutaj w przyszłości odblokujemy przycisk "START GAME" na TV
  }
}

document.getElementById('btnNewRoom').onclick = createRoom;

// ===================== ZMIEŃ POKÓJ =====================
document.getElementById('btnChangeRoom').onclick = function() {
    if (confirm("Na pewno chcesz zmienić pokój? Stracisz obecny kod.")) {
        if (playersSubscription) {
          db.removeChannel(playersSubscription);
        }
        
        localStorage.removeItem('fg_room_id');
        localStorage.removeItem('fg_room_code');
        localStorage.removeItem('fg_tv_host');
        
        roomId = null;
        roomCode = null;
        
        document.getElementById('playersList').innerHTML = '';
        document.getElementById('lobbyScreen').style.display = 'none';
        document.getElementById('startScreen').style.display = 'block';
    }
};
</script>
</body>
</html>
