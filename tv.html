<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI TV 2.2 ENGINE</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background: radial-gradient(circle at top, #0d1b2a, #000814);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow:hidden;
}

.bg{
  position:fixed;
  inset:0;
  background: linear-gradient(180deg,#06121f,#000814);
}

.wave{
  position:absolute;
  width:200%;
  height:200px;
  bottom:-80px;
  left:-50%;
  background: rgba(79,195,247,0.08);
  border-radius:100%;
  animation: wave 8s linear infinite;
}

@keyframes wave{
  0%{transform:translateX(0);}
  100%{transform:translateX(50%);}
}

.ship{
  position:absolute;
  bottom:10px;
  left:-120px;
  font-size:40px;
  animation: sail 16s linear infinite;
}

@keyframes sail{
  0%{transform:translateX(0);}
  100%{transform:translateX(120vw);}
}

.card{
  width:520px;
  max-width:95vw;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(79,195,247,0.25);
  border-radius: 20px;
  padding: 22px;
  text-align:center;
  backdrop-filter: blur(10px);
  position:relative;
}

#code{
  font-size:64px;
  font-weight:900;
  color:#4fc3f7;
}

.player{
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
  display:flex;
  justify-content:space-between;
}

#status{
  margin-top:10px;
  font-size:12px;
  color:#aaa;
  text-align:left;
  max-height:140px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="bg">
  <div class="wave"></div>
  <div class="ship">🚢</div>
</div>

<div class="card">

  <h2>⚓ STATKI TV 2.2</h2>
  <div id="code">---</div>

  <div id="players"></div>

  <div id="status">INIT...</div>

</div>

<script>

const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBod29nZ3htZG10eWN2eXJjeWJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODEyMDgsImV4cCI6MjA5Njk1NzIwOH0.2XuaVqP0p21Nd07w1GCqwEkewJsJKucRYemys0B4wJ0"
);

const COLORS = ["#4fc3f7","#ff6b6b","#a3e635","#ffd166","#c084fc","#fb923c"];

let room = null;

function log(m){
  console.log(m);
  document.getElementById("status").innerText += "\n" + JSON.stringify(m);
}

/* ================= INIT ================= */
window.onload = async () => {

  log("INIT...");

  const savedId = localStorage.getItem("room_id");
  const savedCode = localStorage.getItem("room_code");

  if(savedId && savedCode){
    const {data} = await db.from("rooms").select("*").eq("id", savedId).maybeSingle();
    if(data) room = data;
  }

  if(!room){
    log("NO ROOM → STOP");
    return;
  }

  document.getElementById("code").innerText = room.code;

  listenPlayers();
};

/* ================= COLOR ENGINE ================= */
function assignColors(players){

  const sorted = [...players].sort((a,b)=>
    new Date(a.created_at) - new Date(b.created_at)
  );

  return sorted.map((p, i) => ({
    ...p,
    color: p.color || COLORS[i % COLORS.length]
  }));
}

/* ================= RENDER ================= */
function render(players){

  const box = document.getElementById("players");
  box.innerHTML = "";

  const withColors = assignColors(players);

  const isGameMode = room.mode && players.length === room.mode;

  withColors.forEach(p => {

    const div = document.createElement("div");
    div.className = "player";

    div.style.borderLeft = "6px solid " + p.color;
    div.style.boxShadow = "0 0 10px " + p.color + "33";

    div.innerHTML = `
      <span>👤 ${p.nick}</span>
      <span>${p.ready ? "✔ READY" : "⏳ WAIT"}</span>
    `;

    box.appendChild(div);
  });

  if(isGameMode){
    log("🎮 GAME MODE ACTIVE");
  } else {
    log("⏳ LOBBY MODE");
  }
}

/* ================= FETCH ================= */
async function fetchPlayers(){

  const {data} = await db
    .from("players")
    .select("*")
    .eq("room_id", room.id)
    .order("created_at", {ascending:true});

  render(data || []);
}

/* ================= REALTIME ================= */
function listenPlayers(){

  db.channel("room-"+room.id)
    .on("postgres_changes", {
      event:"*",
      table:"players",
      filter:"room_id=eq."+room.id
    }, fetchPlayers)
    .subscribe();

  fetchPlayers();
}

</script>

</body>
</html>
