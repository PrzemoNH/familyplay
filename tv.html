<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI TV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background: radial-gradient(circle at top, #0d1b2a, #000814);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  width:460px;
  max-width:95vw;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(79,195,247,0.25);
  border-radius: 20px;
  padding: 22px;
  text-align:center;
  backdrop-filter: blur(8px);
}

#code{
  font-size:64px;
  font-weight:900;
  color:#4fc3f7;
}

#qrcode{
  margin:12px 0;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  margin:5px;
}

#newRoomBtn{ background:#4fc3f7; }
#resetBtn{ background:#ff4d4d; color:white; }

#statusBar{
  margin-top:12px;
  padding:10px;
  background:rgba(0,0,0,0.5);
  border-radius:10px;
  font-size:13px;
  color:#ccc;
}
</style>
</head>

<body>

<div class="card">

  <h2>⚓ STATKI TV</h2>

  <div id="code">---</div>

  <div id="qrcode"></div>

  <button id="newRoomBtn">🆕 Nowy pokój</button>
  <button id="resetBtn">♻ Reset cache</button>

  <div id="statusBar">INIT...</div>

</div>

<script>

const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBod29nZ3htZG10eWN2eXJjeWJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODEyMDgsImV4cCI6MjA5Njk1NzIwOH0.2XuaVqP0p21Nd07w1GCqwEkewJsJKucRYemys0B4wJ0"
);

let room = null;

/* ================= LOG ================= */
function log(msg){
  console.log(msg);
  document.getElementById("statusBar").innerText += "\n" + msg;
}

/* ================= INIT ================= */
window.onload = async () => {

  log("INIT...");

  const savedId = localStorage.getItem("room_id");
  const savedCode = localStorage.getItem("room_code");

  log("CACHE CHECK: " + savedCode);

  // ⚠️ NIE BLOKUJEMY CREATE ROOM
  // tylko używamy cache jako fallback

  if(savedId && savedCode){
    room = { id: savedId, code: savedCode };
    log("LOADED FROM CACHE: " + savedCode);
  }

  // zawsze sprawdzamy czy room istnieje w DB
  if(room){
    const { data } = await db
      .from("rooms")
      .select("*")
      .eq("id", room.id)
      .maybeSingle();

    if(!data){
      log("CACHE INVALID → CREATING NEW ROOM");
      room = await createRoom();
    }
  } else {
    room = await createRoom();
  }

  if(!room){
    log("❌ ROOM NULL");
    return;
  }

  localStorage.setItem("room_id", room.id);
  localStorage.setItem("room_code", room.code);

  log("ROOM OK: " + room.code);

  renderRoom();
};

/* ================= CREATE ROOM ================= */
async function createRoom(){

  let code = "T" + String(Math.floor(Math.random()*100)).padStart(2,"0");

  log("CREATE ROOM: " + code);

  const { data, error } = await db
    .from("rooms")
    .insert([{ code, status:"waiting" }])
    .select()
    .single();

  if(error){
    log("ERROR: " + error.message);
    return null;
  }

  log("ROOM CREATED: " + data.code);

  return data;
}

/* ================= RENDER ================= */
function renderRoom(){

  document.getElementById("code").innerText = room.code;

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: window.location.origin + "/player.html?room=" + room.code,
    width: 160,
    height: 160
  });
}

/* ================= BUTTONS ================= */
document.getElementById("newRoomBtn").onclick = async () => {

  log("FORCE NEW ROOM");

  room = await createRoom();

  localStorage.setItem("room_id", room.id);
  localStorage.setItem("room_code", room.code);

  renderRoom();
};

document.getElementById("resetBtn").onclick = () => {

  log("CACHE CLEARED");

  localStorage.removeItem("room_id");
  localStorage.removeItem("room_code");

  location.reload();
};

</script>

</body>
</html>
