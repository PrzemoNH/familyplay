<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI TV 4.0</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background: radial-gradient(circle at top, #07121f, #000814);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* ===== CARD ===== */
.card{
  width:520px;
  max-width:95vw;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(79,195,247,0.2);
  border-radius: 18px;
  padding: 20px;
  text-align:center;
  position:relative;
  overflow:hidden;
}

/* ===== CODE ===== */
#code{
  font-size:58px;
  font-weight:900;
  color:#4fc3f7;
}

/* ===== QR ===== */
#qrcode{
  margin:12px 0;
}

/* ===== BUTTONS ===== */
button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  margin:5px;
}

#newRoomBtn{ background:#4fc3f7; }
#mode2{ background:#4caf50; }
#mode3{ background:#ff9800; }
#mode4{ background:#f44336; }
#resetBtn{ background:#333; color:white; }

/* ===== PLAYERS ===== */
#players{
  margin-top:10px;
  text-align:left;
}

.player{
  padding:6px 10px;
  margin:4px 0;
  border-radius:8px;
  background:rgba(255,255,255,0.08);
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

/* ===== MAP MODE ===== */
#map{
  display:none;
  margin-top:10px;
  height:180px;
  position:relative;
  border-radius:10px;
  background: linear-gradient(#0b1b2f, #050b14);
  overflow:hidden;
}

.dot{
  width:12px;
  height:12px;
  border-radius:50%;
  position:absolute;
}

/* ===== SHIP ANIMATION ===== */
#ship{
  position:absolute;
  bottom:8px;
  left:-120px;
  width:100px;
  height:18px;
  background:#4fc3f7;
  border-radius:8px;
  animation: sail 6s linear infinite;
}

@keyframes sail{
  0%{left:-120px;}
  100%{left:520px;}
}

/* ===== DEBUG ===== */
#debug{
  margin-top:10px;
  font-size:11px;
  background:#000;
  color:#00ffcc;
  padding:6px;
  max-height:120px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="card">

  <h2>⚓ STATKI TV 4.0</h2>

  <div id="code">---</div>

  <div id="qrcode"></div>

  <div>
    <button id="mode2">2 GRACZY</button>
    <button id="mode3">3 GRACZY</button>
    <button id="mode4">4 GRACZY</button>
  </div>

  <button id="newRoomBtn">🆕 NOWY POKÓJ</button>
  <button id="resetBtn">♻ RESET</button>

  <div id="players"></div>

  <div id="map">
    <div id="ship"></div>
  </div>

  <div id="debug">INIT...</div>

</div>

<script>

const db = supabase.createClient(
  "https://phwoggxmdmtycvyrcyba.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ..."
);

let room = null;
let players = [];
let mode = 2;

const COLORS = ["#4fc3f7","#ff6b6b","#a3e635","#ffd166"];

function log(m){
  console.log(m);
  document.getElementById("debug").innerText += "\n" + JSON.stringify(m);
}

/* ================= MODE ================= */
document.getElementById("mode2").onclick = () => setMode(2);
document.getElementById("mode3").onclick = () => setMode(3);
document.getElementById("mode4").onclick = () => setMode(4);

function setMode(m){
  mode = m;
  log({mode});
}

/* ================= ROOM ================= */
async function createRoom(){

  const code = "T" + Math.floor(Math.random()*100).toString().padStart(2,"0") + "-" + mode;

  const { data } = await db.from("rooms")
    .insert([{ code, mode }])
    .select()
    .single();

  return data;
}

/* ================= INIT ================= */
window.onload = async () => {

  room = await createRoom();

  document.getElementById("code").innerText = room.code;

  new QRCode(document.getElementById("qrcode"), {
    text: window.location.origin + "/player.html?room=" + room.code,
    width:160,
    height:160
  });

  listenPlayers();
};

/* ================= PLAYERS ================= */
function listenPlayers(){

  db.channel("room-"+room.id)
    .on("postgres_changes",
      { event:"*", schema:"public", table:"players", filter:"room_id=eq."+room.id },
      fetchPlayers
    )
    .subscribe();

  fetchPlayers();
}

async function fetchPlayers(){

  const { data } = await db
    .from("players")
    .select("*")
    .eq("room_id", room.id);

  players = data || [];

  renderPlayers();
  renderMap();
}

/* ================= UI ================= */
function renderPlayers(){

  const el = document.getElementById("players");
  el.innerHTML = "";

  players.forEach((p,i)=>{
    const div = document.createElement("div");
    div.className = "player";

    const color = p.color || COLORS[i % COLORS.length];

    div.style.borderLeft = "4px solid " + color;

    div.innerHTML = `
      <span>${p.nick}</span>
      <span>${p.ready ? "✔" : "…"}</span>
    `;

    el.appendChild(div);
  });
}

/* ================= MAP MODE ================= */
function renderMap(){

  const map = document.getElementById("map");

  if(players.length >= mode){
    map.style.display = "block";
  } else {
    map.style.display = "none";
    return;
  }

  map.innerHTML = '<div id="ship"></div>';

  players.forEach((p,i)=>{

    const dot = document.createElement("div");
    dot.className = "dot";

    const color = p.color || COLORS[i % COLORS.length];

    dot.style.background = color;
    dot.style.left = (20 + i*60) + "px";
    dot.style.top = (40 + i*30) + "px";

    map.appendChild(dot);
  });
}

/* ================= RESET ================= */
document.getElementById("resetBtn").onclick = () => {
  localStorage.clear();
  location.reload();
};

</script>

</body>
</html>
